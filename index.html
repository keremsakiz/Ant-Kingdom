  sndPower();
}

/**
 * Yuva menüsü (Faz: yuva HP upgrade). nestMenu null ise çizmez. Yuvanın üstünde
 * panel + "Yükselt (+50 ❤️)" butonu + maliyet çizer. Maliyet/HP mantığı
 * doNestUpgrade'de; bu fonksiyon sadece çizim (afford → buton rengi).
 */
function drawNestMenu() {
  if (!nestMenu) return;
  const L = nestMenuLayout();
  const cost = nestUpgradeCost();
  const afford = food >= cost;
  ctx.save();
  // Panel — drawUpgradeMenu ile ORTAK çizim (renk/opaklık/yuvarlaklık/gölge/highlight aynı)
  drawMenuPanel(L);
  const cx = L.bx + L.w / 2;
  // Başlık: emoji + isim (bina menüsündeki "emoji + name" satırıyla aynı font/konum)
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold 13px ' + HUD.font;
  ctx.fillStyle = '#fff';
  ctx.fillText('👑 Yuva', cx, L.by + 20);
  // HP satırı (bina "Sv X/6 ❤️ hp/max" satırıyla aynı font/renk/konum)
  ctx.font = '11px ' + HUD.font;
  ctx.fillStyle = HUD.affordText;
  ctx.fillText('❤️ ' + Math.round(hudQueenHP) + '/' + CONFIG.QUEEN.MAX_HP, cx, L.by + 38);
  // Etki satırı: mevcut → yükseltince (bina effectLine satırıyla aynı font/renk/konum)
  ctx.font = '10px ' + HUD.font;
  ctx.fillStyle = HUD.effectGreen;
  ctx.fillText('Max HP: ' + CONFIG.QUEEN.MAX_HP + ' → ' + (CONFIG.QUEEN.MAX_HP + 50), cx, L.by + 55);
  // Yükselt butonu — drawUpgradeMenu butonuyla ORTAK (drawMenuButton)
  drawMenuButton(L, afford, '⬆ Yükselt (' + cost + ' 🍃)', cx);
  ctx.restore();
}

function doUpgrade(b) {
  if (b.level >= 6) return;
  const cost = upgradeCostFor(b.type, b.level + 1);
  if (food < cost) return;
  food -= cost;
  b.level++;
  b.applyLevel();            // maxHP × seviye + hp = maxHP; etki effectMul ile artar
  const w = worldFromGrid(b.gridX, b.gridY);
  // Mevcut yeşil yükselme dalgası + parçacık (korunur)
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#5aff8a', maxR: 48 });
  burst(w.x, w.y, '#5aff8a', 10);
  // Faz 3C: ulaşılan seviyenin rengiyle (gümüş/altın) daha büyük patlama + halka,
  // ve binanın üstünde yukarı kayıp solan "Sv X!" metni → upgrade net görünsün.
  const tier = LVL_TIER[b.level - 1];
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: tier.color, maxR: 58 });
  burst(w.x, w.y, tier.color, 16);
  floatTexts.push({ wx: w.x, wy: w.y, life: 1.0, text: 'Sv ' + b.level + '!', color: tier.color });
  sndPower();
}

/** Yıkım / geri dönüşüm: binayı kaldır, yatırılan toplamın %75'ini iade et. */
function demolishBuilding(b) {
  const idx = buildings.indexOf(b);
  if (idx < 0) return;
  const refund = Math.round(investedTotal(b) * 0.75);
  food += refund;
  buildings.splice(idx, 1);
  if (upgradeMenu === b) upgradeMenu = null;
  const w = worldFromGrid(b.gridX, b.gridY);
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#c0c0c0', maxR: 46 });
  burst(w.x, w.y, '#d05050', 10);
  sndCatch();
}

function drawRadialMenu() {
  if (!radialMenu) return;
  const { x, y } = toScreen(radialMenu.col, radialMenu.row);
  const n = BUILDING_TYPES.length;
  ctx.save();
  for (let i = 0; i < n; i++) {
    const { ix, iy } = radialIconPos(x, y, i, n);
    const type   = BUILDING_TYPES[i];
    const cfg    = CONFIG.BUILDINGS[type];
    // Kurulabilirlik üç koşul: yem + limit (canBuild) + konum izni (yuva-çevresi).
    const afford    = food >= cfg.cost;
    const limitFull = cfg.maxCount != null && buildingCount(type) >= cfg.maxCount;
    const placeOK   = canPlaceTypeAt(type, radialMenu.col, radialMenu.row);
    const enabled   = afford && !limitFull && placeOK;

    // Daire dolgusu — SADECE dolguya drop shadow (enabled belirgin, disabled hafif)
    ctx.save();
    ctx.globalAlpha = enabled ? 1 : 0.42;
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = enabled ? 3 : 1.5;
    ctx.shadowOffsetY = 1;
    ctx.fillStyle = enabled ? 'rgba(30,22,10,0.93)' : 'rgba(50,15,15,0.88)';
    ctx.beginPath(); ctx.arc(ix, iy, RADIAL_IR, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Kenarlık + emoji + etiket — gölgesiz; disabled'da geneli kıs
    ctx.save();
    ctx.globalAlpha = enabled ? 1 : 0.42;
    ctx.strokeStyle = enabled ? HUD.gold : '#7a3030';
    ctx.lineWidth   = 1.8;
    ctx.beginPath(); ctx.arc(ix, iy, RADIAL_IR, 0, Math.PI * 2); ctx.stroke();

    ctx.font         = '16px sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle    = '#fff';
    ctx.fillText(cfg.emoji, ix, iy + 2);

    // Etiket: limit dolu → "DOLU", yuva-çevresi değil → "YUVA", yoksa fiyat.
    ctx.font         = 'bold 10px ' + HUD.font;
    ctx.textBaseline = 'alphabetic';
    if (!enabled) ctx.globalAlpha = 1; // uyarı/fiyat net (daire soluk kalır)
    ctx.fillStyle    = enabled ? HUD.affordText : HUD.cantAfford;
    const label = limitFull ? 'DOLU' : (!placeOK ? 'YUVA' : cfg.cost);
    ctx.fillText(label, ix, iy + RADIAL_IR + 13);
    ctx.restore();
  }
  ctx.restore();
}

function radialHit(sx, sy) {
  if (!radialMenu) return null;
  const { x, y } = toScreen(radialMenu.col, radialMenu.row);
  const n = BUILDING_TYPES.length;
  for (let i = 0; i < n; i++) {
    const { ix, iy } = radialIconPos(x, y, i, n);
    if (Math.hypot(sx - ix, sy - iy) <= RADIAL_IR) return BUILDING_TYPES[i];
  }
  return null;
}

function placeBuilding(type) {
  const { col, row } = radialMenu;
  const cfg = CONFIG.BUILDINGS[type];
  food -= cfg.cost;
  buildings.push(new Building(type, col, row));
  const w = worldFromGrid(col, row);
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0 });
  radialMenu = null;
}

function drawBuildPulses(dts) {
  for (let i = buildPulses.length - 1; i >= 0; i--) {
    const p = buildPulses[i];
    p.life -= 0.038 * dts;
    if (p.life <= 0) { buildPulses.splice(i, 1); continue; }
    const s = screenFromWorld(p.wx, p.wy);
    // maxR/c verilmezse eski yerleştirme dalgası davranışı (yeşil, 40px)
    const r = (1 - p.life) * (p.maxR || 40) * camera.scale;
    ctx.save();
    ctx.globalAlpha = p.life * (p.a || 0.75);
    ctx.strokeStyle = p.c || '#7fff5a';
    ctx.lineWidth   = p.w || 2.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, Math.max(2, r), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

/**
 * Ranger mermileri: hedefe doğru uç, ~18px temas → hasar uygula (ölürse killEnemy),
 * mermiyi sil. Hedef ölmüş/yok olmuşsa mermi de düşer. dts = frame-ölçekli delta.
 */
function updateBullets(dts) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const m = bullets[i];
    const e = m.target;
    // Hedef yok olduysa (öldü/devre dışı) mermiyi sil
    if (!e || !e.active) { bullets.splice(i, 1); continue; }
    m.wx += m.vx * dts;
    m.wy += m.vy * dts;
    const dx = e.wx - m.wx, dy = e.wy - m.wy;
    if (dx * dx + dy * dy <= 18 * 18) { // temas
      if (m.aoe) {
        // CATAPULT güllesi: temas noktasında aoeRadius içindeki TÜM aktif düşmanlara
        // hasar (tower AOE zehir mantığı gibi). Görsel: geniş turuncu+gri patlama.
        const cx = e.wx, cy = e.wy;
        const ar2 = m.aoeRadius * m.aoeRadius;
        for (const en of enemies) {
          if (!en.active) continue;
          if ((en.wx - cx) ** 2 + (en.wy - cy) ** 2 > ar2) continue;
          en.hp -= m.dmg;
          if (en.hp <= 0) killEnemy(en);
        }
        burst(cx, cy, '#ff8a3a', 16); // büyük turuncu patlama (ağır vuruş)
        burst(cx, cy, '#9a9a9a', 8);  // gri toz/şarapnel
        buildPulses.push({ wx: cx, wy: cy, life: 1.0, c: '#ff9a4a', maxR: m.aoeRadius });
      } else {
        e.hp -= m.dmg; // RANGER: tek hedef (değişmedi)
        burst(e.wx, e.wy, '#ffd24a', 4);
        if (e.hp <= 0) killEnemy(e);
      }
      bullets.splice(i, 1);
    }
  }
}

/**
 * Dungbeetle topları (enemyShots): hedef BİNAYA doğru uç, ~14px temas → hasar;
 * yıkılırsa destroyBuildingByEnemy (iade YOK). Hedef yıkılmış/silinmişse veya
 * life sayacı biterse top düşer. bullets'tan TAMAMEN AYRI — ona dokunulmadı.
 */
function updateEnemyShots(dts) {
  for (let i = enemyShots.length - 1; i >= 0; i--) {
    const m = enemyShots[i];
    const b = m.tgtB;
    // Bina hedefli shot: hedef yıkılmış/listeden çıkmışsa top düşer.
    // isNest shot'ında tgtB null — bu kontrol atlanır (yuva yok olmaz).
    if (!m.isNest && (!b || b.hp <= 0 || !buildings.includes(b))) { enemyShots.splice(i, 1); continue; }
    m.life -= dts; // sonsuz uçuş koruması (~10sn @60fps)
    if (m.life <= 0) { enemyShots.splice(i, 1); continue; }
    m.wx += m.vx * dts;
    m.wy += m.vy * dts;
    const w = m.isNest ? nestW : worldFromGrid(b.gridX, b.gridY);
    const dx = w.x - m.wx, dy = w.y - m.wy;
    if (dx * dx + dy * dy < 14 * 14) { // çarpma
      if (m.isNest) {
        // ÜÇLÜ KALIP (boss yuvada dövme deseni): HP düş + flash + endGame kontrolü
        hudQueenHP -= m.dmg;
        sndQueenHurt();
        queenFlash = 1;
        floatTexts.push({ wx: nestW.x, wy: nestW.y, life: 1.0, text: '-' + m.dmg, color: '#ff5a4a' });
        burst(nestW.x, nestW.y, '#6b4a2a', 12);
        if (hudQueenHP <= 0) { hudQueenHP = 0; endGame(score, wave); }
      } else {
        b.hp -= m.dmg;
        floatTexts.push({ wx: m.wx, wy: m.wy, life: 1.0, text: '-' + m.dmg, color: '#ff8a3a' });
        burst(m.wx, m.wy, '#6b4a2a', 10);
        if (b.hp <= 0) destroyBuildingByEnemy(b);
      }
      enemyShots.splice(i, 1);
    }
  }
}

/** Mermileri küçük sarı/turuncu çizgi olarak çiz (kamera-aware, depth-sort yok). */
function drawBullets() {
  if (!bullets.length) return;
  ctx.save();
  ctx.lineCap = 'round';
  for (const m of bullets) {
    const s = screenFromWorld(m.wx, m.wy);
    // catapult güllesi kalın/gri-turuncu, ranger merminden belirgin daha ağır görünür
    // renk seviyeye göre (LVL_TIER); m.lvl yoksa eski sabit renklere düş
    const tier = (m.lvl && LVL_TIER[m.lvl - 1]) ? LVL_TIER[m.lvl - 1].color : null;
    if (m.aoe) {
      ctx.lineWidth   = 6 + (m.lvl ? (m.lvl - 1) * 0.7 : 0); // mancınık: hep kalın, seviyeyle biraz daha
      ctx.strokeStyle = tier || '#c8783c';
    } else {
      ctx.lineWidth   = 3;
      ctx.strokeStyle = tier || '#ffd24a';
    }
    // kısa kuyruk (hız yönünün tersi) → mermi hissi, her-frame ağır iş yok
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - m.vx * camera.scale, s.y - m.vy * camera.scale);
    ctx.stroke();
  }
  ctx.restore();
}

/** Dungbeetle toplarını çiz: kahverengi dolu daire + koyu leke (leke açısı konuma
 *  bağlı → uçarken dönüyor hissi). Kamera-aware, depth-sort yok (drawBullets gibi). */
function drawEnemyShots() {
  if (!enemyShots.length) return;
  for (const m of enemyShots) {
    const sp = screenFromWorld(m.wx, m.wy);
    const r  = m.size * camera.scale * 0.7;
    ctx.fillStyle = '#6b4a2a';
    ctx.beginPath(); ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2); ctx.fill();
    const a = (m.wx + m.wy) * 0.1; // dönme hissi: açı konuma bağlı
    ctx.fillStyle = '#4a3018';
    ctx.beginPath();
    ctx.arc(sp.x + Math.cos(a) * r * 0.5, sp.y + Math.sin(a) * r * 0.5, Math.max(1, r * 0.25), 0, Math.PI * 2);
    ctx.fill();
  }
}

/** Upgrade anı "Sv X!" metinleri — yukarı kayıp solar (~0.8sn). Kamera-aware. */
function drawFloatTexts(dts) {
  if (!floatTexts.length) return;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= 0.025 * dts;                 // ~0.83sn ömür (60fps'de 40 frame)
    if (f.life <= 0) { floatTexts.splice(i, 1); continue; }
    const s    = screenFromWorld(f.wx, f.wy);
    const rise = (1 - f.life) * 34 * camera.scale; // yukarı kayma
    const yy   = s.y - 22 * camera.scale - rise;
    ctx.globalAlpha = Math.min(1, f.life * 1.8);
    ctx.font = 'bold ' + Math.round(15 * camera.scale) + 'px -apple-system, sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeText(f.text, s.x, yy);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, s.x, yy);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ===== PARTICLES (TAŞINDI — havuzlandı) =====
const particles = [];
/** Spawn a burst of particles at world coord */
function burst(wx, wy, color, n = 8) {
  for (let i = 0; i < n; i++) {
    let p = particles.find(q => !q.active);
    if (!p) { if (particles.length >= CONFIG.POOL.PARTICLES) break; p = {}; particles.push(p); }
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 2.5;
    p.wx = wx; p.wy = wy; p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
    p.life = 1; p.c = color; p.active = true;
  }
}

// ===== COLONY: Ant =====
/**
 * Autonomous ant. type ∈ 'worker'|'soldier'|'carrier'.
 * task ∈ 'forage'|'return'|'guard'|'idle'.
 */
class Ant {
  constructor() { this.active = false; this.uid = _uid++; }
  /** (Re)initialize a pooled ant */
  init(type) {
    this.type = type;
    this.wx = nestW.x; this.wy = nestW.y;
    this.angle = Math.random() * Math.PI * 2;
    this.carrying = null;
    this.wig = Math.random() * 10;
    this.active = true;
    this.baseSpeed = CONFIG.ANT.BASE_SPEED * (type === 'carrier' ? CONFIG.ANT.CARRIER_SPEED : 1);
    this.task = type === 'soldier' ? 'guard' : 'forage';
    this.stuck = 0; // frames spent barely moving
  }
  /** Effective speed (world px / frame-equiv) */
  get speed() {
    let s = this.baseSpeed * (speedTimer > 0 ? CONFIG.ANT.SPEED_BOOST : 1);
    return this.carrying ? s * TYPES[this.carrying].speed : s;
  }
  /** @param {number} dts delta-time scale (1.0 == 60fps frame) */
  update(dts) {
    const px = this.wx, py = this.wy;

    if (this.type === 'soldier') this.updateGuard(dts);
    else this.updateForage(dts);

    // Stuck detection — barely moved for ~1.5s → kick free with new heading
    const moved = Math.hypot(this.wx - px, this.wy - py);
    if (moved < 0.15 * dts) this.stuck += dts; else this.stuck = 0;
    if (this.stuck > 90) {
      // Steer toward nest center with wide jitter so it always re-mobilizes
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 1.4;
      this.stuck = 0;
    }
  }
  /** Worker / Carrier behavior (mevcut forage→return döngüsü) */
  updateForage(dts) {
    let target = null;
    if (this.carrying) {
      target = { x: nestW.x, y: nestW.y };
      addP(this.wx, this.wy, CONFIG.PHEROMONE.DEPOSIT * dts);
    } else {
      let near = null, nd = CONFIG.ANT.SENSE_RANGE * CONFIG.ANT.SENSE_RANGE;
      for (const f of foods) {
        if (this.type === 'carrier' && f.type === 'leaf') continue; // carrier leaf'i yok sayar
        const d = (f.wx - this.wx) ** 2 + (f.wy - this.wy) ** 2;
        if (d < nd) { nd = d; near = f; }
      }
      if (near) target = { x: near.wx, y: near.wy };
      else { const dir = senseP(this); if (dir !== null) this.angle += aDiff(dir, this.angle) * 0.15 * dts; }
    }
    if (target) {
      const des = Math.atan2(target.y - this.wy, target.x - this.wx);
      this.angle += aDiff(des, this.angle) * 0.1 * dts;
    } else if (senseP(this) === null) {
      this.angle += (Math.random() - 0.5) * 0.4 * dts;
    }
    this.step(dts);

    // Pickup
    if (!this.carrying) {
      for (let i = foods.length - 1; i >= 0; i--) {
        if (this.type === 'carrier' && foods[i].type === 'leaf') continue;
        const dx = this.wx - foods[i].wx, dy = this.wy - foods[i].wy;
        if (dx * dx + dy * dy < 120) {
          this.carrying = foods[i].type; foods.splice(i, 1);
          this.angle += Math.PI; sndFood(); break;
        }
      }
    } else {
      // Deposit at nest
      const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
      if (dx * dx + dy * dy < NEST_WORLD_R * NEST_WORLD_R) {
        let pts = TYPES[this.carrying].pts;
        if (this.type === 'carrier') pts = Math.round(pts * 1.5); // carrier ×1.5
        burst(this.wx, this.wy, TYPES[this.carrying].c2);
        this.carrying = null; this.angle += Math.PI;
        food += pts; sndDeposit();
      }
    }
  }
  /**
   * Soldier: GENİŞ algılama menzilinde (DETECT_RANGE) düşman görürse üstüne
   * KOŞAR, ancak DAR saldırı menzilinde (SOLDIER_RANGE) HASAR verir. Hedef
   * seçimi "en yakın + yük cezası" ile yapılır → soldier'lar tek düşmana
   * yığılmaz, otomatik farklı hedeflere dağılır. Yuvadan DETECT_RANGE'den
   * fazla uzaklaşmaz (leash) → yuva savunmasız kalmaz.
   */
  updateGuard(dts) {
    const DET   = CONFIG.ANT.SOLDIER_DETECT_RANGE;
    const ATK   = CONFIG.ANT.SOLDIER_RANGE;
    const DET2  = DET * DET, ATK2 = ATK * ATK;
    const LOAD_PENALTY = 110 * 110; // her ek soldier, hedefi ~110px daha "uzak" sayar

    const distNest = Math.hypot(this.wx - nestW.x, this.wy - nestW.y);

    // Yuvadan çok uzaklaşmadıysa hedef ara (aksi halde leash → guard'a dön)
    let best = null;
    if (distNest <= DET) {
      let bestScore = Infinity;
      for (const e of enemies) {
        if (!e.active) continue;
        const d2 = (e.wx - this.wx) ** 2 + (e.wy - this.wy) ** 2;
        if (d2 > DET2) continue; // algılama menzili dışında
        // Kalabalık hedefe ceza ekle → fazlalık soldier bir sonraki en yakına kayar
        const load  = _enemyLoad.get(e.uid) || 0;
        const score = d2 + load * LOAD_PENALTY;
        if (score < bestScore) { bestScore = score; best = e; }
      }
    }

    if (best) {
      _enemyLoad.set(best.uid, (_enemyLoad.get(best.uid) || 0) + 1); // bu hedefe atandık
      const d2  = (best.wx - this.wx) ** 2 + (best.wy - this.wy) ** 2;
      const des = Math.atan2(best.wy - this.wy, best.wx - this.wx);
      this.angle += aDiff(des, this.angle) * 0.18 * dts;
      this.step(dts);
      // Yalnızca SALDIRI menzilinde hasar ver (~SOLDIER_DPS/sn, dts ile ölçekli)
      if (d2 <= ATK2) {
        best.hp -= (CONFIG.ANT.SOLDIER_DPS / 60) * dts;
        if (best.hp <= 0) killEnemy(best);
      }
      return;
    }

    // Düşman yok / leash dışı → eski guard/devriye davranışı (yuvaya dön)
    const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
    if (distNest > CONFIG.ANT.GUARD_RADIUS) {
      const des = Math.atan2(-dy, -dx);
      this.angle += aDiff(des, this.angle) * 0.08 * dts;
    } else {
      this.angle += (Math.random() - 0.5) * 0.25 * dts;
    }
    this.step(dts);
  }
  /**
   * Advance position, then HARD-clamp into the diamond grid area.
   * Bounds are checked in grid (col,row) space (the real playable diamond),
   * not the rectangular world bbox. On edge contact the heading is steered
   * toward the nest center so corners can never lock the ant.
   */
  step(dts) {
    this.wig += 0.3 * dts;
    this.wx += Math.cos(this.angle) * this.speed * dts;
    this.wy += Math.sin(this.angle) * this.speed * dts;

    // world → grid (inverse of worldFromGrid)
    const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
    let col = this.wx / TW + this.wy / TH;
    let row = this.wy / TH - this.wx / TW;

    const lo = 0.3;
    const hiC = CONFIG.GRID.COLS - 1 - 0.3;
    const hiR = CONFIG.GRID.ROWS - 1 - 0.3;
    let outside = false;
    if (col < lo)  { col = lo;  outside = true; }
    if (col > hiC) { col = hiC; outside = true; }
    if (row < lo)  { row = lo;  outside = true; }
    if (row > hiR) { row = hiR; outside = true; }

    if (outside) {
      // Hard clamp position back inside the diamond
      const w = worldFromGrid(col, row);
      this.wx = w.x; this.wy = w.y;
      // Reflect heading inward — steer toward nest center (+ jitter)
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 0.6;
    }
  }
  /** Draw at screen position (camera-aware) */
  draw() {
    const s = screenFromWorld(this.wx, this.wy);
    drawAntFull(s.x, s.y, this.angle, this.wig, this.type, this.carrying, camera.scale);
  }
}

// Ant pool
const ants = [];
/** Spawn (or recycle) an ant of given type */
function spawnAnt(type) {
  let a = ants.find(x => !x.active);
  if (!a) { if (ants.length >= CONFIG.POOL.ANTS) return null; a = new Ant(); ants.push(a); }
  a.init(type); return a;
}
/** Count active ants */
function antCount() { let n = 0; for (const a of ants) if (a.active) n++; return n; }

// ===== ANT RENDER (mevcut kızıl-turuncu gölgeli stil, tiplere göre) =====
/**
 * Full ant render with shadow, body, legs, eyes, cargo.
 * @param {number} x @param {number} y screen px
 * @param {number} angle @param {number} wig
 * @param {string} type @param {?string} carrying @param {number} cam camera scale
 */
function drawAntFull(x, y, angle, wig, type, carrying, cam) {
  const sc = (type === 'soldier' ? CONFIG.ANT.SOLDIER_SCALE : 1) * cam;
  const body = type === 'soldier' ? '#8b1a1a' : type === 'carrier' ? '#c8a020' : '#e8542a';
  const dark = type === 'soldier' ? '#5e0f0f' : type === 'carrier' ? '#9a7a10' : '#c23d18';

  // Shadow — save/restore yerine alpha'yı elle ayarla/sıfırla (daha az state cost)
  ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x, y + 3.5 * sc, 8 * sc, 4.5 * sc, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.sin(wig) * 0.15);
  ctx.scale(sc, sc);

  if (shieldTimer > 0) {
    ctx.strokeStyle = 'rgba(143,208,255,0.7)'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
  }

  // Legs (6) — wiggle
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  const lw = Math.sin(wig) * 1.5;
  for (const lx of [-2, 1, 4]) {
    ctx.beginPath();
    ctx.moveTo(lx, -2); ctx.lineTo(lx - 1, -5 - lw);
    ctx.moveTo(lx, 2);  ctx.lineTo(lx - 1, 5 + lw);
    ctx.stroke();
  }

  // Body
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(-6, 0, 4.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(6, 0, 2, 0, Math.PI * 2); ctx.fill();

  // Soldier jaws (2 ek path)
  if (type === 'soldier') {
    ctx.strokeStyle = '#3a0808'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(9, -1.5); ctx.lineTo(12.5, -3);
    ctx.moveTo(9, 1.5); ctx.lineTo(12.5, 3); ctx.stroke();
  }

  // Antennae
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(7, -1.2); ctx.lineTo(11, -3.5);
  ctx.moveTo(7, 1.2); ctx.lineTo(11, 3.5); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#fff'; ctx.beginPath();
  ctx.arc(7, -1.4, 1, 0, Math.PI * 2); ctx.arc(7, 1.4, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath();
  ctx.arc(7.3, -1.4, 0.5, 0, Math.PI * 2); ctx.arc(7.3, 1.4, 0.5, 0, Math.PI * 2); ctx.fill();

  // Cargo
  if (carrying) {
    const t = TYPES[carrying];
    if (type === 'carrier') {
      // sırtta küçük kare
      ctx.fillStyle = t.c;  ctx.fillRect(-8, -3, 5, 6);
      ctx.fillStyle = t.c2; ctx.fillRect(-7.5, -2.5, 2, 2);
    } else {
      ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(9, 0, t.r - 1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(8.4, -0.6, (t.r - 1) * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

// Kule okcusu: yukaridan bakilan DIK okcu karinca (platformdan tasmaz).
// cx,cy ekran noktasi, ang nisan acisi, sc olcek, recoil 0..1, breathe nefes ofseti
function drawTowerArcher(cx, cy, ang, sc, recoil, breathe) {
  const body = '#8b1a1a', dark = '#5e0f0f';
  ctx.save();
  ctx.translate(cx, cy + breathe);
  ctx.scale(sc, sc);

  // Govde + kafa SABIT (dik durur, donmez) — sadece kollar/yay doner.
  // Yukaridan gorunum: kompakt oval govde + ust uste kafa.
  // Golge (kucuk, ayakta duranin altinda)
  ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 3, 5, 2.4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Abdomen (arka/alt) — dik durusta asagida
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(0, 2.2, 3.6, 4.2, 0, 0, Math.PI * 2); ctx.fill();
  // Thorax (gogus)
  ctx.beginPath(); ctx.ellipse(0, -1, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Kafa (en ustte, tepeden gorunur)
  ctx.beginPath(); ctx.arc(0, -4.5, 2.8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(0, -4.5, 1.5, 0, Math.PI * 2); ctx.fill();
  // Okcu kaski (kafanin ustune oturan metalik baslik)
  ctx.fillStyle = '#9aa3ad';                       // metal gri
  ctx.beginPath();
  ctx.arc(0, -4.8, 3.1, Math.PI, 0);               // kafayi orten yarim kubbe
  ctx.fill();
  ctx.fillStyle = '#c2cad3';                       // ust isik (parlaklik)
  ctx.beginPath();
  ctx.arc(0, -5.0, 3.1, Math.PI * 1.15, Math.PI * 1.6);
  ctx.lineWidth = 1.2; ctx.strokeStyle = '#c2cad3'; ctx.stroke();
  ctx.fillStyle = '#6b7280';                       // kask alt kenar bandi (koyu)
  ctx.fillRect(-3.1, -4.9, 6.2, 1.1);
  // tepe sivri ucu
  ctx.fillStyle = '#7d8690';
  ctx.beginPath();
  ctx.moveTo(0, -8.6); ctx.lineTo(-0.9, -7.4); ctx.lineTo(0.9, -7.4);
  ctx.closePath(); ctx.fill();
  // Gozler (tepeden, kafanin ust kenarinda)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-1.1, -5.2, 0.8, 0, Math.PI * 2);
  ctx.arc(1.1, -5.2, 0.8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-1.1, -5.4, 0.4, 0, Math.PI * 2);
  ctx.arc(1.1, -5.4, 0.4, 0, Math.PI * 2); ctx.fill();

  // KOLLAR + YAY: nisan yonune doner (govde sabit, sadece bu grup doner)
  ctx.save();
  ctx.rotate(ang);
  const bowX = 8;
  const pull = recoil * 2.0;
  // yay govdesi
  ctx.strokeStyle = '#7a4a1e'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(bowX, 0, 3.6, -Math.PI * 0.6, Math.PI * 0.6); ctx.stroke();
  // kollar (govdeden yaya uzanir)
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -1.5); ctx.lineTo(bowX - 0.5, -1.5);
  ctx.moveTo(0, 1.5);  ctx.lineTo(bowX - 0.5, 1.5);
  ctx.stroke();
  // yay ipi (gerilir)
  ctx.strokeStyle = 'rgba(240,235,220,0.9)'; ctx.lineWidth = 0.7;
  const ty = Math.sin(Math.PI * 0.6) * 3.6, tx = Math.cos(Math.PI * 0.6) * 3.6;
  ctx.beginPath();
  ctx.moveTo(bowX + tx, -ty);
  ctx.lineTo(bowX - pull, 0);
  ctx.lineTo(bowX + tx, ty);
  ctx.stroke();
  // ok
  ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.moveTo(bowX - pull, 0); ctx.lineTo(bowX + 4.5 - pull, 0); ctx.stroke();
  ctx.fillStyle = '#ffe07a';
  ctx.beginPath();
  ctx.moveTo(bowX + 4.5 - pull, 0);
  ctx.lineTo(bowX + 3 - pull, -1);
  ctx.lineTo(bowX + 3 - pull, 1);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// ===== BOSS RENDER (Faz 2B P2) — kod-çizimli devasa OYNAK akrep (emoji YOK) =====
/**
 * Devasa zehirli akrep. Karıncayla AYNI animasyon tekniği: tek Math.sin(wig)
 * salınımı → gövde sallanması + bacak/kıskaç/kuyruk oynaması. YENİ zaman kaynağı
 * KURMAZ; wig zaten Enemy.step içinde artar. Alan saldırısı/halka/ses YOK (P3).
 * @param {number} x @param {number} y screen px @param {number} angle
 * @param {number} wig salınım fazı @param {number} cam camera scale
 */
function drawBoss(x, y, angle, wig, cam) {
  const BS = cam * 3;                 // boss devasa: karınca ölçeğinin ~3 katı
  const body   = '#3a1a4d';           // koyu mor gövde
  const dark   = '#1f0d2e';           // koyu kenar/segment
  const accent = '#6a3a8a';           // vurgu mor
  const sting  = '#b070e0';           // iğne ucu parlak mor

  // Salınımlar — hepsi tek wig'ten (ağır/heybetli his için katsayılar küçük/yavaş)
  const sway    = Math.sin(wig) * 0.06;         // gövde sallanması (karıncadan hafif)
  const legSw   = Math.sin(wig) * 2.2;          // bacak ucu açılımı
  const clawOpn = (Math.sin(wig) + 1) * 0.5;    // 0..1 kıskaç açılıp kapanması
  const tailWg  = Math.sin(wig * 0.8) * 0.18;   // kuyruk ucu ağır sallanma

  // Gölge (boss büyük → geniş; alpha elle ayarla/sıfırla)
  ctx.globalAlpha = 0.3; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x, y + 6 * BS, 16 * BS, 8 * BS, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + sway);
  ctx.scale(BS, BS);

  // --- 8 BACAK (yanlarda 4'er, sol/sağ zıt faz → yürüyüş hissi) ---
  ctx.strokeStyle = dark; ctx.lineWidth = 1.3; ctx.lineCap = 'round';
  const legX = [3, 1, -1, -3];
  for (let i = 0; i < legX.length; i++) {
    const bx = legX[i];
    const ph = (i % 2 === 0) ? legSw : -legSw;   // komşu bacaklar zıt → bacaklar "adımlar"
    // sol bacak (-y)
    ctx.beginPath();
    ctx.moveTo(bx, -3); ctx.lineTo(bx - 1 + ph, -7); ctx.lineTo(bx - 3 + ph, -9);
    ctx.stroke();
    // sağ bacak (+y) — zıt faz
    ctx.beginPath();
    ctx.moveTo(bx, 3); ctx.lineTo(bx - 1 - ph, 7); ctx.lineTo(bx - 3 - ph, 9);
    ctx.stroke();
  }

  // --- İKİ ÖN KISKAÇ (pedipalp): öne uzanan kol + açılıp kapanan çatallı pençe ---
  for (const sgn of [-1, 1]) {
    const ay = sgn * 3;                  // kolun gövdeden çıkış y'si
    ctx.strokeStyle = dark; ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(4, ay); ctx.lineTo(9, sgn * 5); ctx.lineTo(13, sgn * 4); // dirsekli kol
    ctx.stroke();
    // pençe gövdesi (oval) + açılıp kapanan iki parmak
    ctx.fillStyle = accent;
    ctx.beginPath(); ctx.ellipse(14, sgn * 4, 2.4, 1.6, sgn * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = dark; ctx.lineWidth = 1.2;
    const open = clawOpn * 1.6;
    ctx.beginPath();
    ctx.moveTo(15.4, sgn * 3.4); ctx.lineTo(18, sgn * (3.4 - open));      // üst parmak
    ctx.moveTo(15.4, sgn * 4.6); ctx.lineTo(18, sgn * (5.0 + open));      // alt parmak
    ctx.stroke();
  }

  // --- GÖVDE (sefalotoraks + abdomen birleşik 3 oval) ---
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(-7, 0, 5.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();   // abdomen (arka, geniş)
  ctx.beginPath(); ctx.ellipse(-1, 0, 5, 4, 0, 0, Math.PI * 2); ctx.fill();        // orta
  ctx.beginPath(); ctx.ellipse(4, 0, 4, 3.2, 0, 0, Math.PI * 2); ctx.fill();       // sefalotoraks (ön/baş)
  // zehirli vurgu noktaları (sırt)
  ctx.fillStyle = accent;
  ctx.beginPath(); ctx.arc(-7, 0, 1.6, 0, Math.PI * 2); ctx.arc(-1, 0, 1.3, 0, Math.PI * 2); ctx.fill();
  // gözler (ön)
  ctx.fillStyle = sting;
  ctx.beginPath(); ctx.arc(6, -1.4, 0.9, 0, Math.PI * 2); ctx.arc(6, 1.4, 0.9, 0, Math.PI * 2); ctx.fill();

  // --- SEGMENTLİ KUYRUK: arkadan yukarı/öne kıvrılan 5 segment + sivri iğne ---
  // Gövde arkasından (-x) başlar, bir yay boyunca küçülerek kıvrılır; uç wig ile sallanır.
  const baseAng = Math.PI;                         // arkaya doğru başla
  const seg = 5;
  let px = -11, py = 0;                             // kuyruk kök noktası (abdomen arkası)
  let a  = baseAng;
  const step = 0.55;                               // her segmentte kıvrılma açısı
  const segLen = [3.4, 3.0, 2.6, 2.2, 1.8];        // küçülen segment uzunlukları
  const segR   = [3.0, 2.5, 2.0, 1.6, 1.2];        // küçülen segment yarıçapları
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  for (let i = 0; i < seg; i++) {
    // ucа yaklaştıkça wig sallanması artsın (canlı kuyruk)
    a += step + tailWg * (i / seg);
    const nx = px + Math.cos(a) * segLen[i];
    const ny = py + Math.sin(a) * segLen[i];
    ctx.fillStyle = i % 2 === 0 ? body : accent;
    ctx.beginPath(); ctx.ellipse(nx, ny, segR[i], segR[i] * 0.85, a, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(nx, ny, segR[i], 0, Math.PI * 2); ctx.stroke();
    px = nx; py = ny;
  }
  // İĞNE — uçta parlak mor sivri üçgen
  a += step + tailWg;
  const tx = px + Math.cos(a) * 3.2, ty = py + Math.sin(a) * 3.2;
  const perp = a + Math.PI / 2;
  ctx.fillStyle = sting;
  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(px + Math.cos(perp) * 1.4, py + Math.sin(perp) * 1.4);
  ctx.lineTo(px - Math.cos(perp) * 1.4, py - Math.sin(perp) * 1.4);
  ctx.closePath(); ctx.fill();

  ctx.lineCap = 'butt';   // state'i nötrle (sızdırma yok)
  ctx.restore();
}

// ===== COLONY DRAW HELPERS (pheromone, food, particles) =====
/** Draw pheromone overlay (world cells → screen rects) + decay */
function drawPheromone() {
  if (!PH.grid) return;
  const cell = PCELL * camera.scale;
  for (let cy = 0; cy < PH.rows; cy++) {
    for (let cx = 0; cx < PH.cols; cx++) {
      const i = cy * PH.cols + cx;
      const v = PH.grid[i];
      if (v > 0.5) {
        const wx = WORLD.minX + cx * PCELL, wy = WORLD.minY + cy * PCELL;
        const s = screenFromWorld(wx, wy);
        if (s.x + cell < 0 || s.x > W || s.y + cell < 0 || s.y > H) { PH.grid[i] *= CONFIG.PHEROMONE.DECAY; continue; }
        ctx.fillStyle = 'rgba(120,200,110,' + Math.min(v / 60, 0.35) * 0.25 + ')';
        ctx.fillRect(s.x, s.y, cell + 1, cell + 1);
        PH.grid[i] *= CONFIG.PHEROMONE.DECAY;
      } else PH.grid[i] = 0;
    }
  }
}
/** Draw a single food item (used by depth-sorted pass) */
function drawFood(f) {
  const s = screenFromWorld(f.wx, f.wy);
  const t = TYPES[f.type], cam = camera.scale;
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(s.x, s.y + 2 * cam, t.r * cam, t.r * 0.5 * cam, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(s.x, s.y, t.r * cam, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(s.x - t.r * 0.3 * cam, s.y - t.r * 0.3 * cam, t.r * 0.4 * cam, 0, Math.PI * 2); ctx.fill();
}
/** Programatik power-up çizimi (emoji YOK): zemin gölgesi + bob + parlak halka + kind şekli. */
function drawPowerup(p) {
  const cam = camera.scale;
  const bob = Math.sin(p.age * 0.005) * 3;          // yukarı-aşağı salınım (dünya px)
  const s   = screenFromWorld(p.wx, p.wy - bob);    // gövde (bob'lu)
  const sg  = screenFromWorld(p.wx, p.wy);          // gölge (yerde sabit)
  const r   = 11 * cam;

  // Zemin gölgesi
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(sg.x, sg.y + 3 * cam, r * 0.8, r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Toplanabilir parlak halka (alpha nabzı)
  const pulse = 0.30 + 0.30 * (0.5 + 0.5 * Math.sin(p.age * 0.008));
  ctx.globalAlpha = pulse;
  ctx.strokeStyle = p.kind === 'speed' ? '#ffe08f' : '#fff6e0';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(s.x, s.y, r + 4 * cam, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 1;

  if (p.kind === 'speed') {
    // Altın taban disk
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c8962a'; ctx.lineWidth = 1.5; ctx.stroke();
    // Şimşek (zig-zag poligon)
    ctx.fillStyle = '#fffbe0';
    ctx.beginPath();
    ctx.moveTo(s.x + 2.0 * cam, s.y - 7 * cam);
    ctx.lineTo(s.x - 4.0 * cam, s.y + 1 * cam);
    ctx.lineTo(s.x - 0.5 * cam, s.y + 1 * cam);
    ctx.lineTo(s.x - 2.0 * cam, s.y + 7 * cam);
    ctx.lineTo(s.x + 4.0 * cam, s.y - 1 * cam);
    ctx.lineTo(s.x + 0.5 * cam, s.y - 1 * cam);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#9a6a10'; ctx.lineWidth = 0.8; ctx.stroke();
  } else {
    // Yumurta: krem oval (hafif uzun) + ince kontur
    ctx.fillStyle = '#f5ead0';
    ctx.beginPath(); ctx.ellipse(s.x, s.y, r * 0.72, r * 0.95, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#c9b68a'; ctx.lineWidth = 1.2; ctx.stroke();
    // Üst parlama
    ctx.fillStyle = '#fffdf6';
    ctx.beginPath(); ctx.ellipse(s.x - r * 0.2, s.y - r * 0.35, r * 0.22, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
  }
}
/** Update + draw particles (world space) */
function drawParticles(dts) {
  for (const p of particles) {
    if (!p.active) continue;
    p.wx += p.vx * dts; p.wy += p.vy * dts;
    p.vx *= 0.96; p.vy *= 0.96; p.life -= 0.04 * dts;
    if (p.life <= 0) { p.active = false; continue; }
    const s = screenFromWorld(p.wx, p.wy);
    ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.2 * camera.scale, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== ENEMIES (Faz 2A) =====
// Düşmanlar Ant ile aynı "world" uzayda yaşar (wx/wy), aynı diamond-clamp ile
// grid içinde kalır ve aynı (wy + uid) derinlik sıralamasına katılır → flicker yok.
let score = 0; // koşu boyu biriken skor (düşman ödülleri); GAMEOVER'da kullanılır

/** Grid kenarından (yuvadan uzak) rastgele bir spawn dünya-noktası seç */
function enemySpawnPoint() {
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  let col, row;
  switch (Math.floor(Math.random() * 4)) {
    case 0: col = 0;        row = Math.floor(Math.random() * ROWS); break;
    case 1: col = COLS - 1; row = Math.floor(Math.random() * ROWS); break;
    case 2: row = 0;        col = Math.floor(Math.random() * COLS); break;
    default: row = ROWS - 1; col = Math.floor(Math.random() * COLS); break;
  }
  return worldFromGrid(col, row);
}

class Enemy {
  constructor() { this.active = false; this.uid = _uid++; }
  /** (Re)initialize a pooled enemy. hpScale = dalga HP çarpanı. isBoss=true → boss çarpanları. */
  init(type, hpScale, isBoss = false) {
    const cfg = CONFIG.ENEMIES[type];
    const sp  = enemySpawnPoint();
    this.type     = type;
    this.wx = sp.x; this.wy = sp.y;
    this.isBoss   = isBoss;
    if (isBoss) {
      // Boss: dungbeetle tipinden türer; tanklı + sert + bol ödüllü (hız aynı).
      // Özel yetenek/saldırı/görsel YOK (sonraki parçalar). Sadece çarpanlar.
      this.maxHp    = cfg.hp * hpScale * 6;
      this.queenDmg = cfg.queenDmg * 2;
      this.reward   = cfg.reward * 5;
      this.speed    = cfg.speed * Math.min(0.5 + (wave - 1) * 0.125, 1.0);
    } else {
      this.maxHp    = cfg.hp * hpScale;
      this.speed    = cfg.speed * Math.min(0.5 + (wave - 1) * 0.125, 1.0);
      this.queenDmg = cfg.queenDmg;
      this.reward   = cfg.reward;
    }
    this.hp       = this.maxHp;
    this.emoji    = cfg.emoji;
    this.angle    = Math.atan2(nestW.y - this.wy, nestW.x - this.wx);
    this.wig      = Math.random() * 10;
    this.active   = true;
    this.slowMul  = 1;                              // moat o frame'deki hız çarpanı (kalıcı değil)
    this._side    = Math.random() < 0.5 ? 1 : -1;   // barikat etrafından sabit yönde dolaşmak için
    // Bina-yıkıcı alanları (sadece ladybug/dungbeetle'da set, diğerlerinde undefined→false)
    this.isBuildingBreaker = !!cfg.isBuildingBreaker;
    this.buildingDmg = cfg.buildingDmg || 0;
    this._atkAccum = 0;                             // saldırı hasar biriktirici (floatText throttle)
    this._atkTimer = 0;                             // saldırı efekt zamanlayıcı (dts birimi)
    this.atkTimer  = 0;                             // BOSS alan saldırısı periyot sayacı (dts birimi; boss değilse kullanılmaz)
    this.atNest    = false;                         // BOSS yuvaya vardı mı (yuvada durup kraliçeyi döver; boss değilse kullanılmaz)
    this.isMini    = false;                         // mini spider bayrağı (pool yeniden kullanımda eskisi taşınmasın)
    this.sizeMul   = 1;                             // çizim boyut çarpanı (mini spider 0.6, diğerleri 1)
    this.webTimer  = 0;                             // SPIDER ağ bırakma periyot sayacı (dts; spider değilse kullanılmaz)
    this.healTimer = 0;                             // LADYBUG şifa pulsu periyot sayacı (dts; ladybug değilse kullanılmaz)
    this.ballSize  = 0;                             // DUNGBEETLE topu 0..1 büyüme oranı (dungbeetle değilse kullanılmaz)
    this.ballGrow  = 0;                             // DUNGBEETLE topu büyüme sayacı (dts)
  }
  /** Düz steering ile yuva merkezine yürü; ulaşınca kraliçeye hasar ver. */
  update(dts) {
    // BOSS yuvada: hareket yok (step atlanır), animasyon sürer; alan saldırısı
    // döngüsü işler ve her periyotta kraliçeye EK sabit hasar verir. Boss sadece
    // HP'si bitince ölür (intihar yok).
    if (this.isBoss && this.atNest) {
      this.wig += 0.3 * dts; // step çağrılmıyor; sallanma animasyonu devam etsin
      this.atkTimer += dts;
      if (this.atkTimer >= 120) { // 120 dts ≈ 2sn @60fps
        this.atkTimer = 0;
        bossAreaAttack(this); // çevre binalara AOE aynen
        hudQueenHP -= BOSS_NEST_DMG;
        sndQueenHurt();
        queenFlash = 1;
        floatTexts.push({ wx: nestW.x, wy: nestW.y, life: 1.0, text: '-' + BOSS_NEST_DMG, color: '#ff5a4a' });
        if (hudQueenHP <= 0) { hudQueenHP = 0; endGame(score, wave); }
      }
      return;
    }

    // Moat yavaşlatma × ağ hızlandırma (spider ağlı tile'da 1.4) — tile bazlı, o frame'lik.
    // BIRD uçar: moat üstünden geçer, yavaşlamaz (ağ çarpanı spider-dışında zaten 1).
    this.slowMul = (this.type === 'bird') ? 1 : moatSlowAt(this.wx, this.wy) * webMulAt(this.wx, this.wy, this.type);

    // LADYBUG şifa pulsu (boss atkTimer deseni): ~3sn'de bir, 60px içindeki DİĞER
    // aktif düşmanlara +6 hp (maxHp clamp). En az 1 iyileşme olursa pembe halka + ses.
    // SADECE ana ladybug pulse atar — mini refakatçiler (isMini) atmaz.
    if (this.type === 'ladybug' && !this.isMini) {
      this.healTimer += dts;
      if (this.healTimer >= 180) { // 180 dts ≈ 3sn @60fps
        this.healTimer = 0;
        const R2 = 60 * 60;
        let healed = 0;
        for (const o of enemies) {
          if (!o.active || o === this || o.hp >= o.maxHp) continue;
          const dx = o.wx - this.wx, dy = o.wy - this.wy;
          if (dx * dx + dy * dy > R2) continue;
          const add = Math.min(6, o.maxHp - o.hp); // clamp: maxHp aşılmaz
          o.hp += add;
          floatTexts.push({ wx: o.wx, wy: o.wy, life: 1.0, text: '+' + Math.round(add), color: '#5aff8a' });
          healed++;
        }
        if (healed) {
          // boss'un yeşil halka deseni, pembe tonda (bossAreaAttack buildPulses kalıbı)
          buildPulses.push({ wx: this.wx, wy: this.wy, life: 1.0, c: '#ff6b9d', maxR: 75 });
          sndHeal();
        }
      }
    }

    // DUNGBEETLE (Faz2B P1+P2): yürürken önündeki top büyür, ~4 saniyede full (240 dts);
    // dolunca 240px içindeki EN YAKIN binaya fırlatılır (enemyShots) ve sıfırlanıp
    // yeniden büyür. Menzilde bina yoksa dolu bekler (her frame tekrar dener).
    // isMini guard ihtiyaten (ladybug dersi); isBoss guard ŞART — boss da dungbeetle
    // tipinden türer, kendi alan saldırısı var, gizli top atmasın.
    if (this.type === 'dungbeetle' && !this.isMini && !this.isBoss) {
      this.ballGrow += dts;
      this.ballSize = Math.min(1, this.ballGrow / 240);
      if (this.ballSize >= 1) {
        let best = null, bestD2 = 240 * 240; // menzil sınırı 240px (kare mesafe)
        for (const b of buildings) {
          const w = worldFromGrid(b.gridX, b.gridY);
          const dx = w.x - this.wx, dy = w.y - this.wy;
          const d2 = dx * dx + dy * dy;
          if (d2 < bestD2) { best = b; bestD2 = d2; }
        }
        // Hedef: önce en yakın bina (P2); menzilde bina YOKSA yuva (240px, P3);
        // ikisi de menzil dışıysa top dolu bekler (her frame yeniden dener).
        let tw = null, isNest = false;
        if (best) {
          tw = worldFromGrid(best.gridX, best.gridY);
        } else {
          const dxN = nestW.x - this.wx, dyN = nestW.y - this.wy;
          if (dxN * dxN + dyN * dyN < 240 * 240) { tw = nestW; isNest = true; }
        }
        if (tw) {
          const bwx = this.wx + Math.cos(this.angle) * 16; // P1'deki top konumu
          const bwy = this.wy + Math.sin(this.angle) * 16;
          const d = Math.hypot(tw.x - bwx, tw.y - bwy) || 1;
          enemyShots.push({
            wx: bwx, wy: bwy,
            vx: (tw.x - bwx) / d * 3.5, vy: (tw.y - bwy) / d * 3.5, // ~3.5 px/dts
            dmg: 25, tgtB: best, isNest, size: 12, life: 600 // isNest'te best=null
          });
          this.ballSize = 0; this.ballGrow = 0; // top atıldı, yeniden büyür
        }
      }
    }

    const des = Math.atan2(nestW.y - this.wy, nestW.x - this.wx);
    this.angle += aDiff(des, this.angle) * 0.12 * dts;
    this.step(dts);

    // SPIDER: yürürken ~0.75sn'de bir bulunduğu tile'a kalıcı ağ izi bırakır.
    if (this.type === 'spider') {
      this.webTimer += dts;
      if (this.webTimer >= 45) { // 45 dts ≈ 0.75sn @60fps
        this.webTimer = 0;
        addSpiderWeb(this.wx, this.wy);
      }
    }

    // BOSS: yürürken ~2sn'de bir alan saldırısı (bina hasarı). Normal düşman ETKİLENMEZ.
    if (this.isBoss) {
      this.atkTimer += dts;
      if (this.atkTimer >= 120) { // 120 dts ≈ 2sn @60fps
        this.atkTimer = 0;
        bossAreaAttack(this);
      }
    }

    const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
    if (dx * dx + dy * dy < NEST_WORLD_R * NEST_WORLD_R) {
      if (this.isBoss) {
        // Boss intihar etmez: yuva kenarında durup kraliçeyi dövmeye başlar.
        this.atNest = true;
      } else {
        hudQueenHP -= this.queenDmg;
        sndQueenHurt();
        this.active = false;
        queenFlash = 1;
        burst(this.wx, this.wy, '#c81e14', 8);
        if (hudQueenHP <= 0) { hudQueenHP = 0; endGame(score, wave); }
      }
    }
  }
  /** Konumu ilerlet, sonra Ant.step ile AYNI diamond-clamp'le grid içinde tut. */
  step(dts) {
    this.wig += 0.3 * dts;
    const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
    // Moat yavaşlatması dahil aday yeni konum
    const nx = this.wx + Math.cos(this.angle) * this.speed * this.slowMul * dts;
    const ny = this.wy + Math.sin(this.angle) * this.speed * this.slowMul * dts;

    // Aday tile (yuvaya doğru bir sonraki konumun grid karesi)
    const ncol = Math.round(nx / TW + ny / TH);
    const nrow = Math.round(ny / TH - nx / TW);

    if (this.isBuildingBreaker) {
      // BİNA-YIKICI (ladybug/dungbeetle): önündeki tile'da herhangi bir bina varsa
      // dolaşmaz — durup yıkar. Saniyede buildingDmg hasar (dts/60 == dt/1000 sn).
      const tgt = buildingAt(ncol, nrow);
      if (tgt) {
        const dmg = this.buildingDmg * dts / 60;
        tgt.hp -= dmg;
        this._atkAccum += dmg;
        this._atkTimer += dts;
        if (this._atkTimer >= 30) { // ~0.5sn'de bir: kırmızı "-X" + küçük kıvılcım
          const wB = worldFromGrid(tgt.gridX, tgt.gridY);
          floatTexts.push({ wx: wB.x, wy: wB.y, life: 1.0, text: '-' + Math.max(1, Math.round(this._atkAccum)), color: '#ff5a4a' });
          burst(wB.x, wB.y, '#ff6a3a', 4);
          this._atkAccum = 0; this._atkTimer = 0;
        }
        if (tgt.hp <= 0) destroyBuildingByEnemy(tgt); // iade YOK; bina gidince yola devam
        // bina önünde bekle: bu frame ilerleme (wx/wy değişmez)
      } else {
        this.wx = nx; this.wy = ny;
      }
    } else if (this.type !== 'bird' && isBarricadeTile(ncol, nrow)) {
      // Barikat: yıkıcı olmayan düşman hareket etmez, açıyı sabit yöne saptır →
      // birkaç frame'de etrafından dolaşır (mevcut davranış korunur).
      // BIRD muaf: uçar, barikatın üstünden düz geçer (else dalına düşer).
      this.angle += this._side * 0.5 * dts; // eski konumda kal, yana kay
    } else {
      this.wx = nx; this.wy = ny;
    }

    let col = this.wx / TW + this.wy / TH;
    let row = this.wy / TH - this.wx / TW;
    const lo = 0.3;
    const hiC = CONFIG.GRID.COLS - 1 - 0.3;
    const hiR = CONFIG.GRID.ROWS - 1 - 0.3;
    let outside = false;
    if (col < lo)  { col = lo;  outside = true; }
    if (col > hiC) { col = hiC; outside = true; }
    if (row < lo)  { row = lo;  outside = true; }
    if (row > hiR) { row = hiR; outside = true; }
    if (outside) {
      const w = worldFromGrid(col, row);
      this.wx = w.x; this.wy = w.y;
    }
  }
  /** Çizim — binalardaki gibi önceden pişirilmiş emoji sprite + sade HP barı. */
  draw() {
    const sp  = screenFromWorld(this.wx, this.wy);
    const s   = camera.scale;

    // BIRD uçuş yüksekliği: gövde + HP barı yukarı süzülür, gölge YERDE kalır.
    // Salınım mevcut wig'den (yeni zaman kaynağı yok); bird-dışında 0 → çıktı birebir aynı.
    const lift = (this.type === 'bird') ? (18 + Math.sin(this.wig * 0.1) * 4) * s : 0;

    if (this.isBoss) {
      // Boss: kod-çizimli devasa oynak akrep (emoji yok). Kendi gölgesini de çizer.
      drawBoss(sp.x, sp.y, this.angle, this.wig, s);
    } else {
      const mul = this.sizeMul || 1; // mini spider 0.6 ile küçük çizilir; mul=1'de çıktı birebir aynı
      const fontPx = Math.round(Math.max(14, Math.round(22 * s)) * mul);
      const spr = getEmojiSprite(this.emoji, fontPx);

      // Gölge (alpha elle ayarla/sıfırla — save/restore'dan ucuz) — lift'ten ETKİLENMEZ
      ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(sp.x, sp.y + 5 * s, 9 * s * mul, 5 * s * mul, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;

      ctx.drawImage(spr.canvas, sp.x - spr.size / 2, sp.y - lift - spr.size / 2, spr.size, spr.size);

      // DUNGBEETLE topu (Faz2B P1): gövdenin ÖNÜNDE büyüyen kahverengi top
      // (gerçek bok böceği gibi iterek). Lekeler wig ile döner → yuvarlanma hissi.
      if (this.type === 'dungbeetle' && this.ballSize > 0.05) {
        const bwx = this.wx + Math.cos(this.angle) * 16;
        const bwy = this.wy + Math.sin(this.angle) * 16;
        const bp  = screenFromWorld(bwx, bwy);
        const br  = (4 + 8 * this.ballSize) * s * mul;
        ctx.fillStyle = '#6b4a2a';
        ctx.beginPath(); ctx.arc(bp.x, bp.y, br, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4a3018';
        for (let k = 0; k < 2; k++) {
          const a = this.wig * 0.5 + k * Math.PI;
          ctx.beginPath();
          ctx.arc(bp.x + Math.cos(a) * br * 0.5, bp.y + Math.sin(a) * br * 0.5, Math.max(1, br * 0.22), 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // HP barı (yeşil→kırmızı, zoom'a ölçekli, gradient/shadow yok). Boss daha büyük → bar geniş ve yukarıda.
    const frac = Math.max(0, this.hp / this.maxHp);
    const bw = (this.isBoss ? 64 : 26) * s, bh = (this.isBoss ? 5 : 4) * s;
    const bx = sp.x - bw / 2, by = sp.y - lift - (this.isBoss ? 40 : 16) * s;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    const r = Math.round(220 * (1 - frac) + 40 * frac);
    const g = Math.round(200 * frac + 40 * (1 - frac));
    ctx.fillStyle = `rgb(${r},${g},40)`;
    ctx.fillRect(bx, by, bw * frac, bh);
  }
}

// Enemy pool (Ant pool / spawnAnt deseni)
const enemies = [];
// Soldier hedef-yük sayacı (enemy.uid → o frame'de hedefleyen soldier sayısı).
// Her frame loop()'ta temizlenir; updateGuard hedef dağılımı için kullanır.
const _enemyLoad = new Map();
/** Spawn (or recycle) an enemy of given type, applying wave HP scale */
let _spawningEscort = false; // ladybug refakatçi spawn'ı sürerken rekürsiyonu kes (mini, mini doğurmaz)
function spawnEnemy(type, hpScale, isBoss = false) {
  let e = enemies.find(x => !x.active);
  if (!e) { if (enemies.length >= CONFIG.POOL.ENEMIES) return null; e = new Enemy(); enemies.push(e); }
  e.init(type, hpScale, isBoss);
  // LADYBUG (Faz2B P1): ana ladybug yanında 2 mini refakatçi doğar (mini spider
  // isMini/sizeMul deseni). _spawningEscort zinciri keser: refakatçi spawn'ı bu
  // bloğa tekrar girmez. Statlar ananın ~%40'ı (aşağı yuvarlı), boyut 0.6.
  if (type === 'ladybug' && !isBoss && !_spawningEscort) {
    _spawningEscort = true;
    for (let i = 0; i < 2; i++) {
      const m = spawnEnemy('ladybug', hpScale); // pool dolu/null ise sessizce atla
      if (!m) break;
      m.isMini  = true;
      m.sizeMul = 0.6;
      m.wx = e.wx + (i === 0 ? 18 : -18); // ananın iki yanı, çakışma yok
      m.wy = e.wy + (i === 0 ? 12 : -12);
      m.angle = Math.atan2(nestW.y - m.wy, nestW.x - m.wx); // init formülü: yuvaya doğru
      m.hp = m.maxHp = Math.max(1, Math.floor(e.maxHp * 0.4));
      m.reward      = Math.floor(e.reward * 0.4);
      m.queenDmg    = Math.floor(e.queenDmg * 0.4);
      m.buildingDmg = Math.floor(e.buildingDmg * 0.4); // isBuildingBreaker kalır, hasar orantılı
    }
    _spawningEscort = false;
  }
  return e;
}
/** Count active enemies */
function enemyCount() { let n = 0; for (const e of enemies) if (e.active) n++; return n; }

/** Düşman öldü: skor + parçacık + ses (mevcut sndCatch'i yeniden kullan) */
function killEnemy(e) {
  e.active = false;
  score += e.reward;
  if (e.isBoss) {
    const bossReward = 800 + Math.floor(wave / 5) * 400;
    food += bossReward;
    floatTexts.push({ wx: e.wx, wy: e.wy, life: 1.0, text: '+' + bossReward + ' 🍖', color: '#ffd24a' });
  } else {
    food += Math.round(e.maxHp * 0.04); // dusman gucuyle orantili food odulu
  }
  burst(e.wx, e.wy, '#ff6a3a', 10);
  sndCatch();
  // Spider ölünce öldüğü yerde 2 mini spider doğar (mini tekrar doğurmaz → zincir yok).
  if (e.type === 'spider' && !e.isMini) {
    const ox = e.wx, oy = e.wy; // ölüm konumu — spawnEnemy e'yi geri dönüştürürse (m===e) init wx/wy'yi ezer
    for (let i = 0; i < 2; i++) {
      const m = spawnEnemy('spider', 1); // hpScale=1: dalga ölçeği uygulanmaz
      if (!m) break;                     // pool dolu → sessizce atla
      m.isMini  = true;
      m.sizeMul = 0.6;
      m.wx = ox + (i === 0 ? 12 : -12);
      m.wy = oy + (i === 0 ? 8 : -8);
      m.angle = Math.atan2(nestW.y - m.wy, nestW.x - m.wx); // init ile aynı formül: yuvaya doğru
      m.hp = m.maxHp = 8;
      m.speed = 2.0;
      m.queenDmg = 2;
      m.reward = 2;
    }
  }
}

// ===== WAVE SYSTEM (Faz 2A) =====
// Akış: [PREP PREP_MS] → [WAVE DURATION_MS] → PREP ... Düşmanlar dalga süresine
// yayılarak (periyodik) spawn olur; dalga süre dolunca VEYA hepsi ölünce biter.
let wave            = 1;
let wavePhase       = 'PREP';   // 'PREP' | 'WAVE'
let phaseTimer      = 0;        // ms — bulunulan fazda geçen süre
let waveToSpawn     = 0;        // kalan spawn edilecek düşman
let waveSpawnTimer  = 0;        // ms akümülatörü
let waveSpawnEvery  = 0;        // ms — spawn'lar arası süre
let waveHpScale     = 1;        // HP_GROWTH^(wave-1)
let bossPending     = false;    // boss dalgasında WAVE'e geçince ilk frame'de 1 boss spawn et
let queenFlash      = 0;        // kraliçe hasar anı kırmızı flash (0..1, söner)

/** Dalga numarası 5'in katıysa boss dalgası. */
function isBossWave(w) { return w % 5 === 0; }

function resetWaves() {
  wave = 1; wavePhase = 'PREP'; phaseTimer = 0;
  waveToSpawn = 0; waveSpawnTimer = 0; waveSpawnEvery = 0; waveHpScale = 1;
  bossPending = false;
  queenFlash = 0;
  hudWave = wave;
  hudTime = Math.ceil(CONFIG.WAVE.PREP_MS / 1000);
}

function updateWave(dt) {
  phaseTimer += dt;
  if (wavePhase === 'PREP') {
    hudTime = Math.max(0, Math.ceil((CONFIG.WAVE.PREP_MS - phaseTimer) / 1000));
    if (phaseTimer >= CONFIG.WAVE.PREP_MS) startWave();
  } else { // WAVE
    // Boss dalgasında dalga başında BİR KEZ boss spawn et (dungbeetle tipinden türer).
    if (bossPending) {
      spawnEnemy('dungbeetle', waveHpScale, true);
      sndBossSpawn();
      bossPending = false;
    }
    if (waveToSpawn > 0) {
      waveSpawnTimer += dt;
      while (waveToSpawn > 0 && waveSpawnTimer >= waveSpawnEvery) {
        waveSpawnTimer -= waveSpawnEvery;
        spawnWaveEnemy();
        waveToSpawn--;
      }
    }
    hudTime = Math.max(0, Math.ceil((CONFIG.WAVE.DURATION_MS - phaseTimer) / 1000));
    // Süre dolunca VEYA tüm düşman spawn edilip öldüyse dalga biter
    if (phaseTimer >= CONFIG.WAVE.DURATION_MS || (waveToSpawn === 0 && enemyCount() === 0)) endWave();
  }
}

function startWave() {
  wavePhase  = 'WAVE';
  phaseTimer = 0;
  let count = CONFIG.WAVE.BASE_ENEMIES + wave * CONFIG.WAVE.ENEMY_PER_WAVE;
  // Boss dalgası: normal düşman sayısı yarıya iner (boss buna dahil DEĞİL, ayrı spawn).
  bossPending = isBossWave(wave);
  if (bossPending) count = Math.ceil(count / 2);
  waveToSpawn    = count;
  waveHpScale    = Math.pow(CONFIG.WAVE.HP_GROWTH, wave - 1);
  waveSpawnEvery = CONFIG.WAVE.DURATION_MS / (count + 1); // süreye yay
  waveSpawnTimer = 0;
  hudWave = wave;
  sndWave();
}

/** unlockWave'e göre uygun tiplerden rastgele birini spawn et */
function spawnWaveEnemy() {
  const pool = [];
  for (const t in CONFIG.ENEMIES) if (wave >= CONFIG.ENEMIES[t].unlockWave) pool.push(t);
  const type = pool[Math.floor(Math.random() * pool.length)];
  spawnEnemy(type, waveHpScale);
}

function endWave() {
  food += wave * CONFIG.WAVE.BONUS_PER_WAVE; // dalga bonusu
  wave++;
  wavePhase  = 'PREP';
  phaseTimer = 0;
  hudWave = wave;
}

/** Kraliçe hasar flash'ı + hazırlık fazı uyarı vinyeti & geri sayım bandı. */
function drawWaveOverlay(dt) {
  // Kraliçe hasar anı: tek-kare-benzeri kırmızı tam ekran flash (hızlı söner)
  if (queenFlash > 0) {
    ctx.fillStyle = 'rgba(200,20,15,' + (queenFlash * 0.4).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
    queenFlash -= dt / 350;
    if (queenFlash < 0) queenFlash = 0;
  }
  // Hazırlık fazı: hafif kırmızı kenar ışıması (nabız) + "Dalga X geliyor!" geri sayım
  if (wavePhase === 'PREP') {
    const pulse = 0.35 + 0.25 * Math.sin(performance.now() / 300);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = getWarnGradient();
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    const secs = Math.max(0, Math.ceil((CONFIG.WAVE.PREP_MS - phaseTimer) / 1000));
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcaca';
    ctx.font = 'bold 22px -apple-system, sans-serif';
    ctx.fillText('⚠ Dalga ' + wave + ' geliyor!', W / 2, 92);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px -apple-system, sans-serif';
    ctx.fillText(secs + 's', W / 2, 124);
  }
}

// ===== GAME FLOW =====

  state = 'PLAYING';

  hoverCol = -1; hoverRow = -1;

  // Audio (kullanıcı etkileşimiyle başlat)
  initAudio(); if (soundOn) startMusic();

  // Reset colony state
  food = 100;
  foodSpawnTimer = 0;
  antBirthTimer = 0;
  ants.length = 0;
  foods.length = 0;
  powerups.length = 0; powerupTimer = 0;
  particles.length = 0;
  speedTimer = 0; shieldTimer = 0;
  buildings.length = 0;
  radialMenu = null;
  upgradeMenu = null;
  nestMenu = null;
  // Yuva HP upgrade'i sıfırla: max HP baz değere dönsün, maliyet sayacı 0'lansın.
  CONFIG.QUEEN.MAX_HP = QUEEN_BASE_HP;
  nestUpgradeCount = 0;
  cancelLongPress();
  buildPulses.length = 0;
  spiderWebs.length = 0;

  enemyShots.length = 0;

  // Başlangıç yemleri
  for (let i = 0; i < 6; i++) spawnFood();

function endGame(score, wave) {
  prevBest  = getBest();

// ESC → fake game-over (test only)
document.addEventListener('keydown', e => {

// ===== MAIN LOOP =====
let lastTs = 0;

/**
 * Dünyayı çiz (SADECE çizim — hiçbir oyun state'i ilerletmez). PLAYING dalı bunu
 * update'lerden SONRA gerçek dts/dt ile çağırır; PAUSED dalı (0, 0) ile çağırır
 * → tüm animasyon/timer donar, son kare yeniden çizilir. Çizim sırası eski inline
 * PLAYING bloğuyla AYNI (zemin → entity depth-sort → particle → HUD → menü).
 */
function drawScene(dts, dt) {
  // Background gradient (önbellekten — her frame yeniden yaratılmıyor)
  ctx.fillStyle = getBgGradient(); ctx.fillRect(0, 0, W, H);

  // Layer 1: Zemin tile'ları
  drawGrid();

  // Layer 2: Feromon overlay
  drawPheromone();

  // Layer 2.5: Spider ağ izleri (zemin/feromon üstü, binaların/birimlerin altı)
  drawSpiderWebs();

  // Layers 5-7: depth-sorted food + buildings + ants (painter's algorithm by world Y)
  // ONE consistent depth anchor for every object: its world-Y center (wy). Tip etiketi
  // (t) + nesne referansı (o) sakla → çizimde dispatch et (frame başına closure yok).
  drawables.length = 0;
  for (const f of foods) drawables.push({ wy: f.wy, uid: f.uid, t: 0, o: f });
  for (const p of powerups) drawables.push({ wy: p.wy, uid: p.uid, t: 2, o: p });
  for (const b of buildings) {
    const bwy = worldFromGrid(b.gridX, b.gridY).y;
    drawables.push({ wy: bwy, uid: b.uid, t: 1, o: b });
  }
  for (const a of ants) if (a.active) drawables.push({ wy: a.wy, uid: a.uid, t: 1, o: a });
  for (const e of enemies) if (e.active) drawables.push({ wy: e.wy, uid: e.uid, t: 1, o: e });
  // STABLE order: wy eşitliğini kalıcı uid ile boz → her frame sabit sıra (flicker yok).
  drawables.sort((p, q) => (p.wy - q.wy) || (p.uid - q.uid));
  for (const d of drawables) { if (d.t === 0) drawFood(d.o); else if (d.t === 2) drawPowerup(d.o); else d.o.draw(); }

  // Layer 8: Particles + build pulses + upgrade "Sv X!" metinleri
  drawParticles(dts);
  drawBuildPulses(dts);
  drawBullets();
  drawEnemyShots();
  drawFloatTexts(dts);

  // Layer 8.5: Kraliçe hasar flash + hazırlık fazı uyarı/geri sayım
  drawWaveOverlay(dt);

  // Layer 9: HUD
  hudFood = food; hudPop = antCount();
  drawHUD();

  // Layer 10: Menüler (her şeyin üstünde) — radyal (boş tile) / upgrade (dolu tile)
  drawRadialMenu();
  drawUpgradeMenu();
  drawNestMenu();

  // Yardım metni
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText("Boş tile → kur · Binaya dokun → yükselt · Basılı tut → yık (%75 iade) · Sürükle/Zoom · ESC · R", W / 2, H - 88);
}

function loop(ts) {
  const dt = Math.min(ts - lastTs, 50); // cap at 50 ms
  lastTs = ts;

  if (state === 'MENU') {
    updateMenu(dt);
    drawMenu();
  } else if (state === 'PLAYING') {
    const dts = dt / 16.667; // delta-time scale (1.0 == 60fps)

    // Emoji sprite ön-ısıtma debounce: zoom bitince (ölçek 10 frame sabit) bir kez
    // ısıt. Pinch SIRASINDA asla çalışmaz (ölçek her frame değişir → sayaç 0'lanır).
    if (camera.scale === _prevFrameScale) scaleStableFrames++; else scaleStableFrames = 0;
    _prevFrameScale = camera.scale;
    if (scaleStableFrames === 10 && camera.scale !== lastWarmScale) {
      warmEmojiSprites();
      lastWarmScale = camera.scale;
    }

    // ── Ekran sarsıntısı (P3) — bu frame'in offset'i + dt-ölçekli sönüm ──
    // İlk çizimden ÖNCE hesapla ki toScreen/screenFromWorld tutarlı offset alsın.
    if (shakeMag > 0.1) {
      shakeX = (Math.random() - 0.5) * shakeMag;
      shakeY = (Math.random() - 0.5) * shakeMag;
      shakeMag *= Math.pow(0.9, dts);
      if (shakeMag <= 0.1) { shakeMag = 0; shakeX = 0; shakeY = 0; }
    } else { shakeX = 0; shakeY = 0; }

    // ── Yem yönetimi ──
    // 0) Yaşlandır: 20sn'dir toplanmayan yemi kaldır (ulaşılamaz olabilir)
    for (let i = foods.length - 1; i >= 0; i--) {
      foods[i].age += dt;
      if (foods[i].age >= FOOD_MAX_AGE_MS) foods.splice(i, 1);
    }
    // 1) Minimum yem garantisi
    if (foods.length < FOOD_MIN_MAP) {
      const needed = FOOD_MIN_MAP - foods.length;
      for (let i = 0; i < needed; i++) spawnFood();
    }
    // 2) Periyodik ek yem (her FOOD_SPAWN_MS ms'de bir)
    foodSpawnTimer += dt;
    if (foodSpawnTimer >= FOOD_SPAWN_MS) { foodSpawnTimer = 0; spawnFood(); }

    // ── Power-up yönetimi (yemden çok daha NADİR; foods deseniyle paralel) ──
    for (const p of powerups) p.age += dt;          // bob/halka animasyonu için
    powerupTimer += dt;
    if (powerupTimer >= 12000) { powerupTimer = 0; spawnPowerup(); } // ~12sn'de bir

    // ⚡ Hız boost geri sayımı (karınca update'inden ÖNCE — Ant.get speed okur).
    // shieldTimer'a DOKUNMA (kalkan etkisi yok). Bittiğinde karıncalar normale döner.
    if (speedTimer > 0) speedTimer -= dt;

    // ── Hayatta kalma doğumu: yalnızca koloni tabanın altına düşerse ──
    // Yem ARTIK otomatik harcanmaz; oyuncuda birikir (bina ekonomisi için).
    // Sadece ANT_BIRTH_INTERVAL_MS'de bir, karınca sayısı ANT_MIN_FLOOR
    // altındaysa BEDAVA 1 worker eklenir; böylece koloni asla ölmez.
    antBirthTimer += dt;
    if (antBirthTimer >= ANT_BIRTH_INTERVAL_MS) {
      antBirthTimer = 0;
      if (antCount() < ANT_MIN_FLOOR && antCount() < CONFIG.ANT.MAX) {
        spawnAnt('worker');
        sndBorn();
      }
    }

    // ── Dalga sistemi (PREP/WAVE faz akışı + periyodik düşman spawn) ──
    updateWave(dt);

    // Update ants + enemies (logic) before depth-sorted draw (çizim drawScene'de).
    _enemyLoad.clear(); // her frame sıfırla — soldier hedef-yük dağılımı (bkz. updateGuard)
    for (const a of ants) if (a.active) a.update(dts);
    for (const e of enemies) if (e.active) e.update(dts);
    // Bina etkileri (Faz 3B) — düşman update'inden sonra; barracks üretir,
    // tower zehirler, alarm pulslar. Binalar pool değil, hepsi "var". dt = ms.
    for (const b of buildings) b.update(dt);
    // Ranger mermileri — bina update'inden sonra (atış bu frame eklenmiş olabilir).
    updateBullets(dts);
    updateEnemyShots(dts);

    // Tüm update'ler bitti → dünyayı çiz. Zemin/feromon/web entity pozisyonundan
    // bağımsız + entity'ler post-update drawables'tan çizilir → eski inline sırayla
    // GÖRSEL OLARAK ÖZDEŞ. drawScene PAUSED dalında (0,0) ile yeniden kullanılır.
    drawScene(dts, dt);
  } else if (state === 'PAUSED') {
    drawScene(0, 0);            // son dünya karesi, donmuş (hiçbir update YOK)
    // Karartma + "DURAKLADI" — butonlardan ÖNCE çizilir; butonlar sonra parlak kalır
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('DURAKLADI', W / 2, H / 2 - 70);
    ctx.restore();
    // Ana Menüye Dön akışı — iki aşamalı onaylı (overlay üstünde, butonlardan önce)
    if (!pauseConfirmExit) {
      // AŞAMA 1: Devam Et + Ana Menü
      const bw = 200, bh = 52, bx = W / 2 - bw / 2;
      const y1 = H / 2 - 6, y2 = (H / 2 - 6) + bh + 14;
      ctx.fillStyle = '#2e7d32'; rrect(bx, y1, bw, bh, 12); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('▶ Devam Et', W / 2, y1 + bh / 2);
      pauseResumeBtn = { x: bx, y: y1, w: bw, h: bh };
      ctx.fillStyle = '#5d4037'; rrect(bx, y2, bw, bh, 12); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText('🏠 Ana Menü', W / 2, y2 + bh / 2);
      pauseExitBtn = { x: bx, y: y2, w: bw, h: bh };
      pauseYesBtn = null; pauseNoBtn = null;
    } else {
      // AŞAMA 2: onay
      ctx.fillStyle = '#ffcdd2'; ctx.font = 'bold 16px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Çıkarsan skorun kaydedilmez!', W / 2, H / 2 - 40);
      const bw = 200, bh = 52, bx = W / 2 - bw / 2;
      const y1 = H / 2 + 0, y2 = (H / 2 + 0) + bh + 14;
      ctx.fillStyle = '#c62828'; rrect(bx, y1, bw, bh, 12); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px -apple-system, sans-serif';
      ctx.fillText('Evet, Çık', W / 2, y1 + bh / 2);
      pauseYesBtn = { x: bx, y: y1, w: bw, h: bh };
      ctx.fillStyle = '#455a64'; rrect(bx, y2, bw, bh, 12); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText('Vazgeç', W / 2, y2 + bh / 2);
      pauseNoBtn = { x: bx, y: y2, w: bw, h: bh };
      pauseResumeBtn = null; pauseExitBtn = null;
    }
    drawMuteButton();
    drawPauseButton();
    requestAnimationFrame(loop);
    return;
  } else if (state === 'GAMEOVER') {
    // Draw grid as static backdrop (gradient önbellekten)
    ctx.fillStyle = getBgGradient(); ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawGameover();
  }

  requestAnimationFrame(loop);
}

// ===== BOOT =====
resize();
window.addEventListener('resize', resize);
initMenu();
requestAnimationFrame(loop);
</script>
