function doUpgrade(b) {
  if (b.level >= 6) return;
  const cost = upgradeCostFor(b.type, b.level + 1);
  if (food < cost) return;
  food -= cost;
  b.level++;
  b.applyLevel();            // maxHP × seviye + hp = maxHP; etki effectMul ile artar
  const w = worldFromGrid(b.gridX, b.gridY);
  // Mevcut yeşil yükselme dalgası + parçacık (korunur)
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#5aff8a', maxR: 48 });
  burst(w.x, w.y, '#5aff8a', 10);
  // Faz 3C: ulaşılan seviyenin rengiyle (gümüş/altın) daha büyük patlama + halka,
  // ve binanın üstünde yukarı kayıp solan "Sv X!" metni → upgrade net görünsün.
  const tier = LVL_TIER[b.level - 1];
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: tier.color, maxR: 58 });
  burst(w.x, w.y, tier.color, 16);
  floatTexts.push({ wx: w.x, wy: w.y, life: 1.0, text: 'Sv ' + b.level + '!', color: tier.color });
  sndPower();
}

/** Yıkım / geri dönüşüm: binayı kaldır, yatırılan toplamın %75'ini iade et. */
function demolishBuilding(b) {
  const idx = buildings.indexOf(b);
  if (idx < 0) return;
  const refund = Math.round(investedTotal(b) * 0.75);
  food += refund;
  buildings.splice(idx, 1);
  if (upgradeMenu === b) upgradeMenu = null;
  const w = worldFromGrid(b.gridX, b.gridY);
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#c0c0c0', maxR: 46 });
  burst(w.x, w.y, '#d05050', 10);
  sndCatch();
}

function drawRadialMenu() {
  if (!radialMenu) return;
  const { x, y } = toScreen(radialMenu.col, radialMenu.row);
  const n = BUILDING_TYPES.length;
  ctx.save();
  for (let i = 0; i < n; i++) {
    const { ix, iy } = radialIconPos(x, y, i, n);
    const type   = BUILDING_TYPES[i];
    const cfg    = CONFIG.BUILDINGS[type];
    // Kurulabilirlik üç koşul: yem + limit (canBuild) + konum izni (yuva-çevresi).
    const afford    = food >= cfg.cost;
    const limitFull = cfg.maxCount != null && buildingCount(type) >= cfg.maxCount;
    const placeOK   = canPlaceTypeAt(type, radialMenu.col, radialMenu.row);
    const enabled   = afford && !limitFull && placeOK;

    ctx.globalAlpha = enabled ? 1 : 0.42;

    ctx.beginPath(); ctx.arc(ix, iy, RADIAL_IR, 0, Math.PI * 2);
    ctx.fillStyle = enabled ? 'rgba(30,22,10,0.93)' : 'rgba(50,15,15,0.88)';
    ctx.fill();
    ctx.strokeStyle = enabled ? '#c8a050' : '#7a3030';
    ctx.lineWidth   = 1.8;
    ctx.stroke();

    ctx.font         = '16px sans-serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#fff';
    ctx.fillText(cfg.emoji, ix, iy - 2);

    // Etiket: limit dolu → "DOLU", yuva-çevresi değil → "YUVA", yoksa fiyat.
    ctx.font         = 'bold 10px -apple-system, sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle    = enabled ? '#ffe08f' : '#ff8888';
    const label = limitFull ? 'DOLU' : (!placeOK ? 'YUVA' : cfg.cost);
    ctx.fillText(label, ix, iy + RADIAL_IR + 13);

    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function radialHit(sx, sy) {
  if (!radialMenu) return null;
  const { x, y } = toScreen(radialMenu.col, radialMenu.row);
  const n = BUILDING_TYPES.length;
  for (let i = 0; i < n; i++) {
    const { ix, iy } = radialIconPos(x, y, i, n);
    if (Math.hypot(sx - ix, sy - iy) <= RADIAL_IR) return BUILDING_TYPES[i];
  }
  return null;
}

function placeBuilding(type) {
  const { col, row } = radialMenu;
  const cfg = CONFIG.BUILDINGS[type];
  food -= cfg.cost;
  buildings.push(new Building(type, col, row));
  const w = worldFromGrid(col, row);
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0 });
  radialMenu = null;
}

function drawBuildPulses(dts) {
  for (let i = buildPulses.length - 1; i >= 0; i--) {
    const p = buildPulses[i];
    p.life -= 0.038 * dts;
    if (p.life <= 0) { buildPulses.splice(i, 1); continue; }
    const s = screenFromWorld(p.wx, p.wy);
    // maxR/c verilmezse eski yerleştirme dalgası davranışı (yeşil, 40px)
    const r = (1 - p.life) * (p.maxR || 40) * camera.scale;
    ctx.save();
    ctx.globalAlpha = p.life * 0.75;
    ctx.strokeStyle = p.c || '#7fff5a';
    ctx.lineWidth   = 2.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, Math.max(2, r), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

/**
 * Ranger mermileri: hedefe doğru uç, ~18px temas → hasar uygula (ölürse killEnemy),
 * mermiyi sil. Hedef ölmüş/yok olmuşsa mermi de düşer. dts = frame-ölçekli delta.
 */
function updateBullets(dts) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const m = bullets[i];
    const e = m.target;
    // Hedef yok olduysa (öldü/devre dışı) mermiyi sil
    if (!e || !e.active) { bullets.splice(i, 1); continue; }
    m.wx += m.vx * dts;
    m.wy += m.vy * dts;
    const dx = e.wx - m.wx, dy = e.wy - m.wy;
    if (dx * dx + dy * dy <= 18 * 18) { // temas
      if (m.aoe) {
        // CATAPULT güllesi: temas noktasında aoeRadius içindeki TÜM aktif düşmanlara
        // hasar (tower AOE zehir mantığı gibi). Görsel: geniş turuncu+gri patlama.
        const cx = e.wx, cy = e.wy;
        const ar2 = m.aoeRadius * m.aoeRadius;
        for (const en of enemies) {
          if (!en.active) continue;
          if ((en.wx - cx) ** 2 + (en.wy - cy) ** 2 > ar2) continue;
          en.hp -= m.dmg;
          if (en.hp <= 0) killEnemy(en);
        }
        burst(cx, cy, '#ff8a3a', 16); // büyük turuncu patlama (ağır vuruş)
        burst(cx, cy, '#9a9a9a', 8);  // gri toz/şarapnel
        buildPulses.push({ wx: cx, wy: cy, life: 1.0, c: '#ff9a4a', maxR: m.aoeRadius });
      } else {
        e.hp -= m.dmg; // RANGER: tek hedef (değişmedi)
        burst(e.wx, e.wy, '#ffd24a', 4);
        if (e.hp <= 0) killEnemy(e);
      }
      bullets.splice(i, 1);
    }
  }
}

/** Mermileri küçük sarı/turuncu çizgi olarak çiz (kamera-aware, depth-sort yok). */
function drawBullets() {
  if (!bullets.length) return;
  ctx.save();
  ctx.lineCap = 'round';
  for (const m of bullets) {
    const s = screenFromWorld(m.wx, m.wy);
    // catapult güllesi kalın/gri-turuncu, ranger merminden belirgin daha ağır görünür
    // renk seviyeye göre (LVL_TIER); m.lvl yoksa eski sabit renklere düş
    const tier = (m.lvl && LVL_TIER[m.lvl - 1]) ? LVL_TIER[m.lvl - 1].color : null;
    if (m.aoe) {
      ctx.lineWidth   = 6 + (m.lvl ? (m.lvl - 1) * 0.7 : 0); // mancınık: hep kalın, seviyeyle biraz daha
      ctx.strokeStyle = tier || '#c8783c';
    } else {
      ctx.lineWidth   = 3;
      ctx.strokeStyle = tier || '#ffd24a';
    }
    // kısa kuyruk (hız yönünün tersi) → mermi hissi, her-frame ağır iş yok
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - m.vx * camera.scale, s.y - m.vy * camera.scale);
    ctx.stroke();
  }
  ctx.restore();
}

/** Upgrade anı "Sv X!" metinleri — yukarı kayıp solar (~0.8sn). Kamera-aware. */
function drawFloatTexts(dts) {
  if (!floatTexts.length) return;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const f = floatTexts[i];
    f.life -= 0.025 * dts;                 // ~0.83sn ömür (60fps'de 40 frame)
    if (f.life <= 0) { floatTexts.splice(i, 1); continue; }
    const s    = screenFromWorld(f.wx, f.wy);
    const rise = (1 - f.life) * 34 * camera.scale; // yukarı kayma
    const yy   = s.y - 22 * camera.scale - rise;
    ctx.globalAlpha = Math.min(1, f.life * 1.8);
    ctx.font = 'bold ' + Math.round(15 * camera.scale) + 'px -apple-system, sans-serif';
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.strokeText(f.text, s.x, yy);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, s.x, yy);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ===== PARTICLES (TAŞINDI — havuzlandı) =====
const particles = [];
/** Spawn a burst of particles at world coord */
function burst(wx, wy, color, n = 8) {
  for (let i = 0; i < n; i++) {
    let p = particles.find(q => !q.active);
    if (!p) { if (particles.length >= CONFIG.POOL.PARTICLES) break; p = {}; particles.push(p); }
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 2.5;
    p.wx = wx; p.wy = wy; p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
    p.life = 1; p.c = color; p.active = true;
  }
}

// ===== COLONY: Ant =====
/**
 * Autonomous ant. type ∈ 'worker'|'soldier'|'carrier'.
 * task ∈ 'forage'|'return'|'guard'|'idle'.
 */
class Ant {
  constructor() { this.active = false; this.uid = _uid++; }
  /** (Re)initialize a pooled ant */
  init(type) {
    this.type = type;
    this.wx = nestW.x; this.wy = nestW.y;
    this.angle = Math.random() * Math.PI * 2;
    this.carrying = null;
    this.wig = Math.random() * 10;
    this.active = true;
    this.baseSpeed = CONFIG.ANT.BASE_SPEED * (type === 'carrier' ? CONFIG.ANT.CARRIER_SPEED : 1);
    this.task = type === 'soldier' ? 'guard' : 'forage';
    this.stuck = 0; // frames spent barely moving
  }
  /** Effective speed (world px / frame-equiv) */
  get speed() {
    let s = this.baseSpeed * (speedTimer > 0 ? CONFIG.ANT.SPEED_BOOST : 1);
    return this.carrying ? s * TYPES[this.carrying].speed : s;
  }
  /** @param {number} dts delta-time scale (1.0 == 60fps frame) */
  update(dts) {
    const px = this.wx, py = this.wy;

    if (this.type === 'soldier') this.updateGuard(dts);
    else this.updateForage(dts);

    // Stuck detection — barely moved for ~1.5s → kick free with new heading
    const moved = Math.hypot(this.wx - px, this.wy - py);
    if (moved < 0.15 * dts) this.stuck += dts; else this.stuck = 0;
    if (this.stuck > 90) {
      // Steer toward nest center with wide jitter so it always re-mobilizes
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 1.4;
      this.stuck = 0;
    }
  }
  /** Worker / Carrier behavior (mevcut forage→return döngüsü) */
  updateForage(dts) {
    let target = null;
    if (this.carrying) {
      target = { x: nestW.x, y: nestW.y };
      addP(this.wx, this.wy, CONFIG.PHEROMONE.DEPOSIT * dts);
    } else {
      let near = null, nd = CONFIG.ANT.SENSE_RANGE * CONFIG.ANT.SENSE_RANGE;
      for (const f of foods) {
        if (this.type === 'carrier' && f.type === 'leaf') continue; // carrier leaf'i yok sayar
        const d = (f.wx - this.wx) ** 2 + (f.wy - this.wy) ** 2;
        if (d < nd) { nd = d; near = f; }
      }
      if (near) target = { x: near.wx, y: near.wy };
      else { const dir = senseP(this); if (dir !== null) this.angle += aDiff(dir, this.angle) * 0.15 * dts; }
    }
    if (target) {
      const des = Math.atan2(target.y - this.wy, target.x - this.wx);
      this.angle += aDiff(des, this.angle) * 0.1 * dts;
    } else if (senseP(this) === null) {
      this.angle += (Math.random() - 0.5) * 0.4 * dts;
    }
    this.step(dts);

    // Pickup
    if (!this.carrying) {
      for (let i = foods.length - 1; i >= 0; i--) {
        if (this.type === 'carrier' && foods[i].type === 'leaf') continue;
        const dx = this.wx - foods[i].wx, dy = this.wy - foods[i].wy;
        if (dx * dx + dy * dy < 120) {
          this.carrying = foods[i].type; foods.splice(i, 1);
          this.angle += Math.PI; sndFood(); break;
        }
      }
    } else {
      // Deposit at nest
      const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
      if (dx * dx + dy * dy < NEST_WORLD_R * NEST_WORLD_R) {
        let pts = TYPES[this.carrying].pts;
        if (this.type === 'carrier') pts = Math.round(pts * 1.5); // carrier ×1.5
        burst(this.wx, this.wy, TYPES[this.carrying].c2);
        this.carrying = null; this.angle += Math.PI;
        food += pts; sndDeposit();
      }
    }
  }
  /**
   * Soldier: GENİŞ algılama menzilinde (DETECT_RANGE) düşman görürse üstüne
   * KOŞAR, ancak DAR saldırı menzilinde (SOLDIER_RANGE) HASAR verir. Hedef
   * seçimi "en yakın + yük cezası" ile yapılır → soldier'lar tek düşmana
   * yığılmaz, otomatik farklı hedeflere dağılır. Yuvadan DETECT_RANGE'den
   * fazla uzaklaşmaz (leash) → yuva savunmasız kalmaz.
   */
  updateGuard(dts) {
    const DET   = CONFIG.ANT.SOLDIER_DETECT_RANGE;
    const ATK   = CONFIG.ANT.SOLDIER_RANGE;
    const DET2  = DET * DET, ATK2 = ATK * ATK;
    const LOAD_PENALTY = 110 * 110; // her ek soldier, hedefi ~110px daha "uzak" sayar

    const distNest = Math.hypot(this.wx - nestW.x, this.wy - nestW.y);

    // Yuvadan çok uzaklaşmadıysa hedef ara (aksi halde leash → guard'a dön)
    let best = null;
    if (distNest <= DET) {
      let bestScore = Infinity;
      for (const e of enemies) {
        if (!e.active) continue;
        const d2 = (e.wx - this.wx) ** 2 + (e.wy - this.wy) ** 2;
        if (d2 > DET2) continue; // algılama menzili dışında
        // Kalabalık hedefe ceza ekle → fazlalık soldier bir sonraki en yakına kayar
        const load  = _enemyLoad.get(e.uid) || 0;
        const score = d2 + load * LOAD_PENALTY;
        if (score < bestScore) { bestScore = score; best = e; }
      }
    }

    if (best) {
      _enemyLoad.set(best.uid, (_enemyLoad.get(best.uid) || 0) + 1); // bu hedefe atandık
      const d2  = (best.wx - this.wx) ** 2 + (best.wy - this.wy) ** 2;
      const des = Math.atan2(best.wy - this.wy, best.wx - this.wx);
      this.angle += aDiff(des, this.angle) * 0.18 * dts;
      this.step(dts);
      // Yalnızca SALDIRI menzilinde hasar ver (~SOLDIER_DPS/sn, dts ile ölçekli)
      if (d2 <= ATK2) {
        best.hp -= (CONFIG.ANT.SOLDIER_DPS / 60) * dts;
        if (best.hp <= 0) killEnemy(best);
      }
      return;
    }

    // Düşman yok / leash dışı → eski guard/devriye davranışı (yuvaya dön)
    const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
    if (distNest > CONFIG.ANT.GUARD_RADIUS) {
      const des = Math.atan2(-dy, -dx);
      this.angle += aDiff(des, this.angle) * 0.08 * dts;
    } else {
      this.angle += (Math.random() - 0.5) * 0.25 * dts;
    }
    this.step(dts);
  }
  /**
   * Advance position, then HARD-clamp into the diamond grid area.
   * Bounds are checked in grid (col,row) space (the real playable diamond),
   * not the rectangular world bbox. On edge contact the heading is steered
   * toward the nest center so corners can never lock the ant.
   */
  step(dts) {
    this.wig += 0.3 * dts;
    this.wx += Math.cos(this.angle) * this.speed * dts;
    this.wy += Math.sin(this.angle) * this.speed * dts;

    // world → grid (inverse of worldFromGrid)
    const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
    let col = this.wx / TW + this.wy / TH;
    let row = this.wy / TH - this.wx / TW;

    const lo = 0.3;
    const hiC = CONFIG.GRID.COLS - 1 - 0.3;
    const hiR = CONFIG.GRID.ROWS - 1 - 0.3;
    let outside = false;
    if (col < lo)  { col = lo;  outside = true; }
    if (col > hiC) { col = hiC; outside = true; }
    if (row < lo)  { row = lo;  outside = true; }
    if (row > hiR) { row = hiR; outside = true; }

    if (outside) {
      // Hard clamp position back inside the diamond
      const w = worldFromGrid(col, row);
      this.wx = w.x; this.wy = w.y;
      // Reflect heading inward — steer toward nest center (+ jitter)
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 0.6;
    }
  }
  /** Draw at screen position (camera-aware) */
  draw() {
    const s = screenFromWorld(this.wx, this.wy);
    drawAntFull(s.x, s.y, this.angle, this.wig, this.type, this.carrying, camera.scale);
  }
}

// Ant pool
const ants = [];
/** Spawn (or recycle) an ant of given type */
function spawnAnt(type) {
  let a = ants.find(x => !x.active);
  if (!a) { if (ants.length >= CONFIG.POOL.ANTS) return null; a = new Ant(); ants.push(a); }
  a.init(type); return a;
}
/** Count active ants */
function antCount() { let n = 0; for (const a of ants) if (a.active) n++; return n; }

// ===== ANT RENDER (mevcut kızıl-turuncu gölgeli stil, tiplere göre) =====
/**
 * Full ant render with shadow, body, legs, eyes, cargo.
 * @param {number} x @param {number} y screen px
 * @param {number} angle @param {number} wig
 * @param {string} type @param {?string} carrying @param {number} cam camera scale
 */
function drawAntFull(x, y, angle, wig, type, carrying, cam) {
  const sc = (type === 'soldier' ? CONFIG.ANT.SOLDIER_SCALE : 1) * cam;
  const body = type === 'soldier' ? '#8b1a1a' : type === 'carrier' ? '#c8a020' : '#e8542a';
  const dark = type === 'soldier' ? '#5e0f0f' : type === 'carrier' ? '#9a7a10' : '#c23d18';

  // Shadow — save/restore yerine alpha'yı elle ayarla/sıfırla (daha az state cost)
  ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x, y + 3.5 * sc, 8 * sc, 4.5 * sc, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.sin(wig) * 0.15);
  ctx.scale(sc, sc);

  if (shieldTimer > 0) {
    ctx.strokeStyle = 'rgba(143,208,255,0.7)'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
  }

  // Legs (6) — wiggle
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  const lw = Math.sin(wig) * 1.5;
  for (const lx of [-2, 1, 4]) {
    ctx.beginPath();
    ctx.moveTo(lx, -2); ctx.lineTo(lx - 1, -5 - lw);
    ctx.moveTo(lx, 2);  ctx.lineTo(lx - 1, 5 + lw);
    ctx.stroke();
  }

  // Body
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(-6, 0, 4.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(6, 0, 2, 0, Math.PI * 2); ctx.fill();

  // Soldier jaws (2 ek path)
  if (type === 'soldier') {
    ctx.strokeStyle = '#3a0808'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(9, -1.5); ctx.lineTo(12.5, -3);
    ctx.moveTo(9, 1.5); ctx.lineTo(12.5, 3); ctx.stroke();
  }

  // Antennae
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(7, -1.2); ctx.lineTo(11, -3.5);
  ctx.moveTo(7, 1.2); ctx.lineTo(11, 3.5); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#fff'; ctx.beginPath();
  ctx.arc(7, -1.4, 1, 0, Math.PI * 2); ctx.arc(7, 1.4, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath();
  ctx.arc(7.3, -1.4, 0.5, 0, Math.PI * 2); ctx.arc(7.3, 1.4, 0.5, 0, Math.PI * 2); ctx.fill();

  // Cargo
  if (carrying) {
    const t = TYPES[carrying];
    if (type === 'carrier') {
      // sırtta küçük kare
      ctx.fillStyle = t.c;  ctx.fillRect(-8, -3, 5, 6);
      ctx.fillStyle = t.c2; ctx.fillRect(-7.5, -2.5, 2, 2);
    } else {
      ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(9, 0, t.r - 1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(8.4, -0.6, (t.r - 1) * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

// ===== COLONY DRAW HELPERS (pheromone, food, particles) =====
/** Draw pheromone overlay (world cells → screen rects) + decay */
function drawPheromone() {
  if (!PH.grid) return;
  const cell = PCELL * camera.scale;
  for (let cy = 0; cy < PH.rows; cy++) {
    for (let cx = 0; cx < PH.cols; cx++) {
      const i = cy * PH.cols + cx;
      const v = PH.grid[i];
      if (v > 0.5) {
        const wx = WORLD.minX + cx * PCELL, wy = WORLD.minY + cy * PCELL;
        const s = screenFromWorld(wx, wy);
        if (s.x + cell < 0 || s.x > W || s.y + cell < 0 || s.y > H) { PH.grid[i] *= CONFIG.PHEROMONE.DECAY; continue; }
        ctx.fillStyle = 'rgba(120,200,110,' + Math.min(v / 60, 0.35) + ')';
        ctx.fillRect(s.x, s.y, cell + 1, cell + 1);
        PH.grid[i] *= CONFIG.PHEROMONE.DECAY;
      } else PH.grid[i] = 0;
    }
  }
}
/** Draw a single food item (used by depth-sorted pass) */
function drawFood(f) {
  const s = screenFromWorld(f.wx, f.wy);
  const t = TYPES[f.type], cam = camera.scale;
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(s.x, s.y + 2 * cam, t.r * cam, t.r * 0.5 * cam, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(s.x, s.y, t.r * cam, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(s.x - t.r * 0.3 * cam, s.y - t.r * 0.3 * cam, t.r * 0.4 * cam, 0, Math.PI * 2); ctx.fill();
}
/** Update + draw particles (world space) */
function drawParticles(dts) {
  for (const p of particles) {
    if (!p.active) continue;
    p.wx += p.vx * dts; p.wy += p.vy * dts;
    p.vx *= 0.96; p.vy *= 0.96; p.life -= 0.04 * dts;
    if (p.life <= 0) { p.active = false; continue; }
    const s = screenFromWorld(p.wx, p.wy);
    ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.2 * camera.scale, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== ENEMIES (Faz 2A) =====
// Düşmanlar Ant ile aynı "world" uzayda yaşar (wx/wy), aynı diamond-clamp ile
// grid içinde kalır ve aynı (wy + uid) derinlik sıralamasına katılır → flicker yok.
let score = 0; // koşu boyu biriken skor (düşman ödülleri); GAMEOVER'da kullanılır

/** Grid kenarından (yuvadan uzak) rastgele bir spawn dünya-noktası seç */
function enemySpawnPoint() {
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  let col, row;
  switch (Math.floor(Math.random() * 4)) {
    case 0: col = 0;        row = Math.floor(Math.random() * ROWS); break;
    case 1: col = COLS - 1; row = Math.floor(Math.random() * ROWS); break;
    case 2: row = 0;        col = Math.floor(Math.random() * COLS); break;
    default: row = ROWS - 1; col = Math.floor(Math.random() * COLS); break;
  }
  return worldFromGrid(col, row);
}

class Enemy {
  constructor() { this.active = false; this.uid = _uid++; }
  /** (Re)initialize a pooled enemy. hpScale = dalga HP çarpanı. isBoss=true → boss çarpanları. */
  init(type, hpScale, isBoss = false) {
    const cfg = CONFIG.ENEMIES[type];
    const sp  = enemySpawnPoint();
    this.type     = type;
    this.wx = sp.x; this.wy = sp.y;
    this.isBoss   = isBoss;
    if (isBoss) {
      // Boss: dungbeetle tipinden türer; tanklı + sert + bol ödüllü (hız aynı).
      // Özel yetenek/saldırı/görsel YOK (sonraki parçalar). Sadece çarpanlar.
      this.maxHp    = cfg.hp * hpScale * 6;
      this.queenDmg = cfg.queenDmg * 2;
      this.reward   = cfg.reward * 5;
      this.speed    = cfg.speed;
    } else {
      this.maxHp    = cfg.hp * hpScale;
      this.speed    = cfg.speed;
      this.queenDmg = cfg.queenDmg;
      this.reward   = cfg.reward;
    }
    this.hp       = this.maxHp;
    this.emoji    = cfg.emoji;
    this.angle    = Math.atan2(nestW.y - this.wy, nestW.x - this.wx);
    this.wig      = Math.random() * 10;
    this.active   = true;
    this.slowMul  = 1;                              // moat o frame'deki hız çarpanı (kalıcı değil)
    this._side    = Math.random() < 0.5 ? 1 : -1;   // barikat etrafından sabit yönde dolaşmak için
    // Bina-yıkıcı alanları (sadece ladybug/dungbeetle'da set, diğerlerinde undefined→false)
    this.isBuildingBreaker = !!cfg.isBuildingBreaker;
    this.buildingDmg = cfg.buildingDmg || 0;
    this._atkAccum = 0;                             // saldırı hasar biriktirici (floatText throttle)
    this._atkTimer = 0;                             // saldırı efekt zamanlayıcı (dts birimi)
  }
  /** Düz steering ile yuva merkezine yürü; ulaşınca kraliçeye hasar ver. */
  update(dts) {
    // Moat: tile üstündeyken bu frame yavaşla, ayrılınca otomatik normale döner.
    this.slowMul = moatSlowAt(this.wx, this.wy);
    const des = Math.atan2(nestW.y - this.wy, nestW.x - this.wx);
    this.angle += aDiff(des, this.angle) * 0.12 * dts;
    this.step(dts);

    const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
    if (dx * dx + dy * dy < NEST_WORLD_R * NEST_WORLD_R) {
      hudQueenHP -= this.queenDmg;
      this.active = false;
      queenFlash = 1;
      burst(this.wx, this.wy, '#c81e14', 8);
      if (hudQueenHP <= 0) { hudQueenHP = 0; endGame(score, wave); }
    }
  }
  /** Konumu ilerlet, sonra Ant.step ile AYNI diamond-clamp'le grid içinde tut. */
  step(dts) {
    this.wig += 0.3 * dts;
    const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
    // Moat yavaşlatması dahil aday yeni konum
    const nx = this.wx + Math.cos(this.angle) * this.speed * this.slowMul * dts;
    const ny = this.wy + Math.sin(this.angle) * this.speed * this.slowMul * dts;

    // Aday tile (yuvaya doğru bir sonraki konumun grid karesi)
    const ncol = Math.round(nx / TW + ny / TH);
    const nrow = Math.round(ny / TH - nx / TW);

    if (this.isBuildingBreaker) {
      // BİNA-YIKICI (ladybug/dungbeetle): önündeki tile'da herhangi bir bina varsa
      // dolaşmaz — durup yıkar. Saniyede buildingDmg hasar (dts/60 == dt/1000 sn).
      const tgt = buildingAt(ncol, nrow);
      if (tgt) {
        const dmg = this.buildingDmg * dts / 60;
        tgt.hp -= dmg;
        this._atkAccum += dmg;
        this._atkTimer += dts;
        if (this._atkTimer >= 30) { // ~0.5sn'de bir: kırmızı "-X" + küçük kıvılcım
          const wB = worldFromGrid(tgt.gridX, tgt.gridY);
          floatTexts.push({ wx: wB.x, wy: wB.y, life: 1.0, text: '-' + Math.max(1, Math.round(this._atkAccum)), color: '#ff5a4a' });
          burst(wB.x, wB.y, '#ff6a3a', 4);
          this._atkAccum = 0; this._atkTimer = 0;
        }
        if (tgt.hp <= 0) destroyBuildingByEnemy(tgt); // iade YOK; bina gidince yola devam
        // bina önünde bekle: bu frame ilerleme (wx/wy değişmez)
      } else {
        this.wx = nx; this.wy = ny;
      }
    } else if (isBarricadeTile(ncol, nrow)) {
      // Barikat: yıkıcı olmayan düşman hareket etmez, açıyı sabit yöne saptır →
      // birkaç frame'de etrafından dolaşır (mevcut davranış korunur).
      this.angle += this._side * 0.5 * dts; // eski konumda kal, yana kay
    } else {
      this.wx = nx; this.wy = ny;
    }

    let col = this.wx / TW + this.wy / TH;
    let row = this.wy / TH - this.wx / TW;
    const lo = 0.3;
    const hiC = CONFIG.GRID.COLS - 1 - 0.3;
    const hiR = CONFIG.GRID.ROWS - 1 - 0.3;
    let outside = false;
    if (col < lo)  { col = lo;  outside = true; }
    if (col > hiC) { col = hiC; outside = true; }
    if (row < lo)  { row = lo;  outside = true; }
    if (row > hiR) { row = hiR; outside = true; }
    if (outside) {
      const w = worldFromGrid(col, row);
      this.wx = w.x; this.wy = w.y;
    }
  }
  /** Çizim — binalardaki gibi önceden pişirilmiş emoji sprite + sade HP barı. */
  draw() {
    const sp  = screenFromWorld(this.wx, this.wy);
    const s   = camera.scale;
    // GEÇİCİ: boss'un kendi çizimi yok; test için emoji'yi belirgin büyük çiz (×2.5).
    // Parça 2'de drawBoss() ile değişecek.
    const bossMul = this.isBoss ? 2.5 : 1;
    const fontPx = Math.max(14, Math.round(22 * s * bossMul));
    const spr = getEmojiSprite(this.emoji, fontPx);

    // Gölge (alpha elle ayarla/sıfırla — save/restore'dan ucuz)
    ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(sp.x, sp.y + 5 * s, 9 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    ctx.drawImage(spr.canvas, sp.x - spr.size / 2, sp.y - spr.size / 2, spr.size, spr.size);

    // HP barı (yeşil→kırmızı, zoom'a ölçekli, gradient/shadow yok)
    const frac = Math.max(0, this.hp / this.maxHp);
    const bw = 26 * s, bh = 4 * s;
    const bx = sp.x - bw / 2, by = sp.y - 16 * s;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
    const r = Math.round(220 * (1 - frac) + 40 * frac);
    const g = Math.round(200 * frac + 40 * (1 - frac));
    ctx.fillStyle = `rgb(${r},${g},40)`;
    ctx.fillRect(bx, by, bw * frac, bh);
  }
}

// Enemy pool (Ant pool / spawnAnt deseni)
const enemies = [];
// Soldier hedef-yük sayacı (enemy.uid → o frame'de hedefleyen soldier sayısı).
// Her frame loop()'ta temizlenir; updateGuard hedef dağılımı için kullanır.
const _enemyLoad = new Map();
/** Spawn (or recycle) an enemy of given type, applying wave HP scale */
function spawnEnemy(type, hpScale, isBoss = false) {
  let e = enemies.find(x => !x.active);
  if (!e) { if (enemies.length >= CONFIG.POOL.ENEMIES) return null; e = new Enemy(); enemies.push(e); }
  e.init(type, hpScale, isBoss); return e;
}
/** Count active enemies */
function enemyCount() { let n = 0; for (const e of enemies) if (e.active) n++; return n; }

/** Düşman öldü: skor + parçacık + ses (mevcut sndCatch'i yeniden kullan) */
function killEnemy(e) {
  e.active = false;
  score += e.reward;
  food += Math.round(e.maxHp * 0.04); // dusman gucuyle orantili food odulu
  burst(e.wx, e.wy, '#ff6a3a', 10);
  sndCatch();
}

// ===== WAVE SYSTEM (Faz 2A) =====
// Akış: [PREP PREP_MS] → [WAVE DURATION_MS] → PREP ... Düşmanlar dalga süresine
// yayılarak (periyodik) spawn olur; dalga süre dolunca VEYA hepsi ölünce biter.
let wave            = 1;
let wavePhase       = 'PREP';   // 'PREP' | 'WAVE'
let phaseTimer      = 0;        // ms — bulunulan fazda geçen süre
let waveToSpawn     = 0;        // kalan spawn edilecek düşman
let waveSpawnTimer  = 0;        // ms akümülatörü
let waveSpawnEvery  = 0;        // ms — spawn'lar arası süre
let waveHpScale     = 1;        // HP_GROWTH^(wave-1)
let bossPending     = false;    // boss dalgasında WAVE'e geçince ilk frame'de 1 boss spawn et
let queenFlash      = 0;        // kraliçe hasar anı kırmızı flash (0..1, söner)

/** Dalga numarası 5'in katıysa boss dalgası. */
function isBossWave(w) { return w % 5 === 0; }

function resetWaves() {
  wave = 1; wavePhase = 'PREP'; phaseTimer = 0;
  waveToSpawn = 0; waveSpawnTimer = 0; waveSpawnEvery = 0; waveHpScale = 1;
  bossPending = false;
  queenFlash = 0;
  hudWave = wave;
  hudTime = Math.ceil(CONFIG.WAVE.PREP_MS / 1000);
}

function updateWave(dt) {
  phaseTimer += dt;
  if (wavePhase === 'PREP') {
    hudTime = Math.max(0, Math.ceil((CONFIG.WAVE.PREP_MS - phaseTimer) / 1000));
    if (phaseTimer >= CONFIG.WAVE.PREP_MS) startWave();
  } else { // WAVE
    // Boss dalgasında dalga başında BİR KEZ boss spawn et (dungbeetle tipinden türer).
    if (bossPending) {
      spawnEnemy('dungbeetle', waveHpScale, true);
      bossPending = false;
    }
    if (waveToSpawn > 0) {
      waveSpawnTimer += dt;
      while (waveToSpawn > 0 && waveSpawnTimer >= waveSpawnEvery) {
        waveSpawnTimer -= waveSpawnEvery;
        spawnWaveEnemy();
        waveToSpawn--;
      }
    }
    hudTime = Math.max(0, Math.ceil((CONFIG.WAVE.DURATION_MS - phaseTimer) / 1000));
    // Süre dolunca VEYA tüm düşman spawn edilip öldüyse dalga biter
    if (phaseTimer >= CONFIG.WAVE.DURATION_MS || (waveToSpawn === 0 && enemyCount() === 0)) endWave();
  }
}

function startWave() {
  wavePhase  = 'WAVE';
  phaseTimer = 0;
  let count = CONFIG.WAVE.BASE_ENEMIES + wave * CONFIG.WAVE.ENEMY_PER_WAVE;
  // Boss dalgası: normal düşman sayısı yarıya iner (boss buna dahil DEĞİL, ayrı spawn).
  bossPending = isBossWave(wave);
  if (bossPending) count = Math.ceil(count / 2);
  waveToSpawn    = count;
  waveHpScale    = Math.pow(CONFIG.WAVE.HP_GROWTH, wave - 1);
  waveSpawnEvery = CONFIG.WAVE.DURATION_MS / (count + 1); // süreye yay
  waveSpawnTimer = 0;
  hudWave = wave;
}

/** unlockWave'e göre uygun tiplerden rastgele birini spawn et */
function spawnWaveEnemy() {
  const pool = [];
  for (const t in CONFIG.ENEMIES) if (wave >= CONFIG.ENEMIES[t].unlockWave) pool.push(t);
  const type = pool[Math.floor(Math.random() * pool.length)];
  spawnEnemy(type, waveHpScale);
}

function endWave() {
  food += wave * CONFIG.WAVE.BONUS_PER_WAVE; // dalga bonusu
  wave++;
  wavePhase  = 'PREP';
  phaseTimer = 0;
  hudWave = wave;
}

/** Kraliçe hasar flash'ı + hazırlık fazı uyarı vinyeti & geri sayım bandı. */
function drawWaveOverlay(dt) {
  // Kraliçe hasar anı: tek-kare-benzeri kırmızı tam ekran flash (hızlı söner)
  if (queenFlash > 0) {
    ctx.fillStyle = 'rgba(200,20,15,' + (queenFlash * 0.4).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
    queenFlash -= dt / 350;
    if (queenFlash < 0) queenFlash = 0;
  }
  // Hazırlık fazı: hafif kırmızı kenar ışıması (nabız) + "Dalga X geliyor!" geri sayım
  if (wavePhase === 'PREP') {
    const pulse = 0.35 + 0.25 * Math.sin(performance.now() / 300);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = getWarnGradient();
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    const secs = Math.max(0, Math.ceil((CONFIG.WAVE.PREP_MS - phaseTimer) / 1000));
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcaca';
    ctx.font = 'bold 22px -apple-system, sans-serif';
    ctx.fillText('⚠ Dalga ' + wave + ' geliyor!', W / 2, 92);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px -apple-system, sans-serif';
    ctx.fillText(secs + 's', W / 2, 124);
  }
}

// ===== GAME FLOW =====
function startGame() {
  state = 'PLAYING';
  camera.scale = CONFIG.CAMERA.START_ZOOM;
  initGrid();
  nestW = worldFromGrid(NEST_COL, NEST_ROW);
  setupPher();
  centerCamera();
  hoverCol = -1; hoverRow = -1;

  // Audio (kullanıcı etkileşimiyle başlat)
  initAudio(); if (soundOn) startMusic();

  // Reset colony state
  food = 100;
  foodSpawnTimer = 0;
  antBirthTimer = 0;
  ants.length = 0;
  foods.length = 0;
  particles.length = 0;
  speedTimer = 0; shieldTimer = 0;
  buildings.length = 0;
  radialMenu = null;
  upgradeMenu = null;
  nestMenu = null;
  // Yuva HP upgrade'i sıfırla: max HP baz değere dönsün, maliyet sayacı 0'lansın.
  CONFIG.QUEEN.MAX_HP = QUEEN_BASE_HP;
  nestUpgradeCount = 0;
  cancelLongPress();
  buildPulses.length = 0;
  floatTexts.length = 0;
  bullets.length = 0;
  enemies.length = 0;
  score = 0;
  resetWaves();

  // Başlangıç kolonisi
  for (let i = 0; i < CONFIG.ANT.START_WORKERS;  i++) spawnAnt('worker');
  for (let i = 0; i < CONFIG.ANT.START_SOLDIERS; i++) spawnAnt('soldier');
  for (let i = 0; i < CONFIG.ANT.START_CARRIERS; i++) spawnAnt('carrier');

  // Başlangıç yemleri
  for (let i = 0; i < 6; i++) spawnFood();

  hudQueenHP = CONFIG.QUEEN.MAX_HP; // hudWave/hudTime resetWaves() içinde ayarlandı
}

function endGame(score, wave) {
  prevBest  = getBest();
  lastScore = score; lastWave = wave;
  saveScore(score, wave);
  state = 'GAMEOVER';
}

// ESC → fake game-over (test only)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state === 'PLAYING') endGame(score, wave);
  if (e.key === 'r' && state === 'PLAYING') centerCamera();
});

// ===== MAIN LOOP =====
let lastTs = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTs, 50); // cap at 50 ms
  lastTs = ts;

  if (state === 'MENU') {
    updateMenu(dt);
    drawMenu();
  } else if (state === 'PLAYING') {
    // Background gradient (önbellekten — her frame yeniden yaratılmıyor)
    ctx.fillStyle = getBgGradient(); ctx.fillRect(0, 0, W, H);

    const dts = dt / 16.667; // delta-time scale (1.0 == 60fps)

    // ── Yem yönetimi ──
    // 0) Yaşlandır: 20sn'dir toplanmayan yemi kaldır (ulaşılamaz olabilir)
    for (let i = foods.length - 1; i >= 0; i--) {
      foods[i].age += dt;
      if (foods[i].age >= FOOD_MAX_AGE_MS) foods.splice(i, 1);
    }
    // 1) Minimum yem garantisi
    if (foods.length < FOOD_MIN_MAP) {
      const needed = FOOD_MIN_MAP - foods.length;
      for (let i = 0; i < needed; i++) spawnFood();
    }
    // 2) Periyodik ek yem (her FOOD_SPAWN_MS ms'de bir)
    foodSpawnTimer += dt;
    if (foodSpawnTimer >= FOOD_SPAWN_MS) { foodSpawnTimer = 0; spawnFood(); }

    // ── Hayatta kalma doğumu: yalnızca koloni tabanın altına düşerse ──
    // Yem ARTIK otomatik harcanmaz; oyuncuda birikir (bina ekonomisi için).
    // Sadece ANT_BIRTH_INTERVAL_MS'de bir, karınca sayısı ANT_MIN_FLOOR
    // altındaysa BEDAVA 1 worker eklenir; böylece koloni asla ölmez.
    antBirthTimer += dt;
    if (antBirthTimer >= ANT_BIRTH_INTERVAL_MS) {
      antBirthTimer = 0;
      if (antCount() < ANT_MIN_FLOOR && antCount() < CONFIG.ANT.MAX) {
        spawnAnt('worker');
        sndBorn();
      }
    }

    // ── Dalga sistemi (PREP/WAVE faz akışı + periyodik düşman spawn) ──
    updateWave(dt);

    // Layer 1: Zemin tile'ları
    drawGrid();

    // Layer 2: Feromon overlay
    drawPheromone();

    // Update ants + enemies (logic) before depth-sorted draw
    _enemyLoad.clear(); // her frame sıfırla — soldier hedef-yük dağılımı (bkz. updateGuard)
    for (const a of ants) if (a.active) a.update(dts);
    for (const e of enemies) if (e.active) e.update(dts);
    // Bina etkileri (Faz 3B) — düşman update'inden sonra; barracks üretir,
    // tower zehirler, alarm pulslar. Binalar pool değil, hepsi "var". dt = ms.
    for (const b of buildings) b.update(dt);
    // Ranger mermileri — bina update'inden sonra (atış bu frame eklenmiş olabilir).
    updateBullets(dts);

    // Layers 5-7: depth-sorted food + buildings + ants (painter's algorithm by world Y)
    // ONE consistent depth anchor for every object: its world-Y center (wy). Food
    // and ants already live at their wy; a building's anchor is its tile center
    // worldFromGrid(...).y — the SAME formula, no special-casing. Mixing anchors
    // (e.g. an extra half-tile bias on buildings only) makes objects collide with
    // a neighbouring diagonal's depths and flip order frame-to-frame → flicker.
    // Her frame yeni closure (() => ...) yaratmak yerine, tip etiketi (t) + nesne
    // referansı (o) sakla → çizimde dispatch et. Bu, frame başına 3×N kapama
    // tahsisini kaldırır (GC baskısını ciddi azaltır). Sıralama mantığı AYNI.
    drawables.length = 0;
    for (const f of foods) drawables.push({ wy: f.wy, uid: f.uid, t: 0, o: f });
    for (const b of buildings) {
      const bwy = worldFromGrid(b.gridX, b.gridY).y;
      drawables.push({ wy: bwy, uid: b.uid, t: 1, o: b });
    }
    for (const a of ants) if (a.active) drawables.push({ wy: a.wy, uid: a.uid, t: 1, o: a });
    for (const e of enemies) if (e.active) drawables.push({ wy: e.wy, uid: e.uid, t: 1, o: e });
    // STABLE order: break wy ties by the object's permanent uid, so equal-depth
    // objects keep a fixed relative order every frame regardless of push order or
    // engine sort stability. No tie ever resolves by chance → no flicker.
    drawables.sort((p, q) => (p.wy - q.wy) || (p.uid - q.uid));
    for (const d of drawables) { if (d.t === 0) drawFood(d.o); else d.o.draw(); }

    // Layer 8: Particles + build pulses + upgrade "Sv X!" metinleri
    drawParticles(dts);
    drawBuildPulses(dts);
    drawBullets();
    drawFloatTexts(dts);

    // Layer 8.5: Kraliçe hasar flash + hazırlık fazı uyarı/geri sayım
    drawWaveOverlay(dt);

    // Layer 9: HUD
    hudFood = food; hudPop = antCount();
    drawHUD();

    // Layer 10: Menüler (her şeyin üstünde) — radyal (boş tile) / upgrade (dolu tile)
    drawRadialMenu();
    drawUpgradeMenu();
    drawNestMenu();

    // Yardım metni
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText("Boş tile → kur · Binaya dokun → yükselt · Basılı tut → yık (%75 iade) · Sürükle/Zoom · ESC · R", W / 2, H - 88);
  } else if (state === 'GAMEOVER') {
    // Draw grid as static backdrop (gradient önbellekten)
    ctx.fillStyle = getBgGradient(); ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawGameover();
  }

  requestAnimationFrame(loop);
}

// ===== BOOT =====
resize();
window.addEventListener('resize', resize);
initMenu();
requestAnimationFrame(loop);
</script>
