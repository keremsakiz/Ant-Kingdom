<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Ant Kingdom</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#1c130a;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;touch-action:none;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ===== CONFIG =====
const CONFIG = {
  TILE:      { W: 64, H: 32 },
  GRID:      { COLS: 15, ROWS: 15 },
  CAMERA:    { MIN_ZOOM: 0.35, MAX_ZOOM: 2.5, START_ZOOM: 1.0 },
  ANT:       { BASE_SPEED: 1.7, SENSE_RANGE: 110, START_WORKERS: 10, START_SOLDIERS: 3, START_CARRIERS: 2 },
  PHEROMONE: { CELL: 14, MAX: 100, DECAY: 0.992, DEPOSIT: 3 },
  WAVE:      { DURATION_MS: 60000, PREP_MS: 15000, BASE_ENEMIES: 3, ENEMY_PER_WAVE: 2, HP_GROWTH: 1.15, BONUS_PER_WAVE: 50 },
  QUEEN:     { MAX_HP: 100 },
  POOL:      { ANTS: 200, ENEMIES: 100, PARTICLES: 400 }
};

// ===== CANVAS =====
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = innerWidth; H = innerHeight;
  canvas.width  = W * DPR; canvas.height = H * DPR;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  centerCamera();
}

// ===== ROUNDRECT POLYFILL =====
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== STATE MACHINE =====
// state ∈ 'MENU' | 'PLAYING' | 'GAMEOVER'
let state = 'MENU';
let lastScore = 0, lastWave = 1, prevBest = 0;

// ===== CAMERA =====
const camera = {
  x: 0, y: 0,
  scale: CONFIG.CAMERA.START_ZOOM,
  dragging: false,
  dragStartX: 0, dragStartY: 0,
  camStartX: 0, camStartY: 0,
  // Pinch
  pinchActive: false,
  pinchDist: 0, pinchScale: 1,
  pinchMidX: 0, pinchMidY: 0,
  pinchCamX: 0, pinchCamY: 0
};

/** Center camera so the isometric grid sits centered in viewport */
function centerCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const gc = (CONFIG.GRID.COLS - 1) / 2;
  const gr = (CONFIG.GRID.ROWS - 1) / 2;
  const isoX = (gc - gr) * (TW / 2) * camera.scale;
  const isoY = (gc + gr) * (TH / 2) * camera.scale;
  camera.x = W / 2 - isoX;
  camera.y = H / 2 - isoY;
  clampCamera();
}

/** Keep grid visible; allow generous panning */
function clampCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const gridW = (COLS + ROWS - 2) * (TW / 2) * s;
  const gridH = (COLS + ROWS - 2) * (TH / 2) * s;
  const mx = gridW * 0.9, my = gridH * 0.9;
  camera.x = Math.max(-gridW + W * 0.1, Math.min(gridW + W * 0.9, camera.x));
  camera.y = Math.max(-my,              Math.min(gridH + my,       camera.y));
}

// ===== COORDINATE TRANSFORMS =====

/**
 * Grid (col, row) → screen pixel (camera-aware)
 * @param {number} col
 * @param {number} row
 * @returns {{x:number, y:number}}
 */
function toScreen(col, row) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  return {
    x: (col - row) * (TW / 2) * camera.scale + camera.x,
    y: (col + row) * (TH / 2) * camera.scale + camera.y
  };
}

/**
 * Screen pixel → grid (col, row) — inverse of toScreen
 * @param {number} sx
 * @param {number} sy
 * @returns {{col:number, row:number}}
 */
function toGrid(sx, sy) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const x = (sx - camera.x) / camera.scale;
  const y = (sy - camera.y) / camera.scale;
  return {
    col: Math.round((x / (TW / 2) + y / (TH / 2)) / 2),
    row: Math.round((y / (TH / 2) - x / (TW / 2)) / 2)
  };
}

/** True if (col,row) is inside the grid */
function inBounds(col, row) {
  return col >= 0 && row >= 0 && col < CONFIG.GRID.COLS && row < CONFIG.GRID.ROWS;
}

// ===== POINTER INPUT (unified mouse + touch) =====
let pointers  = new Map(); // pointerId → {x,y}
let dragDist  = 0;        // pixels moved since pointerdown — tap vs drag
const TAP_MAX = 8;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1) {
    dragDist = 0;
    camera.dragging   = true;
    camera.dragStartX = e.clientX; camera.dragStartY = e.clientY;
    camera.camStartX  = camera.x;  camera.camStartY  = camera.y;
  }

  if (pointers.size === 2) {
    camera.dragging  = false;
    camera.pinchActive = true;
    const pts = [...pointers.values()];
    camera.pinchDist  = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    camera.pinchScale = camera.scale;
    camera.pinchMidX  = (pts[0].x + pts[1].x) / 2;
    camera.pinchMidY  = (pts[0].y + pts[1].y) / 2;
    camera.pinchCamX  = camera.x;
    camera.pinchCamY  = camera.y;
  }
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  const prev = pointers.get(e.pointerId) || { x: e.clientX, y: e.clientY };
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (state === 'PLAYING') {
    if (pointers.size === 1 && camera.dragging) {
      const dx = e.clientX - camera.dragStartX;
      const dy = e.clientY - camera.dragStartY;
      dragDist = Math.hypot(dx, dy);
      camera.x = camera.camStartX + dx;
      camera.y = camera.camStartY + dy;
      clampCamera();
    }

    if (pointers.size === 2 && camera.pinchActive) {
      const pts = [...pointers.values()];
      const dist  = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      const ratio = dist / camera.pinchDist;
      const newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM,
                        Math.min(CONFIG.CAMERA.MAX_ZOOM, camera.pinchScale * ratio));
      const midX = (pts[0].x + pts[1].x) / 2;
      const midY = (pts[0].y + pts[1].y) / 2;
      const sr = newScale / camera.pinchScale;
      camera.x = midX - (midX - camera.pinchCamX) * sr;
      camera.y = midY - (midY - camera.pinchCamY) * sr;
      camera.scale = newScale;
      clampCamera();
    }

    // Hover (mouse only — skip during drag/pinch)
    if (pointers.size === 1 && dragDist < TAP_MAX) {
      const g = toGrid(e.clientX, e.clientY);
      hoverCol = g.col; hoverRow = g.row;
    }
  }
}, { passive: false });

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  const wasDrag = dragDist > TAP_MAX;
  pointers.delete(e.pointerId);

  if (pointers.size < 2) camera.pinchActive = false;
  if (pointers.size === 0) {
    camera.dragging = false;
    if (!wasDrag) handleTap(e.clientX, e.clientY);
  }
}, { passive: false });

canvas.addEventListener('pointercancel', e => {
  pointers.delete(e.pointerId);
  camera.dragging = false; camera.pinchActive = false;
});

// Mouse wheel zoom (desktop)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (state !== 'PLAYING') return;
  const factor    = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale  = Math.max(CONFIG.CAMERA.MIN_ZOOM, Math.min(CONFIG.CAMERA.MAX_ZOOM, camera.scale * factor));
  const ratio     = newScale / camera.scale;
  camera.x = e.clientX - (e.clientX - camera.x) * ratio;
  camera.y = e.clientY - (e.clientY - camera.y) * ratio;
  camera.scale = newScale;
  clampCamera();
}, { passive: false });

// ===== UNIFIED TAP HANDLER =====
function handleTap(x, y) {
  if      (state === 'MENU')     onMenuTap(x, y);
  else if (state === 'PLAYING')  onPlayingTap(x, y);
  else if (state === 'GAMEOVER') onGameoverTap(x, y);
}

// ===== STORAGE =====

/**
 * Save score to top-5 list
 * @param {number} score
 * @param {number} wave
 */
function saveScore(score, wave) {
  const scores = getTopScores();
  scores.push({ score, wave, date: new Date().toLocaleDateString('tr-TR') });
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem('antKingdomScores', JSON.stringify(scores.slice(0, 5)));
  const prev = parseInt(localStorage.getItem('antKingdomBest') || '0');
  if (score > prev) localStorage.setItem('antKingdomBest', String(score));
}

/** @returns {{score:number,wave:number,date:string}[]} */
function getTopScores() {
  try { return JSON.parse(localStorage.getItem('antKingdomScores') || '[]'); }
  catch { return []; }
}

/** @returns {number} */
function getBest() {
  const s = getTopScores();
  if (s.length) return s[0].score;
  return parseInt(localStorage.getItem('antKingdomBest') || '0');
}

// ===== MENU =====
let menuStartTime = 0;
let menuStartBtn  = { x: 0, y: 0, w: 220, h: 60 };

// Harf harf fade-in için her harfin alpha'sı
const TITLE_STR = 'ANT KINGDOM';
let titleChars = [];

// Dekoratif karınca siluetleri
let menuAnts = [];

function initMenu() {
  state = 'MENU';
  menuStartTime = performance.now();
  titleChars = TITLE_STR.split('').map((ch, i) => ({
    ch, alpha: 0, target: 1, delay: i * 75
  }));
  menuAnts = Array.from({ length: 6 }, () => ({
    x: Math.random() * 500, y: Math.random() * 900,
    angle: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.3,
    wig: Math.random() * 10
  }));
}

function updateMenu(dt) {
  const now = performance.now() - menuStartTime;
  for (const c of titleChars) {
    if (now > c.delay) c.alpha = Math.min(1, c.alpha + dt * 0.004);
  }
  for (const a of menuAnts) {
    a.wig += 0.25; a.angle += (Math.random() - 0.5) * 0.04;
    a.x += Math.cos(a.angle) * a.speed;
    a.y += Math.sin(a.angle) * a.speed;
    if (a.x < -20) a.x = W + 20; if (a.x > W + 20) a.x = -20;
    if (a.y < -20) a.y = H + 20; if (a.y > H + 20) a.y = -20;
  }
}

function drawMenu() {
  // Background
  const bg = ctx.createRadialGradient(W / 2, H * 0.45, 40, W / 2, H * 0.45, Math.max(W, H) * 0.9);
  bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Dekoratif karıncalar (siluet)
  ctx.globalAlpha = 0.13;
  for (const a of menuAnts) drawAntShape(a.x, a.y, a.angle, a.wig, '#e8542a', 1);
  ctx.globalAlpha = 1;

  // Emoji karınca
  ctx.font = '52px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🐜', W / 2, H * 0.22);

  // Başlık — harf harf fade
  ctx.font = 'bold 40px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  const tW    = ctx.measureText(TITLE_STR).width;
  let   ox    = W / 2 - tW / 2;
  const titleY = H * 0.31;
  ctx.shadowColor = '#c8840a'; ctx.shadowBlur = 14;
  for (const c of titleChars) {
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#ffe08f';
    const cw = ctx.measureText(c.ch).width;
    ctx.fillText(c.ch, ox, titleY);
    ox += cw;
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Alt başlık
  ctx.textAlign = 'center';
  ctx.font = '15px -apple-system, sans-serif';
  ctx.fillStyle = '#c4a47a';
  ctx.globalAlpha = 0.85;
  ctx.fillText('İzometrik Tower Defense · Karınca Kolonisi', W / 2, H * 0.37);
  ctx.globalAlpha = 1;

  // Top skorlar
  const scores = getTopScores().slice(0, 3);
  if (scores.length) {
    ctx.fillStyle = '#ffe08f';
    ctx.font = 'bold 13px -apple-system, sans-serif';
    ctx.fillText('🏆 En İyi Skorlar', W / 2, H * 0.46);
    ctx.font = '13px -apple-system, sans-serif';
    ctx.fillStyle = '#d4b896';
    scores.forEach((s, i) =>
      ctx.fillText(`${i + 1}.  ${s.score} puan  —  Dalga ${s.wave}`, W / 2, H * 0.46 + 22 + i * 20));
  }

  // Başla butonu
  const bw = 220, bh = 60;
  const bx = W / 2 - bw / 2, by = H * 0.65;
  menuStartBtn = { x: bx, y: by, w: bw, h: bh };
  ctx.fillStyle = '#7cc36b';
  rrect(bx, by, bw, bh, 14); ctx.fill();
  ctx.fillStyle = '#1f150a';
  ctx.font = 'bold 22px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🐜  BAŞLA', W / 2, by + bh * 0.65);

  // Legend
  ctx.globalAlpha = 0.72;
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillStyle = '#c4a47a';
  ctx.fillText('🍃 +1  🍎 +3  🍬 +5   |   ⚡ Hız  🛡 Kalkan  🥚 +3 Karınca', W / 2, H * 0.82);
  ctx.fillText('Dikkat:  🕷 Örümcek  🐦 Kuş  🐞 Uğur Böceği  🪲 Bokböceği', W / 2, H * 0.82 + 20);
  ctx.globalAlpha = 1;
}

function onMenuTap(x, y) {
  const b = menuStartBtn;
  if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) startGame();
}

// ===== GAME OVER =====
let gameoverBtn = { x: 0, y: 0, w: 0, h: 0 };

function drawGameover() {
  ctx.fillStyle = 'rgba(14,8,2,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  const isNew = lastScore > prevBest && lastScore > 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px -apple-system, sans-serif';
  ctx.fillText('⏱ Süre Doldu!', W / 2, H * 0.33);

  if (isNew) {
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.fillText('🎉  YENİ REKOR!', W / 2, H * 0.42);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#ffe08f';
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillText('🏆 En İyi: ' + getBest(), W / 2, H * 0.42);
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px -apple-system, sans-serif';
  ctx.fillText('Puan: ' + lastScore, W / 2, H * 0.51);
  ctx.fillStyle = '#d4b896';
  ctx.font = '17px -apple-system, sans-serif';
  ctx.fillText('Dalga: ' + lastWave, W / 2, H * 0.58);

  const bw = 230, bh = 60;
  const bx = W / 2 - bw / 2, by = H * 0.68;
  gameoverBtn = { x: bx, y: by, w: bw, h: bh };
  ctx.fillStyle = '#7cc36b';
  rrect(bx, by, bw, bh, 14); ctx.fill();
  ctx.fillStyle = '#1f150a';
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.fillText('🔄  TEKRAR OYNA', W / 2, by + bh * 0.65);
}

function onGameoverTap(x, y) {
  const b = gameoverBtn;
  if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) initMenu();
}

// ===== GRID =====
const NEST_COL = Math.floor(CONFIG.GRID.COLS / 2);
const NEST_ROW = Math.floor(CONFIG.GRID.ROWS / 2);

// grid[row][col] = {type:'grass'|'dirt'|'nest'}
let grid = [];

function initGrid() {
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const dc = Math.abs(c - NEST_COL), dr = Math.abs(r - NEST_ROW);
      let type;
      if (dc <= 1 && dr <= 1) type = 'nest';
      else if ((dc === 0 || dr === 0) && (dc + dr <= 5)) type = 'dirt';
      else type = 'grass';
      grid[r][c] = { type };
    }
  }
}

// ===== GRID DRAW =====
let hoverCol = -1, hoverRow = -1;

function drawGrid() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const hw = (TW / 2) * s, hh = (TH / 2) * s;

  // Draw back-to-front: row 0..ROWS-1, col 0..COLS-1
  // Within same (col+row) value tiles don't overlap, so this order is correct.
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x, y } = toScreen(c, r);

      // Frustum cull — skip tiles fully outside viewport
      if (x + hw < 0 || x - hw > W || y + hh < 0 || y - hh > H) continue;

      const tile = grid[r][c];

      // Diamond fill
      ctx.beginPath();
      ctx.moveTo(x,      y - hh);
      ctx.lineTo(x + hw, y);
      ctx.lineTo(x,      y + hh);
      ctx.lineTo(x - hw, y);
      ctx.closePath();

      if (tile.type === 'nest') {
        ctx.fillStyle = '#2a1a0a';
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = '#6b4423';
      } else {
        // Grass: subtle deterministic shade variation
        const v = ((c * 3 + r * 7) % 5) * 5;
        ctx.fillStyle = `rgb(${62 + v},${115 + v},${52 + v})`;
      }
      ctx.fill();

      // Hover highlight
      if (c === hoverCol && r === hoverRow) {
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fill();
      }

      // Edge
      ctx.strokeStyle = tile.type === 'nest' ? '#1a0d05'
                      : tile.type === 'dirt' ? '#4a2e15'
                                             : '#3d6834';
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Texture dots — deterministic RNG from tile position
      const seed = c * 17 + r * 31;
      if (tile.type === 'grass') {
        ctx.fillStyle = 'rgba(255,255,255,0.055)';
        for (let i = 0; i < 4; i++) {
          const dx = (((seed * (i + 1) * 13) % 100) - 50) / 100 * hw * 0.68;
          const dy = (((seed * (i + 1) *  7) % 100) - 50) / 100 * hh * 0.68;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.4 * s, 0, Math.PI * 2); ctx.fill();
        }
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = 'rgba(0,0,0,0.14)';
        for (let i = 0; i < 3; i++) {
          const dx = (((seed * (i + 2) * 19) % 100) - 50) / 100 * hw * 0.6;
          const dy = (((seed * (i + 2) * 11) % 100) - 50) / 100 * hh * 0.6;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.1 * s, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Nest center tile: entrance + rings
      if (tile.type === 'nest' && c === NEST_COL && r === NEST_ROW) {
        drawNestEntrance(x, y, hw, hh, s);
      }
    }
  }
}

function drawNestEntrance(x, y, hw, hh, s) {
  // Outer ring
  ctx.strokeStyle = '#7a5630'; ctx.lineWidth = 3 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.62, hh * 0.62, 0, 0, Math.PI * 2); ctx.stroke();
  // Mid ring
  ctx.strokeStyle = '#5a3d20'; ctx.lineWidth = 1.5 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.47, hh * 0.47, 0, 0, Math.PI * 2); ctx.stroke();
  // Entrance hole
  ctx.fillStyle = '#0e0905';
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.32, hh * 0.32, 0, 0, Math.PI * 2); ctx.fill();
  // Inner glow rim
  ctx.strokeStyle = 'rgba(200,132,10,0.3)'; ctx.lineWidth = 2 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.33, hh * 0.33, 0, 0, Math.PI * 2); ctx.stroke();
}

// ===== HUD (PLAYING) =====
// Placeholder values — will be wired to real state in Phase 1+
let hudFood = 0, hudPop = 0, hudWave = 1, hudTime = 60, hudQueenHP = CONFIG.QUEEN.MAX_HP;

function drawHUD() {
  const pad = 8, ph = 34, gap = 5;
  const pills = [
    { icon: '🍃', val: String(hudFood)   },
    { icon: '🐜', val: String(hudPop)    },
    { icon: '🌊', val: String(hudWave)   },
    { icon: '⏱',  val: String(hudTime)   },
    { icon: '❤️', val: String(hudQueenHP) },
  ];
  ctx.font = '13px -apple-system, sans-serif';
  let px = pad;
  for (const p of pills) {
    const txt = p.icon + ' ' + p.val;
    const tw  = ctx.measureText(txt).width;
    const pw  = tw + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    rrect(px, pad, pw, ph, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText(txt, px + 11, pad + ph * 0.65);
    px += pw + gap;
  }

  // Bottom building bar placeholder
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, H - 80, W, 80);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.textAlign = 'center';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillText('İnşa paneli — FAZ 3\'te aktif olacak', W / 2, H - 44);
}

// ===== ANT SHAPE (shared utility for menu dekor + future Ant class) =====
/**
 * Draw ant body at (x,y) facing angle, with wiggle
 * @param {number} x @param {number} y @param {number} angle
 * @param {number} wig @param {string} bodyColor @param {number} scale
 */
function drawAntShape(x, y, angle, wig, bodyColor, scale) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle + Math.sin(wig) * 0.15);
  ctx.scale(scale, scale);
  ctx.fillStyle = bodyColor;
  // Abdomen
  ctx.beginPath(); ctx.ellipse(-6, 0, 4.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  // Thorax
  ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ===== PLAYING TILE TAP =====
function onPlayingTap(x, y) {
  const g = toGrid(x, y);
  if (inBounds(g.col, g.row)) {
    console.log(`[FAZ 0] Tile dokunuldu: col=${g.col}, row=${g.row}, tip=${grid[g.row][g.col].type}`);
  }
}

// ===== DEPTH SORT SCAFFOLD =====
// Phase 1+ will push entities here each frame; drawables is sorted by (col+row)
// For Phase 0 this is unused — grid tiles are drawn directly.
// Structure: { col, row, zOfs:0, draw: fn }
let drawables = [];

/** Sort drawables by depth (painter's algorithm) */
function sortDrawables() {
  drawables.sort((a, b) => (a.col + a.row + (a.zOfs || 0)) - (b.col + b.row + (b.zOfs || 0)));
}

// ===== GAME FLOW =====
function startGame() {
  state = 'PLAYING';
  camera.scale = CONFIG.CAMERA.START_ZOOM;
  initGrid();
  centerCamera();
  hoverCol = -1; hoverRow = -1;
  hudFood = 0; hudPop = 0; hudWave = 1; hudTime = 60; hudQueenHP = CONFIG.QUEEN.MAX_HP;
}

function endGame(score, wave) {
  prevBest  = getBest();
  lastScore = score; lastWave = wave;
  saveScore(score, wave);
  state = 'GAMEOVER';
}

// ESC → fake game-over (test only)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state === 'PLAYING') endGame(0, hudWave);
  if (e.key === 'r' && state === 'PLAYING') centerCamera();
});

// ===== MAIN LOOP =====
let lastTs = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTs, 50); // cap at 50 ms
  lastTs = ts;

  if (state === 'MENU') {
    updateMenu(dt);
    drawMenu();
  } else if (state === 'PLAYING') {
    // Background gradient
    const bg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) / 1.1);
    bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // Layer 1: Zemin tile'ları
    drawGrid();

    // Layer 2-8: boş — Phase 1+ dolduracak (feromon, binalar, karıncalar, düşmanlar, parçacıklar)

    // Layer 9: HUD
    drawHUD();

    // FAZ 0 yardım metni
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Sürükle → pan  ·  Pinch / Tekerlek → zoom  ·  Tile\'a dokun → konsol  ·  ESC → game over  ·  R → ortalama', W / 2, H - 90);
  } else if (state === 'GAMEOVER') {
    // Draw grid as static backdrop
    const bg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) / 1.1);
    bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawGameover();
  }

  requestAnimationFrame(loop);
}

// ===== BOOT =====
resize();
window.addEventListener('resize', resize);
initMenu();
requestAnimationFrame(loop);
</script>
