<body>
<canvas id="game"></canvas>
<script>
// ===== CONFIG =====
const CONFIG = {
  TILE:      { W: 64, H: 32 },
  GRID:      { COLS: 15, ROWS: 15 },
  CAMERA:    { MIN_ZOOM: 0.55, MAX_ZOOM: 2.5, START_ZOOM: 1.0 },
  ANT:       { BASE_SPEED: 1.7, SENSE_RANGE: 110, START_WORKERS: 10, START_SOLDIERS: 3, START_CARRIERS: 2, MAX: 80,
               CARRIER_SPEED: 0.6, SOLDIER_SCALE: 1.3, GUARD_RADIUS: 80, SPEED_BOOST: 1.7,
               SOLDIER_DETECT_RANGE: 260, SOLDIER_RANGE: 45, SOLDIER_DPS: 6 },
  PHEROMONE: { CELL: 14, MAX: 100, DECAY: 0.992, DEPOSIT: 3 },
  WAVE:      { DURATION_MS: 60000, PREP_MS: 15000, BASE_ENEMIES: 6, ENEMY_PER_WAVE: 3, HP_GROWTH: 1.22, BONUS_PER_WAVE: 80 },
  QUEEN:     { MAX_HP: 100 },
  POOL:      { ANTS: 200, ENEMIES: 150, PARTICLES: 400 },
  // Faz 3B: her binanın etki parametreleri CONFIG'de (magic number yok).
  //  moat.slowByLevel    — sv1/2/3 için tile üstündeki düşmanın hız çarpanı (0.4→0.3→0.2)
  //  barracks.spawnInterval — ms; bu sürede bir soldier üretir
  //  tower.range/cooldown/poisonDmg — AOE zehir menzili(world px)/periyot(ms)/hasar
  //  alarm (ŞİFA TAŞI) — healRange(yuvaya yakınlık, world px)/healInterval(ms)/healAmount(HP)
  // Faz 3C: her bina için Türkçe "name" + 3 seviyeli upgrade (bkz. LVL_MUL).
  // Etki/HP değerleri seviye çarpanıyla ölçeklenir; moat slow'u seviye dizisinden.
  BUILDINGS: {
    moat:      { cost: 60, hp:  50, emoji: '🌊', name: 'Hendek',      slowByLevel: [0.4, 0.3, 0.2] },
    barricade: { cost: 90, hp: 120, emoji: '🪨', name: 'Barikat' },
    barracks:  { cost: 150, hp:  80, emoji: '⚔️', name: 'Kışla',       spawnInterval: 15000 },
    tower:     { cost: 320, hp:  60, emoji: '🍄', name: 'Zehir Kulesi', range: 150, cooldown: 2000, poisonDmg: 28, maxCount: 4 },
    alarm:     { cost: 75, hp:  40, emoji: '💚', name: 'Şifa Taşı',    healRange: 130, healInterval: 15000, healAmount: 3 },
    // ranger.range/cooldown/dmg — TEK HEDEF mermi: menzil(world px)/atış periyodu(ms)/mermi hasarı.
    // effectMul ile range/dmg artar, cooldown azalır (cooldown/eff → daha sık).
    ranger:    { cost: 220, hp:  70, emoji: '🏹', name: 'Atış Kulesi', range: 185, cooldown: 900, dmg: 14, maxCount: 4 },
    // catapult (MANCINIK) — ranger'ın AĞIR versiyonu: yavaş atış (cooldown 2500),
    // sert hasar (dmg 45), AOE gülle (aoeRadius 70). En yakın düşmana gülle fırlatır,
    // temas noktasında aoeRadius içindeki TÜM düşmanlara hasar verir. effectMul ile
    // range/dmg/aoeRadius artar, cooldown azalır. Güçlü enemyant dalgalarına karşı.
    catapult:  { cost: 300, hp:  70, emoji: '🏰', name: 'Mancınık', range: 160, cooldown: 2500, dmg: 45, aoeRadius: 70, maxCount: 3 }
  },
  // Faz 2A düşmanları — BUILDINGS ile ayni stil (sabit alan tablosu).
  // unlockWave: dalga bu degere ulasinca tip spawn havuzuna girer.
  // isBuildingBreaker:true → düşman yoldaki binayı yıkar (saniyede buildingDmg hasar).
  // Diğerleri binayı umursamaz, doğrudan yuvaya gider (mevcut davranış korunur).
  ENEMIES: {
    spider:     { hp: 25, speed: 1.6, queenDmg:  5, reward:  8, unlockWave:  1, emoji: '🕷' },
    ladybug:    { hp: 55, speed: 1.0, queenDmg:  8, reward: 12, unlockWave:  1, emoji: '🐞', isBuildingBreaker: true, buildingDmg:  8 },
    dungbeetle: { hp: 140, speed: 0.6, queenDmg: 15, reward: 25, unlockWave:  5, emoji: '🪲', isBuildingBreaker: true, buildingDmg: 15 },
    bird:       { hp: 45, speed: 1.4, queenDmg: 12, reward: 20, unlockWave: 10, emoji: '🐦' },
    enemyant:   { hp: 80, speed: 1.1, queenDmg: 10, reward: 18, unlockWave: 20, emoji: '🐜', isBuildingBreaker: true, buildingDmg: 12 }
  }
};

// ===== AUDIO (TAŞINDI — değiştirilmedi, sadece blok olarak korundu) =====
let actx = null, soundOn = true, musicTimer = null, musicGain = null;
function initAudio() { if (actx) return; try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
function beep(freq, dur, type = "sine", vol = 0.15) {
  if (!actx || !soundOn) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.start(); o.stop(actx.currentTime + dur);
}
const sndFood    = () => beep(660, 0.07, "square", 0.06);
const sndDeposit = () => { beep(520, 0.09, "sine", 0.1); beep(780, 0.11, "sine", 0.08); };
const sndBorn    = () => beep(950, 0.14, "triangle", 0.11);
const sndCatch   = () => beep(130, 0.25, "sawtooth", 0.16);
const sndPower   = () => { beep(700, 0.08, "square", 0.12); beep(1050, 0.12, "square", 0.12); };
const sndBird    = () => beep(1400, 0.2, "sine", 0.1);
const melody = [392, 440, 523, 440, 392, 330, 392, 294]; let mi = 0;
function startMusic() {
  if (!actx || !soundOn) return; stopMusic();
  musicGain = actx.createGain(); musicGain.gain.value = 0.04; musicGain.connect(actx.destination);
  musicTimer = setInterval(() => {
    if (!soundOn) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "triangle"; o.frequency.value = melody[mi % melody.length] / 2; mi++;
    o.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.linearRampToValueAtTime(1, actx.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.45);
    o.start(); o.stop(actx.currentTime + 0.5);
  }, 420);
}
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

// ===== CANVAS =====
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = innerWidth; H = innerHeight;
  canvas.width  = W * DPR; canvas.height = H * DPR;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Keep diamond edges crisp at all zoom levels (no bilinear blur on paths)
  ctx.imageSmoothingEnabled = false;
  _bgGradient   = null; // arka plan gradient'i ekran boyutuna bağlı → resize'da yenile
  _warnGradient = null; // dalga uyarı vinyeti de ekran boyutuna bağlı → yenile
  centerCamera();
}

// ===== ARKA PLAN GRADIENT ÖNBELLEĞİ =====
// createRadialGradient pahalı; boyut değişmedikçe (sadece resize) yeniden üretme.
let _bgGradient = null;
function getBgGradient() {
  if (!_bgGradient) {
    _bgGradient = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) / 1.1);
    _bgGradient.addColorStop(0, '#3d2a18');
    _bgGradient.addColorStop(1, '#1c130a');
  }
  return _bgGradient;
}

// ===== DALGA UYARI VİNYET ÖNBELLEĞİ =====
// Hazırlık fazında ekran kenarlarından hafif kırmızı ışıma. createRadialGradient
// pahalı — boyut değişmedikçe (resize) yeniden üretme; merkezi şeffaf, kenar kırmızı.
let _warnGradient = null;
function getWarnGradient() {
  if (!_warnGradient) {
    _warnGradient = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.32, W / 2, H / 2, Math.max(W, H) * 0.72);
    _warnGradient.addColorStop(0, 'rgba(200,30,20,0)');
    _warnGradient.addColorStop(1, 'rgba(200,30,20,0.5)');
  }
  return _warnGradient;
}

// ===== EMOJİ SPRITE ÖNBELLEĞİ =====
// fillText (özellikle shadowBlur ile) her frame çok pahalı. Her benzersiz
// (emoji, hedef px) çiftini BİR KEZ küçük bir offscreen canvas'a — gölgesi
// içine pişirilmiş (baked) olarak — render edip, her frame drawImage ile çiz.
// Font boyutu tam sayı px'e yuvarlandığından (max 14..~40) ve 5 bina emojisi
// olduğundan önbellek küçük ve sınırlı kalır; zoom değişince yeni boyut üretilir.
const _emojiCache = new Map();
function getEmojiSprite(emoji, fontPx) {
  const key = emoji + '|' + fontPx;
  let spr = _emojiCache.get(key);
  if (spr) return spr;
  const blur = 5 * (fontPx / 20);            // eski Building.draw'daki shadowBlur ≈ 5*scale
  const pad  = Math.ceil(fontPx * 0.5 + blur + 4);
  const size = fontPx + pad * 2;             // CSS px cinsinden kare sprite
  const c    = document.createElement('canvas');
  c.width = c.height = Math.ceil(size * DPR);
  const cx = c.getContext('2d');
  cx.scale(DPR, DPR);                         // ana ctx gibi DPR'de pişir → keskin
  cx.font         = `${fontPx}px sans-serif`;
  cx.textAlign    = 'center';
  cx.textBaseline = 'middle';
  cx.shadowColor  = 'rgba(0,0,0,0.72)';
  cx.shadowBlur   = blur;
  cx.fillText(emoji, size / 2, size / 2);
  spr = { canvas: c, size };
  _emojiCache.set(key, spr);
  return spr;
}

// ===== ROUNDRECT POLYFILL =====
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== STATE MACHINE =====
// state ∈ 'MENU' | 'PLAYING' | 'GAMEOVER'
let state = 'MENU';
let lastScore = 0, lastWave = 1, prevBest = 0;
let food = 0;          // collected food resource
let foodSpawnTimer = 0; // ms accumulator for periodic food spawn
const FOOD_MIN_MAP   = 6;   // respawn threshold
const FOOD_SPAWN_MS  = 3000; // periodic interval ms
const FOOD_MAX_AGE_MS = 20000; // uncollected food expires after 20s
const ANT_BIRTH_COST = 10;   // food spent per new worker (legacy; artık otomatik kullanılmıyor)
// Tower-defense ekonomisi: yem oyuncuya birikir. Otomatik doğum sadece
// koloni tabanın altına düşerse devreye giren yavaş+bedava bir "hayatta kalma" mekanizması.
const ANT_BIRTH_INTERVAL_MS = 12000; // hayatta kalma doğumu denemesi aralığı (12 sn)
const ANT_MIN_FLOOR = 12;            // bu sayının altına düşerse koloni takviye edilir
let antBirthTimer = 0;               // ms akümülatörü

// ===== CAMERA =====
const camera = {
  x: 0, y: 0,
  scale: CONFIG.CAMERA.START_ZOOM,
  dragging: false,
  dragStartX: 0, dragStartY: 0,
  camStartX: 0, camStartY: 0,
  // Pinch
  pinchActive: false,
  pinchDist: 0, pinchScale: 1,
  pinchMidX: 0, pinchMidY: 0,
  pinchCamX: 0, pinchCamY: 0
};

/** Center camera so the isometric grid sits centered in viewport */
function centerCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const gc = (CONFIG.GRID.COLS - 1) / 2;
  const gr = (CONFIG.GRID.ROWS - 1) / 2;
  const isoX = (gc - gr) * (TW / 2) * camera.scale;
  const isoY = (gc + gr) * (TH / 2) * camera.scale;
  camera.x = W / 2 - isoX;
  camera.y = H / 2 - isoY;
  clampCamera();
}

/** Keep grid visible; allow generous panning */
function clampCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const gridW = (COLS + ROWS - 2) * (TW / 2) * s;
  const gridH = (COLS + ROWS - 2) * (TH / 2) * s;
  const mx = gridW * 0.9, my = gridH * 0.9;
  camera.x = Math.max(-gridW + W * 0.1, Math.min(gridW + W * 0.9, camera.x));
  camera.y = Math.max(-my,              Math.min(gridH + my,       camera.y));
}

// ===== COORDINATE TRANSFORMS =====

/**
 * Grid (col, row) → screen pixel (camera-aware)
 * @param {number} col
 * @param {number} row
 * @returns {{x:number, y:number}}
 */
function toScreen(col, row) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  return {
    x: (col - row) * (TW / 2) * camera.scale + camera.x,
    y: (col + row) * (TH / 2) * camera.scale + camera.y
  };
}

/**
 * Screen pixel → grid (col, row) — inverse of toScreen
 * @param {number} sx
 * @param {number} sy
 * @returns {{col:number, row:number}}
 */
function toGrid(sx, sy) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const x = (sx - camera.x) / camera.scale;
  const y = (sy - camera.y) / camera.scale;
  return {
    col: Math.round((x / (TW / 2) + y / (TH / 2)) / 2),
    row: Math.round((y / (TH / 2) - x / (TW / 2)) / 2)
  };
}

/** True if (col,row) is inside the grid */
function inBounds(col, row) {
  return col >= 0 && row >= 0 && col < CONFIG.GRID.COLS && row < CONFIG.GRID.ROWS;
}

// ===== POINTER INPUT (unified mouse + touch) =====
let pointers = new Map(); // pointerId → {x,y}
let dragDist = 0;         // px moved since pointerdown — distinguishes tap vs drag
const TAP_MAX = 8;

// Faz 3C: dolu tile'da long-press → bina yık (%75 iade). ~500ms aynı yerde durunca
// tetiklenir; hareket/ikinci parmak/up iptal eder. Tetiklenirse o up normal tap sayılmaz.
let lpTimer = null, lpFired = false;
const LONG_PRESS_MS = 500;
function startLongPress(x, y) {
  cancelLongPress();
  lpFired = false;
  if (state !== 'PLAYING' || radialMenu) return; // boş-tile kurma menüsündeyken yıkma yok
  const g = toGrid(x, y);
  if (!inBounds(g.col, g.row)) return;
  const b = buildings.find(bb => bb.gridX === g.col && bb.gridY === g.row);
  if (!b) return;
  lpTimer = setTimeout(() => {
    lpTimer = null;
    if (dragDist <= TAP_MAX) { demolishBuilding(b); lpFired = true; }
  }, LONG_PRESS_MS);
}
function cancelLongPress() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
}

/** Begin pan tracking from a single pointer position */
function startPan(x, y) {
  camera.dragging   = true;
  camera.dragStartX = x; camera.dragStartY = y;
  camera.camStartX  = camera.x; camera.camStartY = camera.y;
  dragDist = 0;
}

/** Apply zoom keeping world point under screen (mx,my) fixed.
 *  Formula: worldPt = (screen - camera) / scale  →  camera = screen - worldPt * newScale
 */
function applyZoom(mx, my, newScale) {
  newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM, Math.min(CONFIG.CAMERA.MAX_ZOOM, newScale));
  // World point currently under (mx,my)
  const wx = (mx - camera.x) / camera.scale;
  const wy = (my - camera.y) / camera.scale;
  camera.scale = newScale;
  camera.x = mx - wx * newScale;
  camera.y = my - wy * newScale;
  clampCamera();
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1) {
    // Single finger → pan
    startPan(e.clientX, e.clientY);
    camera.pinchActive = false;
    startLongPress(e.clientX, e.clientY); // dolu tile'da yıkım sayacı
  }

  if (pointers.size === 2) {
    // Second finger arrived → switch to pinch, cancel pan
    cancelLongPress();
    camera.dragging    = false;
    camera.pinchActive = true;
    const pts = [...pointers.values()];
    const mx  = (pts[0].x + pts[1].x) / 2;
    const my  = (pts[0].y + pts[1].y) / 2;
    camera.pinchDist   = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    camera.pinchScale  = camera.scale;
    // World point under initial pinch midpoint — kept fixed during zoom
    camera.pinchWorldX = (mx - camera.x) / camera.scale;
    camera.pinchWorldY = (my - camera.y) / camera.scale;
  }
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (state !== 'PLAYING') return;

  if (pointers.size >= 2 && camera.pinchActive) {
    // ── PINCH ZOOM (pan disabled while two fingers down) ──
    // Symmetric anchor: scale strictly from distance ratio; the world point
    // captured at pinch start stays under the current finger midpoint in BOTH
    // directions. No clamp here — clamping mid-gesture breaks the anchor on
    // zoom-out (grid bounds shrink). Clamp is applied once on release.
    const pts = [...pointers.values()];
    const mx  = (pts[0].x + pts[1].x) / 2;
    const my  = (pts[0].y + pts[1].y) / 2;
    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    const newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM,
                      Math.min(CONFIG.CAMERA.MAX_ZOOM,
                        camera.pinchScale * dist / camera.pinchDist));
    camera.scale = newScale;
    camera.x = mx - camera.pinchWorldX * newScale;
    camera.y = my - camera.pinchWorldY * newScale;
    return; // intentionally skip pan path
  }

  if (pointers.size === 1 && camera.dragging) {
    // ── PAN (single finger) ──
    const dx = e.clientX - camera.dragStartX;
    const dy = e.clientY - camera.dragStartY;
    dragDist = Math.hypot(dx, dy);
    if (dragDist > TAP_MAX) cancelLongPress(); // sürükleme → yıkım iptal
    camera.x = camera.camStartX + dx;
    camera.y = camera.camStartY + dy;
    clampCamera();
  }

  // Hover highlight (mouse only, not during drag)
  if (pointers.size === 1 && dragDist < TAP_MAX) {
    const g = toGrid(e.clientX, e.clientY);
    hoverCol = g.col; hoverRow = g.row;
  }
}, { passive: false });

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  const wasDrag = dragDist > TAP_MAX;
  const upX = e.clientX, upY = e.clientY;
  cancelLongPress(); // parmak kalktı → bekleyen yıkım sayacını durdur
  pointers.delete(e.pointerId);

  if (pointers.size === 1 && camera.pinchActive) {
    // One finger lifted after pinch → clamp once, then re-anchor pan
    camera.pinchActive = false;
    clampCamera();
    const rem = [...pointers.values()][0];
    startPan(rem.x, rem.y);
  }

  if (pointers.size === 0) {
    if (camera.pinchActive) clampCamera(); // pinch ended (both fingers up)
    camera.pinchActive = false;
    camera.dragging    = false;
    if (!wasDrag && !lpFired) handleTap(upX, upY); // long-press yıktıysa tap sayma
    lpFired = false;
  }
}, { passive: false });

canvas.addEventListener('pointercancel', e => {
  cancelLongPress();
  pointers.delete(e.pointerId);
  if (pointers.size === 0) { camera.dragging = false; camera.pinchActive = false; }
});

// ── MOUSE WHEEL / TRACKPAD ZOOM (desktop) — cursor point stays fixed ──
// Chrome/Firefox trackpad pinch → wheel + ctrlKey=true
// Safari macOS trackpad pinch → gesturechange (handled separately below)
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (state !== 'PLAYING') return;
  const factor = e.ctrlKey
    ? Math.exp(-e.deltaY * 0.01)  // trackpad pinch: continuous, proportional
    : e.deltaY > 0 ? 0.88 : 1.12; // discrete wheel
  applyZoom(e.clientX, e.clientY, camera.scale * factor);
}, { passive: false });

// ===== BLOCK BROWSER NATIVE ZOOM / GESTURES =====
// Safari macOS fires gesturestart/change/end for trackpad pinch.
// We preventDefault to stop page-zoom and drive our camera from gesturechange.
// NOTE: these are canvas-only — document-level gesture/touch blocking broke
// our own pointer-event-based pinch by cutting the event chain too early.
canvas.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('gestureend',   e => e.preventDefault(), { passive: false });
canvas.addEventListener('gesturechange', e => {
  e.preventDefault();
  if (state !== 'PLAYING') return;
  // e.scale is cumulative from gesture start; derive delta from last frame
  const newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM,
                    Math.min(CONFIG.CAMERA.MAX_ZOOM,
                      camera.scale * (e.scale / (camera._lastGestureScale || 1))));
  // Gesture has no reliable screen anchor — use viewport center
  applyZoom(W / 2, H / 2, newScale);
  camera._lastGestureScale = e.scale;
}, { passive: false });
canvas.addEventListener('gesturestart', () => { camera._lastGestureScale = 1; }, { passive: false });

// Block ctrl+wheel page-zoom at document level (trackpad pinch on Chrome/FF).
// This only prevents the DEFAULT page zoom, NOT our wheel handler above.
document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });

// ===== UNIFIED TAP HANDLER =====
function handleTap(x, y) {
  if      (state === 'MENU')     onMenuTap(x, y);
  else if (state === 'PLAYING')  onPlayingTap(x, y);
  else if (state === 'GAMEOVER') onGameoverTap(x, y);
}

// ===== STORAGE =====

/**
 * Save score to top-5 list
 * @param {number} score
 * @param {number} wave
 */
function saveScore(score, wave) {
  const scores = getTopScores();
  scores.push({ score, wave, date: new Date().toLocaleDateString('tr-TR') });
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem('antKingdomScores', JSON.stringify(scores.slice(0, 5)));
  const prev = parseInt(localStorage.getItem('antKingdomBest') || '0');
  if (score > prev) localStorage.setItem('antKingdomBest', String(score));
}

/** @returns {{score:number,wave:number,date:string}[]} */
function getTopScores() {
  try { return JSON.parse(localStorage.getItem('antKingdomScores') || '[]'); }
  catch { return []; }
}

/** @returns {number} */
function getBest() {
  const s = getTopScores();
  if (s.length) return s[0].score;
  return parseInt(localStorage.getItem('antKingdomBest') || '0');
}

function initMenu() {
  state = 'MENU';
  menuStartTime = performance.now();
  titleChars = TITLE_STR.split('').map((ch, i) => ({
    ch, alpha: 0, target: 1, delay: i * 75
  }));
  menuAnts = Array.from({ length: 6 }, () => ({
    x: Math.random() * 500, y: Math.random() * 900,
    angle: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.3,
    wig: Math.random() * 10

function updateMenu(dt) {
  const now = performance.now() - menuStartTime;
  for (const c of titleChars) {
    if (now > c.delay) c.alpha = Math.min(1, c.alpha + dt * 0.004);
  }
  for (const a of menuAnts) {
    a.wig += 0.25; a.angle += (Math.random() - 0.5) * 0.04;
    a.x += Math.cos(a.angle) * a.speed;
    a.y += Math.sin(a.angle) * a.speed;
    if (a.x < -20) a.x = W + 20; if (a.x > W + 20) a.x = -20;
    if (a.y < -20) a.y = H + 20; if (a.y > H + 20) a.y = -20;

}

// ===== GRID =====
const NEST_COL = Math.floor(CONFIG.GRID.COLS / 2);
const NEST_ROW = Math.floor(CONFIG.GRID.ROWS / 2);

// grid[row][col] = {type:'grass'|'dirt'|'nest'}
let grid = [];

function initGrid() {
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const dc = Math.abs(c - NEST_COL), dr = Math.abs(r - NEST_ROW);
      let type;
      if (dc <= 1 && dr <= 1) type = 'nest';
      else if ((dc === 0 || dr === 0) && (dc + dr <= 5)) type = 'dirt';
      else type = 'grass';
      grid[r][c] = { type };
    }
  }
}

// ===== GRID DRAW =====
let hoverCol = -1, hoverRow = -1;

function drawGrid() {
  ctx.imageSmoothingEnabled = false; // stays crisp at any zoom
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const hw = (TW / 2) * s, hh = (TH / 2) * s;

  // Draw back-to-front: row 0..ROWS-1, col 0..COLS-1
  // Within same (col+row) value tiles don't overlap, so this order is correct.
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x, y } = toScreen(c, r);

      // Frustum cull — skip tiles fully outside viewport
      if (x + hw < 0 || x - hw > W || y + hh < 0 || y - hh > H) continue;

      const tile = grid[r][c];

      // Diamond fill
      ctx.beginPath();
      ctx.moveTo(x,      y - hh);
      ctx.lineTo(x + hw, y);
      ctx.lineTo(x,      y + hh);
      ctx.lineTo(x - hw, y);
      ctx.closePath();

      if (tile.type === 'nest') {
        ctx.fillStyle = '#2a1a0a';
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = '#6b4423';
      } else {
        // Grass: subtle deterministic shade variation
        const v = ((c * 3 + r * 7) % 5) * 5;
        ctx.fillStyle = `rgb(${62 + v},${115 + v},${52 + v})`;
      }
      ctx.fill();

      // Hover highlight
      if (c === hoverCol && r === hoverRow) {
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fill();
      }

      // Edge
      ctx.strokeStyle = tile.type === 'nest' ? '#1a0d05'
                      : tile.type === 'dirt' ? '#4a2e15'
                                             : '#3d6834';
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Texture dots — deterministic RNG from tile position
      const seed = c * 17 + r * 31;
      if (tile.type === 'grass') {
        ctx.fillStyle = 'rgba(255,255,255,0.055)';
        for (let i = 0; i < 4; i++) {
          const dx = (((seed * (i + 1) * 13) % 100) - 50) / 100 * hw * 0.68;
          const dy = (((seed * (i + 1) *  7) % 100) - 50) / 100 * hh * 0.68;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.4 * s, 0, Math.PI * 2); ctx.fill();
        }
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = 'rgba(0,0,0,0.14)';
        for (let i = 0; i < 3; i++) {
          const dx = (((seed * (i + 2) * 19) % 100) - 50) / 100 * hw * 0.6;
          const dy = (((seed * (i + 2) * 11) % 100) - 50) / 100 * hh * 0.6;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.1 * s, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Nest ortak toprak doku: 3×3 alan tek "yuva tarlası" gibi birleşsin. AYRI
      // blok — mevcut nest "doku yok" akışını bozmaz; sadece hafif kahve serpme.
      // Deterministik (tile c,r seed'i → titremez). Köşe/kenar/merkez tüm nest tile'a.
      if (tile.type === 'nest') {
        for (let i = 0; i < 3; i++) {
          const dx = (((seed * (i + 1) * 23) % 100) - 50) / 100 * hw * 0.62;
          const dy = (((seed * (i + 1) * 29) % 100) - 50) / 100 * hh * 0.62;
          ctx.fillStyle = (i % 2 === 0) ? 'rgba(120,82,44,0.30)' : 'rgba(20,12,5,0.30)';
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.2 * s, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Nest center tile: ana höyük/giriş
      if (tile.type === 'nest' && c === NEST_COL && r === NEST_ROW) {
        drawNestEntrance(x, y, hw, hh, s);
      }
      // Nest 3×3 KÖŞE tile'ları: küçük ikincil giriş delikleri (heybetli yuva).
      // Köşe = |dc|===1 && |dr|===1; kenar komşulara dokunma (boş koyu zemin kalsın).
      if (tile.type === 'nest') {
        const dc = c - NEST_COL, dr = r - NEST_ROW;
        if (Math.abs(dc) === 1 && Math.abs(dr) === 1) drawNestHole(x, y, hw, hh, s);
      }
    }
  }
}

function drawNestEntrance(x, y, hw, hh, s) {
  // ── Toprak höyük (kubbe) — girişten ÖNCE çiz ki delik üstte kalsın ──
  const rx = hw * 0.80;   // höyük taban yarıçapı (yatay) — tile içinde kalır
  const ry = hh * 0.80;   // izometrik yassılık (dikey); hw/hh oranı korunur
  const H  = hh * 1.7;    // taban merkezinden tepe yüksekliği (yukarı doğru)

  // Gövde silüeti: ön (alt) yarım elips + üstte kubbe eğrisi
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI);                  // ön taban kavisi (sol→sağ)
  ctx.bezierCurveTo(x - rx, y - H, x + rx, y - H, x + rx, y); // tepe kubbesi (sol→sağ, üstten)
  ctx.closePath();
  // Toprak gradyanı: üst aydınlık kahve → alt koyu kahve (dikey)
  const g = ctx.createLinearGradient(0, y - H, 0, y + ry);
  g.addColorStop(0,   '#9c6b3a');
  g.addColorStop(0.6, '#7a4f28');
  g.addColorStop(1,   '#5a3d20');
  ctx.fillStyle = g; ctx.fill();
  // İnce koyu silüet kenarı (temiz hat)
  ctx.strokeStyle = '#4a3018'; ctx.lineWidth = 1 * s; ctx.stroke();
  // Tabana oturma gölgesi: ön alt kavis koyulaşsın → zemine basıyor hissi
  ctx.strokeStyle = 'rgba(0,0,0,0.28)'; ctx.lineWidth = 2 * s;
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI); ctx.stroke();

  // ── Giriş ("ağız"): höyüğün tepe-ortasına, hafif yukarı + küçültülmüş ──
  const ey = y - H * 0.45; // tepe-orta hizası
  // Outer ring
  ctx.strokeStyle = '#7a5630'; ctx.lineWidth = 3 * s;
  ctx.beginPath(); ctx.ellipse(x, ey, hw * 0.42, hh * 0.42, 0, 0, Math.PI * 2); ctx.stroke();
  // Mid ring
  ctx.strokeStyle = '#5a3d20'; ctx.lineWidth = 1.5 * s;
  ctx.beginPath(); ctx.ellipse(x, ey, hw * 0.31, hh * 0.31, 0, 0, Math.PI * 2); ctx.stroke();
  // Entrance hole
  ctx.fillStyle = '#0e0905';
  ctx.beginPath(); ctx.ellipse(x, ey, hw * 0.21, hh * 0.21, 0, 0, Math.PI * 2); ctx.fill();
  // Inner glow rim
  ctx.strokeStyle = 'rgba(200,132,10,0.3)'; ctx.lineWidth = 2 * s;
  ctx.beginPath(); ctx.ellipse(x, ey, hw * 0.22, hh * 0.22, 0, 0, Math.PI * 2); ctx.stroke();
}

/**
 * İkincil giriş deliği — drawNestEntrance'in KÜÇÜK ve SADE versiyonu. Yuva 3×3
 * alanının dört köşesinde, "daha heybetli yuva" hissi için. Merkez höyüğün ~%50
 * boyutunda küçük bir toprak höyük + ortasında koyu delik; halka/parıltı detayı YOK.
 * Aynı toprak paleti (üst açık kahve → alt koyu). Değerler s ile ölçekli, tek tile içinde.
 */
function drawNestHole(x, y, hw, hh, s) {
  const rx = hw * 0.42;   // merkez höyüğün ~yarısı (0.80 → 0.42)
  const ry = hh * 0.42;   // izometrik yassılık; hw/hh oranı korunur
  const H  = hh * 0.85;   // küçük tepe yüksekliği

  // Gövde: ön taban kavisi + üst kubbe (drawNestEntrance ile aynı yapı, küçük)
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI);
  ctx.bezierCurveTo(x - rx, y - H, x + rx, y - H, x + rx, y);
  ctx.closePath();
  // Aynı toprak gradyanı (sade: 2 durak)
  const g = ctx.createLinearGradient(0, y - H, 0, y + ry);
  g.addColorStop(0, '#9c6b3a');
  g.addColorStop(1, '#5a3d20');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#4a3018'; ctx.lineWidth = 1 * s; ctx.stroke();

  // Koyu giriş deliği (höyüğün tepe-ortasında)
  ctx.fillStyle = '#0e0905';
  ctx.beginPath(); ctx.ellipse(x, y - H * 0.4, hw * 0.16, hh * 0.16, 0, 0, Math.PI * 2); ctx.fill();
}

let hudFood = 0, hudPop = 0, hudWave = 1, hudTime = 60, hudQueenHP = CONFIG.QUEEN.MAX_HP;

const QUEEN_BASE_HP = CONFIG.QUEEN.MAX_HP;
let nestUpgradeCount = 0;

/** Metni mevcut ctx.font ile maxW'ye sığdır: taşarsa ilk kelimeye, gerekirse …'e düşür. */
function fitText(str, maxW) {
  if (ctx.measureText(str).width <= maxW) return str;
  const first = str.split(' ')[0];
  if (ctx.measureText(first).width <= maxW) return first;
  let s = first;
  while (s.length > 1 && ctx.measureText(s + '…').width > maxW) s = s.slice(0, -1);
  return s + '…';
}

/**
 * Bina butonu ismini maxW'ye TAM sığdır: font'u prefMax→prefMin (px) arasında
 * küçülterek tam ismi sığdırmaya çalışır; sığarsa o boyutu döndürür. Hiçbiri
 * sığmazsa (uzun çok-kelimeli isim) en küçük fontta fitText ile ilk kelimeye düşer
 * — böylece "Mancınık" gibi tek kelimeler "Mancı…" diye çirkin kesilmez. Çağıran
 * dönen px ile ctx.font'u kurar. Bold, -apple-system varsayılır.
 */
function fitLabel(name, maxW, prefMax = 9, prefMin = 7) {
  for (let px = prefMax; px >= prefMin; px--) {
    ctx.font = 'bold ' + px + 'px -apple-system, sans-serif';
    if (ctx.measureText(name).width <= maxW) return { text: name, px };
  }
  ctx.font = 'bold ' + prefMin + 'px -apple-system, sans-serif';
  return { text: fitText(name, maxW), px: prefMin };
}

function drawHUD() {
  const pad = 8, ph = 34, gap = 5;
  const pills = [
    { icon: '🍃', val: String(hudFood)   },
    { icon: '🐜', val: String(hudPop)    },

    { icon: '⏱',  val: String(hudTime)   },
    { icon: '❤️', val: String(hudQueenHP) },
  ];
  ctx.font = '13px -apple-system, sans-serif';
  let px = pad;
  for (const p of pills) {
    const txt = p.icon + ' ' + p.val;
    const tw  = ctx.measureText(txt).width;
    const pw  = tw + 22;
    ctx.fillStyle = 'rgba(0,0,0,0.48)';
    rrect(px, pad, pw, ph, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText(txt, px + 11, pad + ph * 0.65);
    px += pw + gap;
  }

  // Alt bina paneli
  const barH = 80;
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, H - barH, W, barH);

  const btnW = 50, btnH = 58, btnGap = 4; // 7 bina: 7×50 + 6×4 = 374px → 390px baz ekrana sığar
  const totalBtnW = BUILDING_TYPES.length * btnW + (BUILDING_TYPES.length - 1) * btnGap;
  let bx = Math.round(W / 2 - totalBtnW / 2);
  const by = H - barH + 11;

  ctx.save();
  ctx.textAlign = 'center';
  for (const type of BUILDING_TYPES) {
    const cfg    = CONFIG.BUILDINGS[type];
    const afford = food >= cfg.cost;
    ctx.globalAlpha = afford ? 1 : 0.4;
    ctx.fillStyle = 'rgba(50,35,15,0.85)';
    rrect(bx, by, btnW, btnH, 8); ctx.fill();
    ctx.strokeStyle = afford ? '#c8a050' : '#6a4520';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    const cx = bx + btnW / 2;
    // Emoji üstte
    ctx.font = '19px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(cfg.emoji, cx, by + 15);
    // İsim ortada — tam sığsın diye fontu küçülterek dene (çirkin "…" kesme olmasın)
    const lbl = fitLabel(cfg.name, btnW - 6); // fitLabel ctx.font'u kurar
    ctx.fillStyle = afford ? '#ffe8b0' : '#caa080';
    ctx.fillText(lbl.text, cx, by + 33);
    // Fiyat altta
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = afford ? '#ffe08f' : '#ff8888';
    ctx.fillText(cfg.cost, cx, by + btnH - 6);
    ctx.globalAlpha = 1;
    bx += btnW + btnGap;
  }
  ctx.restore();
}

// ===== ANT SHAPE (shared utility for menu dekor + future Ant class) =====
/**
 * Draw ant body at (x,y) facing angle, with wiggle
 * @param {number} x @param {number} y @param {number} angle
 * @param {number} wig @param {string} bodyColor @param {number} scale
 */
function drawAntShape(x, y, angle, wig, bodyColor, scale) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle + Math.sin(wig) * 0.15);
  ctx.scale(scale, scale);
  ctx.fillStyle = bodyColor;
  // Abdomen
  ctx.beginPath(); ctx.ellipse(-6, 0, 4.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  // Thorax
  ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Head
  ctx.beginPath(); ctx.arc(6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ===== PLAYING TILE TAP =====
function onPlayingTap(x, y) {
  // Radyal menü (boş tile kurma) açıksa — önce menüyle etkileş
  if (radialMenu) {
    const hit = radialHit(x, y);
    if (hit && canBuild(hit) && canPlaceTypeAt(hit, radialMenu.col, radialMenu.row)) {
      placeBuilding(hit); // içinde radialMenu = null yapar
    } else if (!hit) {
      radialMenu = null;  // dışına tıklama → kapat
    }
    // yem yetmiyor / limit dolu / yuva çevresi değilse ikon tıklanamaz, menü açık kalır
    return;
  }

  // Upgrade balonu (dolu tile) açıksa — Yükselt'e mi, dışına mı?
  if (upgradeMenu) {
    if (upgradeBtnHit(x, y)) doUpgrade(upgradeMenu); // menü açık kalır, yeni sv'yi gösterir
    else                     upgradeMenu = null;      // dışına tıklama → kapat
    return;
  }

  // Yuva menüsü açıksa — Yükselt'e mi, yuva tile'ına mı, dışına mı?
  if (nestMenu) {
    if (nestBtnHit(x, y)) { doNestUpgrade(); return; } // menü açık kalır, yeni değerleri gösterir
    const gn = toGrid(x, y);
    if (!(inBounds(gn.col, gn.row) && grid[gn.row][gn.col].type === 'nest'))
      nestMenu = null; // yuva DIŞINA tıklama → kapat (yuva tile'ı açık tutar)
    return;
  }

  // Menü kapalı → tile seç
  const g = toGrid(x, y);
  if (!inBounds(g.col, g.row)) return;
  if (grid[g.row][g.col].type === 'nest') { nestMenu = true; upgradeMenu = null; return; }
  const b = buildings.find(bb => bb.gridX === g.col && bb.gridY === g.row);
  if (b) { openUpgradeMenu(b); return; } // DOLU tile → upgrade balonu
  openRadialMenu(g.col, g.row);          // BOŞ tile → kurma menüsü
}

// ===== DEPTH SORT SCAFFOLD =====
// Phase 1+ will push entities here each frame; drawables is sorted by (col+row)
// For Phase 0 this is unused — grid tiles are drawn directly.
// Structure: { col, row, zOfs:0, draw: fn }
let drawables = [];

// Monotonic id handed to every depth-sorted object (ant/food/building). Used as
// a STABLE tie-breaker so objects sharing the same world-Y keep a fixed draw
// order every frame — see the depth sort in loop(). Never reset during a run.
let _uid = 0;

/** Sort drawables by depth (painter's algorithm) */
function sortDrawables() {
  drawables.sort((a, b) => (a.col + a.row + (a.zOfs || 0)) - (b.col + b.row + (b.zOfs || 0)));
}

// ===== WORLD SPACE (camera-independent iso-pixel coordinates) =====
// Ants, food and pheromones live in "world" space — the pre-camera iso pixel
// space. screenFromWorld() applies the camera; toScreen(col,row) is exactly
// screenFromWorld(worldFromGrid(col,row)), so everything stays consistent.
// Bounds include a small inward margin so ants stay visually inside the grid.
const _MARGIN = 8; // world-px margin inside grid edge
const WORLD = {
  minX: -(CONFIG.GRID.ROWS - 1) * CONFIG.TILE.W / 2 + _MARGIN,
  maxX:  (CONFIG.GRID.COLS - 1) * CONFIG.TILE.W / 2 - _MARGIN,
  minY:  _MARGIN,
  maxY:  (CONFIG.GRID.COLS - 1 + CONFIG.GRID.ROWS - 1) * CONFIG.TILE.H / 2 - _MARGIN
};

/** Grid (col,row) → world iso-pixel (tile center) */
function worldFromGrid(col, row) {
  return { x: (col - row) * CONFIG.TILE.W / 2, y: (col + row) * CONFIG.TILE.H / 2 };
}
/** World iso-pixel → screen pixel (camera-aware) */
function screenFromWorld(wx, wy) {
  return { x: wx * camera.scale + camera.x, y: wy * camera.scale + camera.y };
}

// Nest center in world space (NEST_COL/ROW defined in grid section)
let nestW = { x: 0, y: 0 };
const NEST_WORLD_R = CONFIG.TILE.H; // deposit radius (world px)

// Shared power-up timers (used by Ant.speed / shield; wired fully in later phases)
let speedTimer = 0, shieldTimer = 0;

// ===== PHEROMONE (TAŞINDI — world space'e uyarlandı) =====
const PH = { cols: 0, rows: 0, grid: null };
const PCELL = CONFIG.PHEROMONE.CELL;

/** Allocate pheromone grid over world bounds */
function setupPher() {
  PH.cols = Math.ceil((WORLD.maxX - WORLD.minX) / PCELL) + 1;
  PH.rows = Math.ceil((WORLD.maxY - WORLD.minY) / PCELL) + 1;
  PH.grid = new Float32Array(PH.cols * PH.rows);
}
/** World coord → pheromone cell index (-1 if out of bounds) */
function pIdx(wx, wy) {
  const cx = Math.floor((wx - WORLD.minX) / PCELL);
  const cy = Math.floor((wy - WORLD.minY) / PCELL);
  if (cx < 0 || cy < 0 || cx >= PH.cols || cy >= PH.rows) return -1;
  return cy * PH.cols + cx;
}
/** Deposit pheromone at world coord */
function addP(wx, wy, a) {
  const i = pIdx(wx, wy);
  if (i >= 0) PH.grid[i] = Math.min(PH.grid[i] + a, CONFIG.PHEROMONE.MAX);
}
/** Sense strongest pheromone in a forward arc → desired angle (or null) */
function senseP(ant) {
  const ah = 20; let b = -1, bd = null;
  for (let a = -0.6; a <= 0.6; a += 0.3) {
    const an = ant.angle + a;
    const i = pIdx(ant.wx + Math.cos(an) * ah, ant.wy + Math.sin(an) * ah);
    if (i >= 0 && PH.grid[i] > b) { b = PH.grid[i]; bd = an; }
  }
  return b > 1 ? bd : null;
}
/** Shortest signed angular difference target-current */
function aDiff(t, c) { let d = t - c; while (d > Math.PI) d -= Math.PI * 2; while (d < -Math.PI) d += Math.PI * 2; return d; }

// ===== FOOD (TAŞINDI — TYPES korundu) =====
const TYPES = {
  leaf:  { pts: 1, r: 5, c: "#7cc36b", c2: "#a3e08f", speed: 1.0 },
  fruit: { pts: 3, r: 7, c: "#e06b5a", c2: "#f5a08f", speed: 0.7 },
  candy: { pts: 5, r: 6, c: "#e0b85a", c2: "#ffe08f", speed: 0.85 }
};
let foods = [];

/**
 * Spawn one food item. If col/row omitted, picks a random non-nest tile in
 * the INTERIOR region (col/row 1..COLS-2) so it's always reachable — never on
 * the outermost edge ring.
 */
function spawnFood(col, row, type) {
  if (col === undefined) {
    const cLo = 1, cHi = CONFIG.GRID.COLS - 2;
    const rLo = 1, rHi = CONFIG.GRID.ROWS - 2;
    let tries = 0;
    do {
      col = cLo + Math.floor(Math.random() * (cHi - cLo + 1));
      row = rLo + Math.floor(Math.random() * (rHi - rLo + 1));
    } while (grid[row][col].type === 'nest' && ++tries < 30);
  }
  if (!type) { const r = Math.random(); type = r < 0.6 ? 'leaf' : r < 0.85 ? 'fruit' : 'candy'; }
  const w = worldFromGrid(col, row);
  const jx = (Math.random() - 0.5) * CONFIG.TILE.W * 0.4;
  const jy = (Math.random() - 0.5) * CONFIG.TILE.H * 0.4;
  foods.push({ wx: w.x + jx, wy: w.y + jy, type, age: 0, uid: _uid++ });
}

// ===== BUILDINGS =====
const BUILDING_TYPES = ['moat', 'barricade', 'barracks', 'tower', 'alarm', 'ranger', 'catapult'];
let buildings   = [];
let radialMenu  = null; // { col, row } — boş tile'a kurma menüsü
let upgradeMenu = null; // Building referansı — dolu tile'a upgrade balonu
let nestMenu    = null; // Yuva menüsü (Faz: yuva HP upgrade) — true iken açık. Henüz HP mantığı YOK.
let buildPulses = [];   // { wx, wy, life } — yeşil yerleştirme dalgası
let floatTexts  = [];   // { wx, wy, life, text, color } — upgrade anı yükselen "Sv X!"
let bullets     = [];   // ranger mermileri { wx, wy, vx, vy, dmg, target } — TEK HEDEF

// Faz 3C: seviye çarpanları. Index = level-1. Hem etki hem maxHP için kullanılır.
//   sv1 ×1.0, sv2 ×1.4, sv3 ×1.9  (tower hasarı/healer şifası artar, barracks
//   intervali / çarpan → daha sık, maxHP × çarpan).
const LVL_MUL = [1.0, 1.4, 1.9, 2.3, 2.6, 2.9];

// Faz 3C: kalıcı seviye görseli (METİN YOK — renk + boyut). Index = level-1.
//   sv1 nötr (halka yok), sv2 gümüş + %12 büyük, sv3 altın + %25 büyük.
//   ring=arka hâle/halka çiz; scale=emoji drawImage ölçeği; glowA=hâle dolgu alfası.
const LVL_TIER = [
  { color: '#cd7f32', scale: 1.00, ring: false, glowA: 0.00 }, // sv1 bronz
  { color: '#c0c0c0', scale: 1.12, ring: true,  glowA: 0.18 }, // sv2 gümüş
  { color: '#ffd700', scale: 1.24, ring: true,  glowA: 0.26 }, // sv3 altın
  { color: '#1fd6c4', scale: 1.36, ring: true,  glowA: 0.42 }, // sv4 turkuaz
  { color: '#a855f7', scale: 1.48, ring: true,  glowA: 0.55 }, // sv5 mor
  { color: '#ff5a3c', scale: 1.62, ring: true,  glowA: 0.70 }  // sv6 kızıl-altın
];

/** type binasının toLevel seviyesine yükseltme maliyeti (tablo: sv2..sv6). */
function upgradeCostFor(type, toLevel) {
  const base = CONFIG.BUILDINGS[type].cost;
  const MUL = { 2: 1.5, 3: 2.5, 4: 3.5, 5: 4.5, 6: 6 };
  const m = MUL[toLevel];
  return m ? Math.round(base * m) : 0;
}

/** Binaya bugüne dek yatırılan toplam yem (temel cost + ulaşılan seviye upgrade'leri). */
function investedTotal(b) {
  let total = CONFIG.BUILDINGS[b.type].cost;
  for (let lv = 2; lv <= b.level; lv++) total += upgradeCostFor(b.type, lv);
  return total;
}

// Ranger (atış kulesi 🏹) yuva savunması içindir: SADECE yuva çevresindeki
// tile'lara kurulabilir. Yuva 3×3 merkezinin ETRAFINDAKI ~1-2 halka: grid
// (Chebyshev) mesafe <= NEAR_NEST_R → izinli. Eşik oynanabilir.
const NEAR_NEST_R = 3;
function nearNest(col, row) {
  return Math.max(Math.abs(col - NEST_COL), Math.abs(row - NEST_ROW)) <= NEAR_NEST_R;
}

/** buildings dizisinde o tipten kaç tane var. */
function buildingCount(type) {
  let n = 0;
  for (const b of buildings) if (b.type === type) n++;
  return n;
}

/** Yeterli yem VE (maxCount yoksa YA DA o tipten limit dolmamış) mı? */
function canBuild(type) {
  const cfg = CONFIG.BUILDINGS[type];
  if (food < cfg.cost) return false;
  if (cfg.maxCount != null && buildingCount(type) >= cfg.maxCount) return false;
  return true;
}

/** Bu tipin BU tile'a konum izni var mı? Şu an sadece ranger: yuva çevresi. */
function canPlaceTypeAt(type, col, row) {
  if (type === 'ranger') return nearNest(col, row);
  return true;
}

const RADIAL_R  = 108; // ikon yayı yarıçapı (screen px) — 7 ikon yarım dairede rahat aralıkla (komşu mesafe ~56px > ikon çapı 38px)
const RADIAL_IR = 19;  // ikon daire yarıçapı

/**
 * Radyal menü i. ikonunun ekran konumu (yarım daire, -π..0 üzerinde n ikon
 * eşit yayılır). ÇİZİM (drawRadialMenu) ve HİT-TEST (radialHit) bu TEK formülü
 * kullanır → görsel ile tıklama asla kaymaz. (x,y) = menü merkezi (tile ekran konumu).
 */
function radialIconPos(x, y, i, n) {
  const angle = -Math.PI + i * (Math.PI / (n - 1));
  return { ix: x + Math.cos(angle) * RADIAL_R, iy: y + Math.sin(angle) * RADIAL_R };
}

// ── Bina etki yardımcıları (Faz 3B) ──
// Binalar az (~birkaç) olduğu için her-frame düz tarama yeterli; ekstra yapı/tahsis yok.

/** Bir dünya-noktası bir moat tile'ının üstünde/yakınında mı? Öyleyse slowFactor, değilse 1. */
function moatSlowAt(wx, wy) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const col = wx / TW + wy / TH;
  const row = wy / TH - wx / TW;
  for (const b of buildings) {
    if (b.type !== 'moat') continue;
    if (Math.abs(col - b.gridX) <= 0.6 && Math.abs(row - b.gridY) <= 0.6)
      return CONFIG.BUILDINGS.moat.slowByLevel[b.level - 1]; // sv yükseldikçe 0.4→0.3→0.2
  }
  return 1;
}

/**
 * Healer (alarm) sınırı: yuva menzilindeki healer'lardan yalnız EN FAZLA 3'ü
 * (en eski kurulan, uid sıralı) kraliçeyi iyileştirebilir. Fazlası boşa gider.
 * Timer başına (15sn) ~bir kez çağrılır → her-frame maliyeti yok. Sınır 3 olsa da
 * healer sv1 zayıf (+3/15sn) başladığı için ölümsüzlük oluşmaz.
 */
function alarmCanHeal(b) {
  const r2 = CONFIG.BUILDINGS.alarm.healRange ** 2;
  const inRange = [];
  for (const o of buildings) {
    if (o.type !== 'alarm') continue;
    const w = worldFromGrid(o.gridX, o.gridY);
    if ((w.x - nestW.x) ** 2 + (w.y - nestW.y) ** 2 <= r2) inRange.push(o);
  }
  inRange.sort((a, c) => a.uid - c.uid);
  return inRange.indexOf(b) < 3;
}

/** (col,row) tam-tile koordinatı bir barikatla dolu mu? */
function isBarricadeTile(col, row) {
  for (const b of buildings) {
    if (b.type === 'barricade' && b.gridX === col && b.gridY === row) return true;
  }
  return false;
}

/** (col,row) tam-tile'da HERHANGİ bir bina var mı? Varsa o binayı döndür (yoksa null).
 * Bina-yıkıcı düşmanlar (ladybug/dungbeetle) önündeki binaya saldırmak için kullanır. */
function buildingAt(col, row) {
  for (const b of buildings) {
    if (b.gridX === col && b.gridY === row) return b;
  }
  return null;
}

/** Düşman binayı yıktı: iadesiz kaldır (oyuncu long-press %75 iadesinden AYRI — ceza). */
function destroyBuildingByEnemy(b) {
  const idx = buildings.indexOf(b);
  if (idx < 0) return;
  buildings.splice(idx, 1);
  if (upgradeMenu === b) upgradeMenu = null;
  const w = worldFromGrid(b.gridX, b.gridY);
  buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#c81e14', maxR: 46 });
  burst(w.x, w.y, '#d05050', 12);
  sndCatch();
}

class Building {
  constructor(type, col, row) {
    this.type  = type;
    this.gridX = col;
    this.gridY = row;
    this.level = 1;
    this.uid   = _uid++;
    this.applyLevel(); // maxHP'yi seviyeye göre hesapla + hp=maxHP
    // Faz 3B etki zamanlayıcıları (ms) — kullanılmayan binada da zararsız durur.
    this.spawnTimer = 0; // barracks
    this.cdTimer    = 0; // tower
    this.healTimer  = 0; // alarm (şifa taşı) periyodik iyileştirme
    this.shootTimer = 0; // ranger (atış kulesi) periyodik mermi
  }
  /** Seviyeye göre maxHP'yi yeniden hesapla ve canı doldur (kurulunca/yükselince). */
  applyLevel() {
    const mul = LVL_MUL[this.level - 1] || 1.0;
    this.maxHP = Math.round(CONFIG.BUILDINGS[this.type].hp * mul);
    this.hp    = this.maxHP;
  }
  /** Bu seviyenin etki çarpanı (tower hasarı, healer şifası, barracks hızı, moat seçimi). */
  effectMul() { return LVL_MUL[this.level - 1] || 1.0; }
  /**
   * Bina etkisi (Faz 3B). dt = ms (loop'taki ham delta). Tüm etkiler periyot
   * bazlı (ms) olduğundan dts değil dt alır. Moat/barikat etkileri düşman
   * tarafında (Enemy.step) işlenir; burada barracks/tower/alarm var.
   */
  update(dt) {
    const cfg = CONFIG.BUILDINGS[this.type];

    const eff = this.effectMul();
    if (this.type === 'barracks') {
      // Periyodik soldier üretimi (MAX karınca sınırına saygılı). Seviye → daha sık.
      this.spawnTimer += dt;
      if (this.spawnTimer >= cfg.spawnInterval / eff) {
        this.spawnTimer = 0;
        if (antCount() < CONFIG.ANT.MAX) {
          const a = spawnAnt('soldier');
          if (a) {
            const w = worldFromGrid(this.gridX, this.gridY);
            a.wx = w.x; a.wy = w.y; // yuvada değil, kışlada doğsun
            burst(w.x, w.y, '#8b1a1a', 8);
            sndBorn();
          }
        }
      }
    } else if (this.type === 'tower') {
      // Cooldown'da bir menzildeki TÜM düşmanlara AOE zehir
      this.cdTimer += dt;
      if (this.cdTimer >= cfg.cooldown) {
        this.cdTimer = 0;
        const w = worldFromGrid(this.gridX, this.gridY);
        const r2 = cfg.range * cfg.range;
        let hit = false;
        for (const e of enemies) {
          if (!e.active) continue;
          if ((e.wx - w.x) ** 2 + (e.wy - w.y) ** 2 > r2) continue;
          e.hp -= cfg.poisonDmg * eff; // seviye → daha fazla zehir
          burst(e.wx, e.wy, '#7fff3a', 5);
          hit = true;
          if (e.hp <= 0) killEnemy(e);
        }
        // Görsel: zehir atışında tower çevresinde mor AOE halkası (range'e ölçekli)
        if (hit) buildPulses.push({ wx: w.x, wy: w.y, life: 1.0, c: '#a050ff', maxR: cfg.range });
      }
    } else if (this.type === 'alarm') {
      // ŞİFA TAŞI: yuvaya healRange içindeyse periyodik olarak kraliçe HP'sini
      // healAmount kadar iyileştirir (MAX_HP'yi aşmadan). Yuvadan uzaktaysa etkisiz
      // → oyuncu stratejik olarak yuvaya yakın kurmak zorunda. (Bina onarımı Faz 2B.)
      // DENGE (Faz 3C): healer sv1 zayıf (+3) ve yuva menzilindeki healer'lardan
      // EN FAZLA 3 tanesi kraliçeyi iyileştirir (alarmCanHeal). Zayıf başlangıç
      // ölümsüzlüğü engeller; upgrade (sv3 ≈ +6) şart.
      this.healTimer += dt;
      if (this.healTimer >= cfg.healInterval) {
        this.healTimer = 0;
        const w = worldFromGrid(this.gridX, this.gridY);
        const inRange = (w.x - nestW.x) ** 2 + (w.y - nestW.y) ** 2 <= cfg.healRange * cfg.healRange;
        if (inRange && hudQueenHP < CONFIG.QUEEN.MAX_HP && alarmCanHeal(this)) {
          const heal = Math.round(cfg.healAmount * eff); // sv1 +3, sv2 +4, sv3 +6
          hudQueenHP = Math.min(CONFIG.QUEEN.MAX_HP, hudQueenHP + heal);
          buildPulses.push({ wx: nestW.x, wy: nestW.y, life: 1.0, c: '#5aff8a', maxR: 50 }); // yuvada şifa halkası
          burst(w.x, w.y, '#5aff8a', 6); // bina konumunda yeşil parçacık
        }
      }
    } else if (this.type === 'ranger') {
      // ATIŞ KULESİ: tower'dan farklı — AOE değil TEK HEDEF. Menzildeki EN YAKIN
      // aktif düşmana periyodik mermi atar. Seviye → daha sık (cooldown/eff),
      // daha uzun menzil (range×eff) ve daha güçlü mermi (dmg×eff).
      this.shootTimer += dt;
      if (this.shootTimer >= cfg.cooldown / eff) {
        this.shootTimer = 0;
        const w  = worldFromGrid(this.gridX, this.gridY);
        const r2 = (cfg.range * eff) ** 2;
        let best = null, bestD = r2;
        for (const e of enemies) {
          if (!e.active) continue;
          const d2 = (e.wx - w.x) ** 2 + (e.wy - w.y) ** 2;
          if (d2 <= bestD) { bestD = d2; best = e; }
        }
        if (best) {
          const d  = Math.max(1, Math.hypot(best.wx - w.x, best.wy - w.y));
          const sp = 7; // mermi hızı (world px / 60fps-frame)
          bullets.push({
            wx: w.x, wy: w.y,
            vx: (best.wx - w.x) / d * sp,
            vy: (best.wy - w.y) / d * sp,
            dmg: cfg.dmg * eff, target: best,
            lvl: this.level
          });
        }
      }
    } else if (this.type === 'catapult') {
      // MANCINIK: ranger gibi mermi/gülle atar AMA temas noktasında tower gibi AOE
      // hasar verir. Yavaş (cooldown 2500/eff) ama sert. Menzildeki EN YAKIN düşmanı
      // hedef alıp ona "aoe" işaretli gülle fırlatır; updateBullets temasta patlatır.
      this.shootTimer += dt;
      if (this.shootTimer >= cfg.cooldown / eff) {
        this.shootTimer = 0;
        const w  = worldFromGrid(this.gridX, this.gridY);
        const r2 = (cfg.range * eff) ** 2;
        let best = null, bestD = r2;
        for (const e of enemies) {
          if (!e.active) continue;
          const d2 = (e.wx - w.x) ** 2 + (e.wy - w.y) ** 2;
          if (d2 <= bestD) { bestD = d2; best = e; }
        }
        if (best) {
          const d  = Math.max(1, Math.hypot(best.wx - w.x, best.wy - w.y));
          const sp = 5; // gülle ranger merminden yavaş (ağır vuruş hissi)
          bullets.push({
            wx: w.x, wy: w.y,
            vx: (best.wx - w.x) / d * sp,
            vy: (best.wy - w.y) / d * sp,
            dmg: cfg.dmg * eff, target: best,
            aoe: true, aoeRadius: cfg.aoeRadius * eff,
            lvl: this.level
          });
        }
      }
    }
  }
  draw() {
    const { x, y } = toScreen(this.gridX, this.gridY);
    const s   = camera.scale;
    const cfg = CONFIG.BUILDINGS[this.type];
    // Önceden pişirilmiş (gölge baked) emoji bitmap'i — fillText/shadowBlur yok.
    const fontPx = Math.max(14, Math.round(20 * s));
    const spr = getEmojiSprite(cfg.emoji, fontPx);
    const cy  = y - 4 * s; // emoji merkezi (eski hizalama korunur)
    // Kalıcı SEVİYE GÖRSELİ (metin yok): sv2 gümüş / sv3 altın hâle+halka + büyütme.
    // Ucuz: tek dolu daire + tek stroke (gradient yok) → çok binada da hafif.
    const tier = LVL_TIER[this.level - 1];
    // sv4+ : nabız gibi atan dış parıltı halkası
    if (this.level >= 4) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 350 + (this.gridX + this.gridY));
      const gr = spr.size * 0.40 * tier.scale * (1.35 + 0.15 * pulse);
      ctx.save();
      ctx.globalAlpha = tier.glowA * 0.45 * (0.6 + 0.4 * pulse);
      ctx.fillStyle = tier.color;
      ctx.beginPath(); ctx.arc(x, cy, gr, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    if (tier.ring) {
      const rr = spr.size * 0.40 * tier.scale;
      ctx.save();
      ctx.globalAlpha = tier.glowA;
      ctx.fillStyle   = tier.color;
      ctx.beginPath(); ctx.arc(x, cy, rr, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.9;
      ctx.lineWidth   = Math.max(1.5, 2 * s);
      ctx.strokeStyle = tier.color;
      ctx.beginPath(); ctx.arc(x, cy, rr, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    // Sprite merkezli pişti → sol-üst köşeyi yarım (ölçekli) sprite kadar kaydır.
    const sz = spr.size * tier.scale;
    ctx.drawImage(spr.canvas, x - sz / 2, cy - sz / 2, sz, sz);

    // HP barı: yalnız hasarlıyken (hp < maxHP) — tam canlıyken temiz kalsın.
    // Düşman HP barıyla aynı stil (yeşil→kırmızı, gradient/shadow yok, performanslı).
    if (this.hp < this.maxHP) {
      const frac = Math.max(0, this.hp / this.maxHP);
      const bw = 26 * s, bh = 4 * s;
      const bx = x - bw / 2, by = cy - sz / 2 - 8 * s;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
      const r = Math.round(220 * (1 - frac) + 40 * frac);
      const g = Math.round(200 * frac + 40 * (1 - frac));
      ctx.fillStyle = `rgb(${r},${g},40)`;
      ctx.fillRect(bx, by, bw * frac, bh);
    }
  }
}

function openRadialMenu(col, row) {
  upgradeMenu = null;        // iki menü aynı anda açık olmaz
  radialMenu = { col, row };
}

// ===== UPGRADE BALONU (dolu tile'a tap) =====
function openUpgradeMenu(b) {
  radialMenu  = null;        // iki menü aynı anda açık olmaz
  upgradeMenu = b;
}

/** Balon yerleşimi (kamera-aware): bina ekran konumundan panel + buton dikdörtgeni. */
function upgradeMenuLayout(b) {
  const sc = toScreen(b.gridX, b.gridY);
  const w = 168, h = 114; // etki satırı için +yükseklik (Faz 3C balon bilgisi)
  let bx = sc.x - w / 2;
  let by = sc.y - 64 - h;        // binanın üstünde
  bx = Math.max(6, Math.min(W - w - 6, bx));
  by = Math.max(6, by);
  const btn = { x: bx + 12, y: by + h - 32, w: w - 24, h: 26 };
  return { bx, by, w, h, btn };
}

/**
 * Upgrade balonundaki etki satırı: "şu an → yükseltince" (MAX'ta sadece şu an).
 * Değerler effectMul/LVL_MUL ile AYNI formülden türetilir (gösterim, mantık değil).
 */
function effectLine(b) {
  const cfg  = CONFIG.BUILDINGS[b.type];
  const lvl  = b.level;
  const isMax = lvl >= 6;
  const curM = LVL_MUL[lvl - 1];
  const nxtM = isMax ? 0 : LVL_MUL[lvl];
  switch (b.type) {
    case 'tower': {
      const cur = Math.round(cfg.poisonDmg * curM);
      return 'Zehir: ' + (isMax ? cur : cur + ' → ' + Math.round(cfg.poisonDmg * nxtM));
    }
    case 'ranger': {
      const cur = Math.round(cfg.dmg * curM);
      return 'Atış: ' + (isMax ? cur : cur + ' → ' + Math.round(cfg.dmg * nxtM));
    }
    case 'catapult': {
      const cur = Math.round(cfg.dmg * curM); // AOE hasar (patlama)
      return 'Patlama: ' + (isMax ? cur : cur + ' → ' + Math.round(cfg.dmg * nxtM));
    }
    case 'alarm': {
      const cur = Math.round(cfg.healAmount * curM);
      return isMax ? ('Şifa: +' + cur + '/15sn')
                   : ('Şifa: +' + cur + ' → +' + Math.round(cfg.healAmount * nxtM) + '/15sn');
    }
    case 'barracks': {
      const cur = (cfg.spawnInterval / curM / 1000).toFixed(1);
      return isMax ? ('Asker: her ' + cur + 'sn')
                   : ('Asker: her ' + cur + 'sn → ' + (cfg.spawnInterval / nxtM / 1000).toFixed(1) + 'sn');
    }
    case 'moat': {
      const cur = cfg.slowByLevel[lvl - 1];
      return 'Hız: ' + (isMax ? '×' + cur : '×' + cur + ' → ×' + cfg.slowByLevel[lvl]);
    }
    case 'barricade': {
      return 'Engel — HP: ' + (isMax ? b.maxHP : b.maxHP + ' → ' + Math.round(cfg.hp * nxtM));
    }
  }
  return '';
}

function drawUpgradeMenu() {
  if (!upgradeMenu) return;

  // Başlık: emoji + isim
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold 13px -apple-system, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(cfg.emoji + ' ' + fitText(cfg.name, L.w - 30), cx, L.by + 20);
  // Seviye + HP
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillStyle = '#ffe08f';
  ctx.fillText('Sv ' + b.level + '/6   ❤️ ' + Math.round(b.hp) + '/' + b.maxHP, cx, L.by + 38);

  ctx.fillStyle = '#9fe89f';

    rrect(L.btn.x, L.btn.y, L.btn.w, L.btn.h, 7); ctx.fill();

/** Yükselt butonu vuruldu mu? (sv6 veya yem yetersizse null) */
function upgradeBtnHit(x, y) {
  if (!upgradeMenu || upgradeMenu.level >= 6) return false;
  const cost = upgradeCostFor(upgradeMenu.type, upgradeMenu.level + 1);
  if (food < cost) return false;
  const L = upgradeMenuLayout(upgradeMenu);
  return x >= L.btn.x && x <= L.btn.x + L.btn.w && y >= L.btn.y && y <= L.btn.y + L.btn.h;
}

/** Yuva HP upgrade maliyeti: ilk 80, sonra her seferinde +40 (80 → 120 → 160 → ...). */
function nestUpgradeCost() { return 80 + nestUpgradeCount * 40; }

/** Yuva menüsü yerleşimi (kamera-aware): panel + Yükselt butonu dikdörtgeni.
 *  Bina menüsündeki upgradeMenuLayout ile AYNI yaklaşım (çizim + hit-test tek kaynak). */
function nestMenuLayout() {
  const sc = screenFromWorld(nestW.x, nestW.y);
  const w = 168, h = 114;                 // bina upgrade menüsüyle AYNI ölçüler
  let bx = sc.x - w / 2;
  let by = sc.y - 70 - h;                 // yuvanın üstünde
  bx = Math.max(6, Math.min(W - w - 6, bx));
  by = Math.max(6, by);
  const btn = { x: bx + 12, y: by + h - 32, w: w - 24, h: 26 };
  return { bx, by, w, h, btn };
}

/** Yuva Yükselt butonu vuruldu mu? (yem yetersizse bile geometrik vuruşa bakar;
 *  yetersizlik kontrolü doNestUpgrade içinde — buton soluk görünür ama tıklama tüketilir.) */
function nestBtnHit(x, y) {
  if (!nestMenu) return false;
  const L = nestMenuLayout();
  return x >= L.btn.x && x <= L.btn.x + L.btn.w && y >= L.btn.y && y <= L.btn.y + L.btn.h;
}

/** Yuva HP upgrade'i uygula: +50 max HP, anlık +50 HP, artan maliyet. Yem yetmezse no-op. */
function doNestUpgrade() {
  const cost = nestUpgradeCost();
  if (food < cost) return;                // yetersiz yem → hiçbir şey yapma
  food -= cost;
  CONFIG.QUEEN.MAX_HP += 50;
  hudQueenHP += 50;                        // mevcut HP de artsın → anında fayda
  nestUpgradeCount++;
  // Yuvanın üstünde yükselip solan "+50 ❤️" metni (doUpgrade'deki floatTexts formatı). KALIR.
  floatTexts.push({ wx: nestW.x, wy: nestW.y, life: 1.0, text: '+50 ❤️', color: '#7fff8a' });
  // HP temalı KIRMIZI/PEMBE halka pulsu — şifa taşının yeşil pulsundan (#5aff8a) ayrılsın.
  buildPulses.push({ wx: nestW.x, wy: nestW.y, life: 1.0, c: '#ff5a7a', maxR: 56 });
  burst(nestW.x, nestW.y, '#ff5a7a', 14);
  sndPower();
}

  rrect(L.btn.x, L.btn.y, L.btn.w, L.btn.h, 7); ctx.fill();
