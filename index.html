<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Ant Kingdom</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#1c130a;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;touch-action:none;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ===== CONFIG =====
const CONFIG = {
  TILE:      { W: 64, H: 32 },
  GRID:      { COLS: 15, ROWS: 15 },
  CAMERA:    { MIN_ZOOM: 0.55, MAX_ZOOM: 2.5, START_ZOOM: 1.0 },
  ANT:       { BASE_SPEED: 1.7, SENSE_RANGE: 110, START_WORKERS: 10, START_SOLDIERS: 3, START_CARRIERS: 2, MAX: 80,
               CARRIER_SPEED: 0.6, SOLDIER_SCALE: 1.3, GUARD_RADIUS: 80, SPEED_BOOST: 1.7 },
  PHEROMONE: { CELL: 14, MAX: 100, DECAY: 0.992, DEPOSIT: 3 },
  WAVE:      { DURATION_MS: 60000, PREP_MS: 15000, BASE_ENEMIES: 3, ENEMY_PER_WAVE: 2, HP_GROWTH: 1.15, BONUS_PER_WAVE: 50 },
  QUEEN:     { MAX_HP: 100 },
  POOL:      { ANTS: 200, ENEMIES: 100, PARTICLES: 400 }
};

// ===== AUDIO (TAŞINDI — değiştirilmedi, sadece blok olarak korundu) =====
let actx = null, soundOn = true, musicTimer = null, musicGain = null;
function initAudio() { if (actx) return; try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
function beep(freq, dur, type = "sine", vol = 0.15) {
  if (!actx || !soundOn) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(actx.destination);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.start(); o.stop(actx.currentTime + dur);
}
const sndFood    = () => beep(660, 0.07, "square", 0.06);
const sndDeposit = () => { beep(520, 0.09, "sine", 0.1); beep(780, 0.11, "sine", 0.08); };
const sndBorn    = () => beep(950, 0.14, "triangle", 0.11);
const sndCatch   = () => beep(130, 0.25, "sawtooth", 0.16);
const sndPower   = () => { beep(700, 0.08, "square", 0.12); beep(1050, 0.12, "square", 0.12); };
const sndBird    = () => beep(1400, 0.2, "sine", 0.1);
const melody = [392, 440, 523, 440, 392, 330, 392, 294]; let mi = 0;
function startMusic() {
  if (!actx || !soundOn) return; stopMusic();
  musicGain = actx.createGain(); musicGain.gain.value = 0.04; musicGain.connect(actx.destination);
  musicTimer = setInterval(() => {
    if (!soundOn) return;
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = "triangle"; o.frequency.value = melody[mi % melody.length] / 2; mi++;
    o.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0.0001, actx.currentTime);
    g.gain.linearRampToValueAtTime(1, actx.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.45);
    o.start(); o.stop(actx.currentTime + 0.5);
  }, 420);
}
function stopMusic() { if (musicTimer) { clearInterval(musicTimer); musicTimer = null; } }

// ===== CANVAS =====
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = innerWidth; H = innerHeight;
  canvas.width  = W * DPR; canvas.height = H * DPR;
  canvas.style.width  = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // Keep diamond edges crisp at all zoom levels (no bilinear blur on paths)
  ctx.imageSmoothingEnabled = false;
  centerCamera();
}

// ===== ROUNDRECT POLYFILL =====
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ===== STATE MACHINE =====
// state ∈ 'MENU' | 'PLAYING' | 'GAMEOVER'
let state = 'MENU';
let lastScore = 0, lastWave = 1, prevBest = 0;
let food = 0;          // collected food resource
let foodSpawnTimer = 0; // ms accumulator for periodic food spawn
const FOOD_MIN_MAP   = 6;   // respawn threshold
const FOOD_SPAWN_MS  = 3000; // periodic interval ms
const FOOD_MAX_AGE_MS = 20000; // uncollected food expires after 20s
const ANT_BIRTH_COST = 10;   // food spent per new worker

// ===== CAMERA =====
const camera = {
  x: 0, y: 0,
  scale: CONFIG.CAMERA.START_ZOOM,
  dragging: false,
  dragStartX: 0, dragStartY: 0,
  camStartX: 0, camStartY: 0,
  // Pinch
  pinchActive: false,
  pinchDist: 0, pinchScale: 1,
  pinchMidX: 0, pinchMidY: 0,
  pinchCamX: 0, pinchCamY: 0
};

/** Center camera so the isometric grid sits centered in viewport */
function centerCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const gc = (CONFIG.GRID.COLS - 1) / 2;
  const gr = (CONFIG.GRID.ROWS - 1) / 2;
  const isoX = (gc - gr) * (TW / 2) * camera.scale;
  const isoY = (gc + gr) * (TH / 2) * camera.scale;
  camera.x = W / 2 - isoX;
  camera.y = H / 2 - isoY;
  clampCamera();
}

/** Keep grid visible; allow generous panning */
function clampCamera() {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const gridW = (COLS + ROWS - 2) * (TW / 2) * s;
  const gridH = (COLS + ROWS - 2) * (TH / 2) * s;
  const mx = gridW * 0.9, my = gridH * 0.9;
  camera.x = Math.max(-gridW + W * 0.1, Math.min(gridW + W * 0.9, camera.x));
  camera.y = Math.max(-my,              Math.min(gridH + my,       camera.y));
}

// ===== COORDINATE TRANSFORMS =====

/**
 * Grid (col, row) → screen pixel (camera-aware)
 * @param {number} col
 * @param {number} row
 * @returns {{x:number, y:number}}
 */
function toScreen(col, row) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  return {
    x: (col - row) * (TW / 2) * camera.scale + camera.x,
    y: (col + row) * (TH / 2) * camera.scale + camera.y
  };
}

/**
 * Screen pixel → grid (col, row) — inverse of toScreen
 * @param {number} sx
 * @param {number} sy
 * @returns {{col:number, row:number}}
 */
function toGrid(sx, sy) {
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const x = (sx - camera.x) / camera.scale;
  const y = (sy - camera.y) / camera.scale;
  return {
    col: Math.round((x / (TW / 2) + y / (TH / 2)) / 2),
    row: Math.round((y / (TH / 2) - x / (TW / 2)) / 2)
  };
}

/** True if (col,row) is inside the grid */
function inBounds(col, row) {
  return col >= 0 && row >= 0 && col < CONFIG.GRID.COLS && row < CONFIG.GRID.ROWS;
}

// ===== POINTER INPUT (unified mouse + touch) =====
let pointers = new Map(); // pointerId → {x,y}
let dragDist = 0;         // px moved since pointerdown — distinguishes tap vs drag
const TAP_MAX = 8;

/** Begin pan tracking from a single pointer position */
function startPan(x, y) {
  camera.dragging   = true;
  camera.dragStartX = x; camera.dragStartY = y;
  camera.camStartX  = camera.x; camera.camStartY = camera.y;
  dragDist = 0;
}

/** Apply zoom keeping world point under screen (mx,my) fixed.
 *  Formula: worldPt = (screen - camera) / scale  →  camera = screen - worldPt * newScale
 */
function applyZoom(mx, my, newScale) {
  newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM, Math.min(CONFIG.CAMERA.MAX_ZOOM, newScale));
  // World point currently under (mx,my)
  const wx = (mx - camera.x) / camera.scale;
  const wy = (my - camera.y) / camera.scale;
  camera.scale = newScale;
  camera.x = mx - wx * newScale;
  camera.y = my - wy * newScale;
  clampCamera();
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (pointers.size === 1) {
    // Single finger → pan
    startPan(e.clientX, e.clientY);
    camera.pinchActive = false;
  }

  if (pointers.size === 2) {
    // Second finger arrived → switch to pinch, cancel pan
    camera.dragging    = false;
    camera.pinchActive = true;
    const pts = [...pointers.values()];
    const mx  = (pts[0].x + pts[1].x) / 2;
    const my  = (pts[0].y + pts[1].y) / 2;
    camera.pinchDist   = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    camera.pinchScale  = camera.scale;
    // World point under initial pinch midpoint — kept fixed during zoom
    camera.pinchWorldX = (mx - camera.x) / camera.scale;
    camera.pinchWorldY = (my - camera.y) / camera.scale;
  }
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (state !== 'PLAYING') return;

  if (pointers.size >= 2 && camera.pinchActive) {
    // ── PINCH ZOOM (pan disabled while two fingers down) ──
    const pts = [...pointers.values()];
    const mx  = (pts[0].x + pts[1].x) / 2;
    const my  = (pts[0].y + pts[1].y) / 2;
    const dist = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
    const newScale = Math.max(CONFIG.CAMERA.MIN_ZOOM,
                      Math.min(CONFIG.CAMERA.MAX_ZOOM,
                        camera.pinchScale * dist / camera.pinchDist));
    // Keep initial world point fixed under current finger midpoint
    camera.scale = newScale;
    camera.x = mx - camera.pinchWorldX * newScale;
    camera.y = my - camera.pinchWorldY * newScale;
    clampCamera();
    return; // intentionally skip pan path
  }

  if (pointers.size === 1 && camera.dragging) {
    // ── PAN (single finger) ──
    const dx = e.clientX - camera.dragStartX;
    const dy = e.clientY - camera.dragStartY;
    dragDist = Math.hypot(dx, dy);
    camera.x = camera.camStartX + dx;
    camera.y = camera.camStartY + dy;
    clampCamera();
  }

  // Hover highlight (mouse only, not during drag)
  if (pointers.size === 1 && dragDist < TAP_MAX) {
    const g = toGrid(e.clientX, e.clientY);
    hoverCol = g.col; hoverRow = g.row;
  }
}, { passive: false });

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  const wasDrag = dragDist > TAP_MAX;
  const upX = e.clientX, upY = e.clientY;
  pointers.delete(e.pointerId);

  if (pointers.size === 1 && camera.pinchActive) {
    // One finger lifted after pinch → re-anchor pan to remaining finger
    camera.pinchActive = false;
    camera.dragging    = false; // don't immediately pan; wait for next down
    // Allow remaining finger to start a fresh pan on next move without a down
    const rem = [...pointers.values()][0];
    startPan(rem.x, rem.y);
  }

  if (pointers.size === 0) {
    camera.pinchActive = false;
    camera.dragging    = false;
    if (!wasDrag) handleTap(upX, upY);
  }
}, { passive: false });

canvas.addEventListener('pointercancel', e => {
  pointers.delete(e.pointerId);
  if (pointers.size === 0) { camera.dragging = false; camera.pinchActive = false; }
});

// ── MOUSE WHEEL ZOOM (desktop) — cursor point stays fixed ──
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (state !== 'PLAYING') return;
  const factor   = e.deltaY > 0 ? 0.88 : 1.12;
  const newScale = camera.scale * factor;
  applyZoom(e.clientX, e.clientY, newScale);
}, { passive: false });

// ===== UNIFIED TAP HANDLER =====
function handleTap(x, y) {
  if      (state === 'MENU')     onMenuTap(x, y);
  else if (state === 'PLAYING')  onPlayingTap(x, y);
  else if (state === 'GAMEOVER') onGameoverTap(x, y);
}

// ===== STORAGE =====

/**
 * Save score to top-5 list
 * @param {number} score
 * @param {number} wave
 */
function saveScore(score, wave) {
  const scores = getTopScores();
  scores.push({ score, wave, date: new Date().toLocaleDateString('tr-TR') });
  scores.sort((a, b) => b.score - a.score);
  localStorage.setItem('antKingdomScores', JSON.stringify(scores.slice(0, 5)));
  const prev = parseInt(localStorage.getItem('antKingdomBest') || '0');
  if (score > prev) localStorage.setItem('antKingdomBest', String(score));
}

/** @returns {{score:number,wave:number,date:string}[]} */
function getTopScores() {
  try { return JSON.parse(localStorage.getItem('antKingdomScores') || '[]'); }
  catch { return []; }
}

/** @returns {number} */
function getBest() {
  const s = getTopScores();
  if (s.length) return s[0].score;
  return parseInt(localStorage.getItem('antKingdomBest') || '0');
}

// ===== MENU =====
let menuStartTime = 0;
let menuStartBtn  = { x: 0, y: 0, w: 220, h: 60 };

// Harf harf fade-in için her harfin alpha'sı
const TITLE_STR = 'ANT KINGDOM';
let titleChars = [];

// Dekoratif karınca siluetleri
let menuAnts = [];

function initMenu() {
  state = 'MENU';
  menuStartTime = performance.now();
  titleChars = TITLE_STR.split('').map((ch, i) => ({
    ch, alpha: 0, target: 1, delay: i * 75
  }));
  menuAnts = Array.from({ length: 6 }, () => ({
    x: Math.random() * 500, y: Math.random() * 900,
    angle: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.3,
    wig: Math.random() * 10
  }));
}

function updateMenu(dt) {
  const now = performance.now() - menuStartTime;
  for (const c of titleChars) {
    if (now > c.delay) c.alpha = Math.min(1, c.alpha + dt * 0.004);
  }
  for (const a of menuAnts) {
    a.wig += 0.25; a.angle += (Math.random() - 0.5) * 0.04;
    a.x += Math.cos(a.angle) * a.speed;
    a.y += Math.sin(a.angle) * a.speed;
    if (a.x < -20) a.x = W + 20; if (a.x > W + 20) a.x = -20;
    if (a.y < -20) a.y = H + 20; if (a.y > H + 20) a.y = -20;
  }
}

function drawMenu() {
  // Background
  const bg = ctx.createRadialGradient(W / 2, H * 0.45, 40, W / 2, H * 0.45, Math.max(W, H) * 0.9);
  bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Dekoratif karıncalar (siluet)
  ctx.globalAlpha = 0.13;
  for (const a of menuAnts) drawAntShape(a.x, a.y, a.angle, a.wig, '#e8542a', 1);
  ctx.globalAlpha = 1;

  // Emoji karınca
  ctx.font = '52px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🐜', W / 2, H * 0.22);

  // Başlık — harf harf fade
  ctx.font = 'bold 40px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  const tW    = ctx.measureText(TITLE_STR).width;
  let   ox    = W / 2 - tW / 2;
  const titleY = H * 0.31;
  ctx.shadowColor = '#c8840a'; ctx.shadowBlur = 14;
  for (const c of titleChars) {
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#ffe08f';
    const cw = ctx.measureText(c.ch).width;
    ctx.fillText(c.ch, ox, titleY);
    ox += cw;
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // Alt başlık
  ctx.textAlign = 'center';
  ctx.font = '15px -apple-system, sans-serif';
  ctx.fillStyle = '#c4a47a';
  ctx.globalAlpha = 0.85;
  ctx.fillText('İzometrik Tower Defense · Karınca Kolonisi', W / 2, H * 0.37);
  ctx.globalAlpha = 1;

  // Top skorlar
  const scores = getTopScores().slice(0, 3);
  if (scores.length) {
    ctx.fillStyle = '#ffe08f';
    ctx.font = 'bold 13px -apple-system, sans-serif';
    ctx.fillText('🏆 En İyi Skorlar', W / 2, H * 0.46);
    ctx.font = '13px -apple-system, sans-serif';
    ctx.fillStyle = '#d4b896';
    scores.forEach((s, i) =>
      ctx.fillText(`${i + 1}.  ${s.score} puan  —  Dalga ${s.wave}`, W / 2, H * 0.46 + 22 + i * 20));
  }

  // Başla butonu
  const bw = 220, bh = 60;
  const bx = W / 2 - bw / 2, by = H * 0.65;
  menuStartBtn = { x: bx, y: by, w: bw, h: bh };
  ctx.fillStyle = '#7cc36b';
  rrect(bx, by, bw, bh, 14); ctx.fill();
  ctx.fillStyle = '#1f150a';
  ctx.font = 'bold 22px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🐜  BAŞLA', W / 2, by + bh * 0.65);

  // Legend
  ctx.globalAlpha = 0.72;
  ctx.font = '12px -apple-system, sans-serif';
  ctx.fillStyle = '#c4a47a';
  ctx.fillText('🍃 +1  🍎 +3  🍬 +5   |   ⚡ Hız  🛡 Kalkan  🥚 +3 Karınca', W / 2, H * 0.82);
  ctx.fillText('Dikkat:  🕷 Örümcek  🐦 Kuş  🐞 Uğur Böceği  🪲 Bokböceği', W / 2, H * 0.82 + 20);
  ctx.globalAlpha = 1;
}

function onMenuTap(x, y) {
  const b = menuStartBtn;
  if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) startGame();
}

// ===== GAME OVER =====
let gameoverBtn = { x: 0, y: 0, w: 0, h: 0 };

function drawGameover() {
  ctx.fillStyle = 'rgba(14,8,2,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  const isNew = lastScore > prevBest && lastScore > 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px -apple-system, sans-serif';
  ctx.fillText('⏱ Süre Doldu!', W / 2, H * 0.33);

  if (isNew) {
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
    ctx.font = 'bold 28px -apple-system, sans-serif';
    ctx.fillText('🎉  YENİ REKOR!', W / 2, H * 0.42);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#ffe08f';
    ctx.font = '18px -apple-system, sans-serif';
    ctx.fillText('🏆 En İyi: ' + getBest(), W / 2, H * 0.42);
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 30px -apple-system, sans-serif';
  ctx.fillText('Puan: ' + lastScore, W / 2, H * 0.51);
  ctx.fillStyle = '#d4b896';
  ctx.font = '17px -apple-system, sans-serif';
  ctx.fillText('Dalga: ' + lastWave, W / 2, H * 0.58);

  const bw = 230, bh = 60;
  const bx = W / 2 - bw / 2, by = H * 0.68;
  gameoverBtn = { x: bx, y: by, w: bw, h: bh };
  ctx.fillStyle = '#7cc36b';
  rrect(bx, by, bw, bh, 14); ctx.fill();
  ctx.fillStyle = '#1f150a';
  ctx.font = 'bold 20px -apple-system, sans-serif';
  ctx.fillText('🔄  TEKRAR OYNA', W / 2, by + bh * 0.65);
}

function onGameoverTap(x, y) {
  const b = gameoverBtn;
  if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) initMenu();
}

// ===== GRID =====
const NEST_COL = Math.floor(CONFIG.GRID.COLS / 2);
const NEST_ROW = Math.floor(CONFIG.GRID.ROWS / 2);

// grid[row][col] = {type:'grass'|'dirt'|'nest'}
let grid = [];

function initGrid() {
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const dc = Math.abs(c - NEST_COL), dr = Math.abs(r - NEST_ROW);
      let type;
      if (dc <= 1 && dr <= 1) type = 'nest';
      else if ((dc === 0 || dr === 0) && (dc + dr <= 5)) type = 'dirt';
      else type = 'grass';
      grid[r][c] = { type };
    }
  }
}

// ===== GRID DRAW =====
let hoverCol = -1, hoverRow = -1;

function drawGrid() {
  ctx.imageSmoothingEnabled = false; // stays crisp at any zoom
  const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
  const COLS = CONFIG.GRID.COLS, ROWS = CONFIG.GRID.ROWS;
  const s = camera.scale;
  const hw = (TW / 2) * s, hh = (TH / 2) * s;

  // Draw back-to-front: row 0..ROWS-1, col 0..COLS-1
  // Within same (col+row) value tiles don't overlap, so this order is correct.
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x, y } = toScreen(c, r);

      // Frustum cull — skip tiles fully outside viewport
      if (x + hw < 0 || x - hw > W || y + hh < 0 || y - hh > H) continue;

      const tile = grid[r][c];

      // Diamond fill
      ctx.beginPath();
      ctx.moveTo(x,      y - hh);
      ctx.lineTo(x + hw, y);
      ctx.lineTo(x,      y + hh);
      ctx.lineTo(x - hw, y);
      ctx.closePath();

      if (tile.type === 'nest') {
        ctx.fillStyle = '#2a1a0a';
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = '#6b4423';
      } else {
        // Grass: subtle deterministic shade variation
        const v = ((c * 3 + r * 7) % 5) * 5;
        ctx.fillStyle = `rgb(${62 + v},${115 + v},${52 + v})`;
      }
      ctx.fill();

      // Hover highlight
      if (c === hoverCol && r === hoverRow) {
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.fill();
      }

      // Edge
      ctx.strokeStyle = tile.type === 'nest' ? '#1a0d05'
                      : tile.type === 'dirt' ? '#4a2e15'
                                             : '#3d6834';
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Texture dots — deterministic RNG from tile position
      const seed = c * 17 + r * 31;
      if (tile.type === 'grass') {
        ctx.fillStyle = 'rgba(255,255,255,0.055)';
        for (let i = 0; i < 4; i++) {
          const dx = (((seed * (i + 1) * 13) % 100) - 50) / 100 * hw * 0.68;
          const dy = (((seed * (i + 1) *  7) % 100) - 50) / 100 * hh * 0.68;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.4 * s, 0, Math.PI * 2); ctx.fill();
        }
      } else if (tile.type === 'dirt') {
        ctx.fillStyle = 'rgba(0,0,0,0.14)';
        for (let i = 0; i < 3; i++) {
          const dx = (((seed * (i + 2) * 19) % 100) - 50) / 100 * hw * 0.6;
          const dy = (((seed * (i + 2) * 11) % 100) - 50) / 100 * hh * 0.6;
          ctx.beginPath(); ctx.arc(x + dx, y + dy, 1.1 * s, 0, Math.PI * 2); ctx.fill();
        }
      }

      // Nest center tile: entrance + rings
      if (tile.type === 'nest' && c === NEST_COL && r === NEST_ROW) {
        drawNestEntrance(x, y, hw, hh, s);
      }
    }
  }
}

function drawNestEntrance(x, y, hw, hh, s) {
  // Outer ring
  ctx.strokeStyle = '#7a5630'; ctx.lineWidth = 3 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.62, hh * 0.62, 0, 0, Math.PI * 2); ctx.stroke();
  // Mid ring
  ctx.strokeStyle = '#5a3d20'; ctx.lineWidth = 1.5 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.47, hh * 0.47, 0, 0, Math.PI * 2); ctx.stroke();
  // Entrance hole
  ctx.fillStyle = '#0e0905';
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.32, hh * 0.32, 0, 0, Math.PI * 2); ctx.fill();
  // Inner glow rim
  ctx.strokeStyle = 'rgba(200,132,10,0.3)'; ctx.lineWidth = 2 * s;
  ctx.beginPath(); ctx.ellipse(x, y, hw * 0.33, hh * 0.33, 0, 0, Math.PI * 2); ctx.stroke();
}

// ===== DEPTH SORT SCAFFOLD =====
// Phase 1+ will push entities here each frame; drawables is sorted by (col+row)
// For Phase 0 this is unused — grid tiles are drawn directly.
// Structure: { col, row, zOfs:0, draw: fn }
let drawables = [];

/** Sort drawables by depth (painter's algorithm) */
function sortDrawables() {
  drawables.sort((a, b) => (a.col + a.row + (a.zOfs || 0)) - (b.col + b.row + (b.zOfs || 0)));
}

// ===== WORLD SPACE (camera-independent iso-pixel coordinates) =====
// Ants, food and pheromones live in "world" space — the pre-camera iso pixel
// space. screenFromWorld() applies the camera; toScreen(col,row) is exactly
// screenFromWorld(worldFromGrid(col,row)), so everything stays consistent.
// Bounds include a small inward margin so ants stay visually inside the grid.
const _MARGIN = 8; // world-px margin inside grid edge
const WORLD = {
  minX: -(CONFIG.GRID.ROWS - 1) * CONFIG.TILE.W / 2 + _MARGIN,
  maxX:  (CONFIG.GRID.COLS - 1) * CONFIG.TILE.W / 2 - _MARGIN,
  minY:  _MARGIN,
  maxY:  (CONFIG.GRID.COLS - 1 + CONFIG.GRID.ROWS - 1) * CONFIG.TILE.H / 2 - _MARGIN
};

/** Grid (col,row) → world iso-pixel (tile center) */
function worldFromGrid(col, row) {
  return { x: (col - row) * CONFIG.TILE.W / 2, y: (col + row) * CONFIG.TILE.H / 2 };
}
/** World iso-pixel → screen pixel (camera-aware) */
function screenFromWorld(wx, wy) {
  return { x: wx * camera.scale + camera.x, y: wy * camera.scale + camera.y };
}

// Nest center in world space (NEST_COL/ROW defined in grid section)
let nestW = { x: 0, y: 0 };
const NEST_WORLD_R = CONFIG.TILE.H; // deposit radius (world px)

// Shared power-up timers (used by Ant.speed / shield; wired fully in later phases)
let speedTimer = 0, shieldTimer = 0;

// ===== PHEROMONE (TAŞINDI — world space'e uyarlandı) =====
const PH = { cols: 0, rows: 0, grid: null };
const PCELL = CONFIG.PHEROMONE.CELL;

/** Allocate pheromone grid over world bounds */
function setupPher() {
  PH.cols = Math.ceil((WORLD.maxX - WORLD.minX) / PCELL) + 1;
  PH.rows = Math.ceil((WORLD.maxY - WORLD.minY) / PCELL) + 1;
  PH.grid = new Float32Array(PH.cols * PH.rows);
}
/** World coord → pheromone cell index (-1 if out of bounds) */
function pIdx(wx, wy) {
  const cx = Math.floor((wx - WORLD.minX) / PCELL);
  const cy = Math.floor((wy - WORLD.minY) / PCELL);
  if (cx < 0 || cy < 0 || cx >= PH.cols || cy >= PH.rows) return -1;
  return cy * PH.cols + cx;
}
/** Deposit pheromone at world coord */
function addP(wx, wy, a) {
  const i = pIdx(wx, wy);
  if (i >= 0) PH.grid[i] = Math.min(PH.grid[i] + a, CONFIG.PHEROMONE.MAX);
}
/** Sense strongest pheromone in a forward arc → desired angle (or null) */
function senseP(ant) {
  const ah = 20; let b = -1, bd = null;
  for (let a = -0.6; a <= 0.6; a += 0.3) {
    const an = ant.angle + a;
    const i = pIdx(ant.wx + Math.cos(an) * ah, ant.wy + Math.sin(an) * ah);
    if (i >= 0 && PH.grid[i] > b) { b = PH.grid[i]; bd = an; }
  }
  return b > 1 ? bd : null;
}
/** Shortest signed angular difference target-current */
function aDiff(t, c) { let d = t - c; while (d > Math.PI) d -= Math.PI * 2; while (d < -Math.PI) d += Math.PI * 2; return d; }

// ===== FOOD (TAŞINDI — TYPES korundu) =====
const TYPES = {
  leaf:  { pts: 1, r: 5, c: "#7cc36b", c2: "#a3e08f", speed: 1.0 },
  fruit: { pts: 3, r: 7, c: "#e06b5a", c2: "#f5a08f", speed: 0.7 },
  candy: { pts: 5, r: 6, c: "#e0b85a", c2: "#ffe08f", speed: 0.85 }
};
let foods = [];

/**
 * Spawn one food item. If col/row omitted, picks a random non-nest tile in
 * the INTERIOR region (col/row 1..COLS-2) so it's always reachable — never on
 * the outermost edge ring.
 */
function spawnFood(col, row, type) {
  if (col === undefined) {
    const cLo = 1, cHi = CONFIG.GRID.COLS - 2;
    const rLo = 1, rHi = CONFIG.GRID.ROWS - 2;
    let tries = 0;
    do {
      col = cLo + Math.floor(Math.random() * (cHi - cLo + 1));
      row = rLo + Math.floor(Math.random() * (rHi - rLo + 1));
    } while (grid[row][col].type === 'nest' && ++tries < 30);
  }
  if (!type) { const r = Math.random(); type = r < 0.6 ? 'leaf' : r < 0.85 ? 'fruit' : 'candy'; }
  const w = worldFromGrid(col, row);
  const jx = (Math.random() - 0.5) * CONFIG.TILE.W * 0.4;
  const jy = (Math.random() - 0.5) * CONFIG.TILE.H * 0.4;
  foods.push({ wx: w.x + jx, wy: w.y + jy, type, age: 0 });
}

// ===== PARTICLES (TAŞINDI — havuzlandı) =====
const particles = [];
/** Spawn a burst of particles at world coord */
function burst(wx, wy, color, n = 8) {
  for (let i = 0; i < n; i++) {
    let p = particles.find(q => !q.active);
    if (!p) { if (particles.length >= CONFIG.POOL.PARTICLES) break; p = {}; particles.push(p); }
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 2.5;
    p.wx = wx; p.wy = wy; p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
    p.life = 1; p.c = color; p.active = true;
  }
}

// ===== COLONY: Ant =====
/**
 * Autonomous ant. type ∈ 'worker'|'soldier'|'carrier'.
 * task ∈ 'forage'|'return'|'guard'|'idle'.
 */
class Ant {
  constructor() { this.active = false; }
  /** (Re)initialize a pooled ant */
  init(type) {
    this.type = type;
    this.wx = nestW.x; this.wy = nestW.y;
    this.angle = Math.random() * Math.PI * 2;
    this.carrying = null;
    this.wig = Math.random() * 10;
    this.active = true;
    this.baseSpeed = CONFIG.ANT.BASE_SPEED * (type === 'carrier' ? CONFIG.ANT.CARRIER_SPEED : 1);
    this.task = type === 'soldier' ? 'guard' : 'forage';
    this.stuck = 0; // frames spent barely moving
  }
  /** Effective speed (world px / frame-equiv) */
  get speed() {
    let s = this.baseSpeed * (speedTimer > 0 ? CONFIG.ANT.SPEED_BOOST : 1);
    return this.carrying ? s * TYPES[this.carrying].speed : s;
  }
  /** @param {number} dts delta-time scale (1.0 == 60fps frame) */
  update(dts) {
    const px = this.wx, py = this.wy;

    if (this.type === 'soldier') this.updateGuard(dts);
    else this.updateForage(dts);

    // Stuck detection — barely moved for ~1.5s → kick free with new heading
    const moved = Math.hypot(this.wx - px, this.wy - py);
    if (moved < 0.15 * dts) this.stuck += dts; else this.stuck = 0;
    if (this.stuck > 90) {
      // Steer toward nest center with wide jitter so it always re-mobilizes
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 1.4;
      this.stuck = 0;
    }
  }
  /** Worker / Carrier behavior (mevcut forage→return döngüsü) */
  updateForage(dts) {
    let target = null;
    if (this.carrying) {
      target = { x: nestW.x, y: nestW.y };
      addP(this.wx, this.wy, CONFIG.PHEROMONE.DEPOSIT * dts);
    } else {
      let near = null, nd = CONFIG.ANT.SENSE_RANGE * CONFIG.ANT.SENSE_RANGE;
      for (const f of foods) {
        if (this.type === 'carrier' && f.type === 'leaf') continue; // carrier leaf'i yok sayar
        const d = (f.wx - this.wx) ** 2 + (f.wy - this.wy) ** 2;
        if (d < nd) { nd = d; near = f; }
      }
      if (near) target = { x: near.wx, y: near.wy };
      else { const dir = senseP(this); if (dir !== null) this.angle += aDiff(dir, this.angle) * 0.15 * dts; }
    }
    if (target) {
      const des = Math.atan2(target.y - this.wy, target.x - this.wx);
      this.angle += aDiff(des, this.angle) * 0.1 * dts;
    } else if (senseP(this) === null) {
      this.angle += (Math.random() - 0.5) * 0.4 * dts;
    }
    this.step(dts);

    // Pickup
    if (!this.carrying) {
      for (let i = foods.length - 1; i >= 0; i--) {
        if (this.type === 'carrier' && foods[i].type === 'leaf') continue;
        const dx = this.wx - foods[i].wx, dy = this.wy - foods[i].wy;
        if (dx * dx + dy * dy < 120) {
          this.carrying = foods[i].type; foods.splice(i, 1);
          this.angle += Math.PI; sndFood(); break;
        }
      }
    } else {
      // Deposit at nest
      const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
      if (dx * dx + dy * dy < NEST_WORLD_R * NEST_WORLD_R) {
        let pts = TYPES[this.carrying].pts;
        if (this.type === 'carrier') pts = Math.round(pts * 1.5); // carrier ×1.5
        burst(this.wx, this.wy, TYPES[this.carrying].c2);
        this.carrying = null; this.angle += Math.PI;
        food += pts; sndDeposit();
      }
    }
  }
  /** Soldier patrol around nest (düşman yok → guard; FAZ 2'de saldırı eklenecek) */
  updateGuard(dts) {
    const dx = this.wx - nestW.x, dy = this.wy - nestW.y;
    const dist = Math.hypot(dx, dy);
    if (dist > CONFIG.ANT.GUARD_RADIUS) {
      const des = Math.atan2(-dy, -dx);
      this.angle += aDiff(des, this.angle) * 0.08 * dts;
    } else {
      this.angle += (Math.random() - 0.5) * 0.25 * dts;
    }
    this.step(dts);
  }
  /**
   * Advance position, then HARD-clamp into the diamond grid area.
   * Bounds are checked in grid (col,row) space (the real playable diamond),
   * not the rectangular world bbox. On edge contact the heading is steered
   * toward the nest center so corners can never lock the ant.
   */
  step(dts) {
    this.wig += 0.3 * dts;
    this.wx += Math.cos(this.angle) * this.speed * dts;
    this.wy += Math.sin(this.angle) * this.speed * dts;

    // world → grid (inverse of worldFromGrid)
    const TW = CONFIG.TILE.W, TH = CONFIG.TILE.H;
    let col = this.wx / TW + this.wy / TH;
    let row = this.wy / TH - this.wx / TW;

    const lo = 0.3;
    const hiC = CONFIG.GRID.COLS - 1 - 0.3;
    const hiR = CONFIG.GRID.ROWS - 1 - 0.3;
    let outside = false;
    if (col < lo)  { col = lo;  outside = true; }
    if (col > hiC) { col = hiC; outside = true; }
    if (row < lo)  { row = lo;  outside = true; }
    if (row > hiR) { row = hiR; outside = true; }

    if (outside) {
      // Hard clamp position back inside the diamond
      const w = worldFromGrid(col, row);
      this.wx = w.x; this.wy = w.y;
      // Reflect heading inward — steer toward nest center (+ jitter)
      this.angle = Math.atan2(nestW.y - this.wy, nestW.x - this.wx) + (Math.random() - 0.5) * 0.6;
    }
  }
  /** Draw at screen position (camera-aware) */
  draw() {
    const s = screenFromWorld(this.wx, this.wy);
    drawAntFull(s.x, s.y, this.angle, this.wig, this.type, this.carrying, camera.scale);
  }
}

// Ant pool
const ants = [];
/** Spawn (or recycle) an ant of given type */
function spawnAnt(type) {
  let a = ants.find(x => !x.active);
  if (!a) { if (ants.length >= CONFIG.POOL.ANTS) return null; a = new Ant(); ants.push(a); }
  a.init(type); return a;
}
/** Count active ants */
function antCount() { let n = 0; for (const a of ants) if (a.active) n++; return n; }

// ===== ANT RENDER (mevcut kızıl-turuncu gölgeli stil, tiplere göre) =====
/**
 * Full ant render with shadow, body, legs, eyes, cargo.
 * @param {number} x @param {number} y screen px
 * @param {number} angle @param {number} wig
 * @param {string} type @param {?string} carrying @param {number} cam camera scale
 */
function drawAntFull(x, y, angle, wig, type, carrying, cam) {
  const sc = (type === 'soldier' ? CONFIG.ANT.SOLDIER_SCALE : 1) * cam;
  const body = type === 'soldier' ? '#8b1a1a' : type === 'carrier' ? '#c8a020' : '#e8542a';
  const dark = type === 'soldier' ? '#5e0f0f' : type === 'carrier' ? '#9a7a10' : '#c23d18';

  // Shadow
  ctx.save(); ctx.globalAlpha = 0.26; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x, y + 3.5 * sc, 8 * sc, 4.5 * sc, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + Math.sin(wig) * 0.15);
  ctx.scale(sc, sc);

  if (shieldTimer > 0) {
    ctx.strokeStyle = 'rgba(143,208,255,0.7)'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.stroke();
  }

  // Legs (6) — wiggle
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  const lw = Math.sin(wig) * 1.5;
  for (const lx of [-2, 1, 4]) {
    ctx.beginPath();
    ctx.moveTo(lx, -2); ctx.lineTo(lx - 1, -5 - lw);
    ctx.moveTo(lx, 2);  ctx.lineTo(lx - 1, 5 + lw);
    ctx.stroke();
  }

  // Body
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(-6, 0, 4.5, 3.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(6, 0, 2, 0, Math.PI * 2); ctx.fill();

  // Soldier jaws (2 ek path)
  if (type === 'soldier') {
    ctx.strokeStyle = '#3a0808'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(9, -1.5); ctx.lineTo(12.5, -3);
    ctx.moveTo(9, 1.5); ctx.lineTo(12.5, 3); ctx.stroke();
  }

  // Antennae
  ctx.strokeStyle = dark; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(7, -1.2); ctx.lineTo(11, -3.5);
  ctx.moveTo(7, 1.2); ctx.lineTo(11, 3.5); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#fff'; ctx.beginPath();
  ctx.arc(7, -1.4, 1, 0, Math.PI * 2); ctx.arc(7, 1.4, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath();
  ctx.arc(7.3, -1.4, 0.5, 0, Math.PI * 2); ctx.arc(7.3, 1.4, 0.5, 0, Math.PI * 2); ctx.fill();

  // Cargo
  if (carrying) {
    const t = TYPES[carrying];
    if (type === 'carrier') {
      // sırtta küçük kare
      ctx.fillStyle = t.c;  ctx.fillRect(-8, -3, 5, 6);
      ctx.fillStyle = t.c2; ctx.fillRect(-7.5, -2.5, 2, 2);
    } else {
      ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(9, 0, t.r - 1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(8.4, -0.6, (t.r - 1) * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}

// ===== COLONY DRAW HELPERS (pheromone, food, particles) =====
/** Draw pheromone overlay (world cells → screen rects) + decay */
function drawPheromone() {
  if (!PH.grid) return;
  const cell = PCELL * camera.scale;
  for (let cy = 0; cy < PH.rows; cy++) {
    for (let cx = 0; cx < PH.cols; cx++) {
      const i = cy * PH.cols + cx;
      const v = PH.grid[i];
      if (v > 0.5) {
        const wx = WORLD.minX + cx * PCELL, wy = WORLD.minY + cy * PCELL;
        const s = screenFromWorld(wx, wy);
        if (s.x + cell < 0 || s.x > W || s.y + cell < 0 || s.y > H) { PH.grid[i] *= CONFIG.PHEROMONE.DECAY; continue; }
        ctx.fillStyle = 'rgba(120,200,110,' + Math.min(v / 60, 0.35) + ')';
        ctx.fillRect(s.x, s.y, cell + 1, cell + 1);
        PH.grid[i] *= CONFIG.PHEROMONE.DECAY;
      } else PH.grid[i] = 0;
    }
  }
}
/** Draw a single food item (used by depth-sorted pass) */
function drawFood(f) {
  const s = screenFromWorld(f.wx, f.wy);
  const t = TYPES[f.type], cam = camera.scale;
  ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(s.x, s.y + 2 * cam, t.r * cam, t.r * 0.5 * cam, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = t.c;  ctx.beginPath(); ctx.arc(s.x, s.y, t.r * cam, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = t.c2; ctx.beginPath(); ctx.arc(s.x - t.r * 0.3 * cam, s.y - t.r * 0.3 * cam, t.r * 0.4 * cam, 0, Math.PI * 2); ctx.fill();
}
/** Update + draw particles (world space) */
function drawParticles(dts) {
  for (const p of particles) {
    if (!p.active) continue;
    p.wx += p.vx * dts; p.wy += p.vy * dts;
    p.vx *= 0.96; p.vy *= 0.96; p.life -= 0.04 * dts;
    if (p.life <= 0) { p.active = false; continue; }
    const s = screenFromWorld(p.wx, p.wy);
    ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.2 * camera.scale, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ===== GAME FLOW =====
function startGame() {
  state = 'PLAYING';
  camera.scale = CONFIG.CAMERA.START_ZOOM;
  initGrid();
  nestW = worldFromGrid(NEST_COL, NEST_ROW);
  setupPher();
  centerCamera();
  hoverCol = -1; hoverRow = -1;

  // Audio (kullanıcı etkileşimiyle başlat)
  initAudio(); if (soundOn) startMusic();

  // Reset colony state
  food = 0;
  foodSpawnTimer = 0;
  ants.length = 0;
  foods.length = 0;
  particles.length = 0;
  speedTimer = 0; shieldTimer = 0;

  // Başlangıç kolonisi
  for (let i = 0; i < CONFIG.ANT.START_WORKERS;  i++) spawnAnt('worker');
  for (let i = 0; i < CONFIG.ANT.START_SOLDIERS; i++) spawnAnt('soldier');
  for (let i = 0; i < CONFIG.ANT.START_CARRIERS; i++) spawnAnt('carrier');

  // Başlangıç yemleri
  for (let i = 0; i < 6; i++) spawnFood();

  hudWave = 1; hudTime = 60; hudQueenHP = CONFIG.QUEEN.MAX_HP;
}

function endGame(score, wave) {
  prevBest  = getBest();
  lastScore = score; lastWave = wave;
  saveScore(score, wave);
  state = 'GAMEOVER';
}

// ESC → fake game-over (test only)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state === 'PLAYING') endGame(0, hudWave);
  if (e.key === 'r' && state === 'PLAYING') centerCamera();
});

// ===== MAIN LOOP =====
let lastTs = 0;

function loop(ts) {
  const dt = Math.min(ts - lastTs, 50); // cap at 50 ms
  lastTs = ts;

  if (state === 'MENU') {
    updateMenu(dt);
    drawMenu();
  } else if (state === 'PLAYING') {
    // Background gradient
    const bg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) / 1.1);
    bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    const dts = dt / 16.667; // delta-time scale (1.0 == 60fps)

    // ── Yem yönetimi ──
    // 0) Yaşlandır: 20sn'dir toplanmayan yemi kaldır (ulaşılamaz olabilir)
    for (let i = foods.length - 1; i >= 0; i--) {
      foods[i].age += dt;
      if (foods[i].age >= FOOD_MAX_AGE_MS) foods.splice(i, 1);
    }
    // 1) Minimum yem garantisi
    if (foods.length < FOOD_MIN_MAP) {
      const needed = FOOD_MIN_MAP - foods.length;
      for (let i = 0; i < needed; i++) spawnFood();
    }
    // 2) Periyodik ek yem (her FOOD_SPAWN_MS ms'de bir)
    foodSpawnTimer += dt;
    if (foodSpawnTimer >= FOOD_SPAWN_MS) { foodSpawnTimer = 0; spawnFood(); }

    // ── Worker doğumu: her ANT_BIRTH_COST yemde 1 worker ──
    if (food >= ANT_BIRTH_COST && antCount() < CONFIG.ANT.MAX) {
      food -= ANT_BIRTH_COST;
      spawnAnt('worker');
      sndBorn();
    }

    // Layer 1: Zemin tile'ları
    drawGrid();

    // Layer 2: Feromon overlay
    drawPheromone();

    // Update ants (logic) before depth-sorted draw
    for (const a of ants) if (a.active) a.update(dts);

    // Layers 5-7: depth-sorted food + ants (painter's algorithm by world Y)
    drawables.length = 0;
    for (const f of foods)      drawables.push({ wy: f.wy, draw: () => drawFood(f) });
    for (const a of ants) if (a.active) drawables.push({ wy: a.wy, draw: () => a.draw() });
    drawables.sort((p, q) => p.wy - q.wy);
    for (const d of drawables) d.draw();

    // Layer 8: Particles
    drawParticles(dts);

    // Layer 9: HUD
    hudFood = food; hudPop = antCount();
    drawHUD();

    // FAZ 1 yardım metni
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Karıncalar yem topluyor  ·  Sürükle pan · Pinch/Tekerlek zoom · ESC game over · R ortala', W / 2, H - 90);
  } else if (state === 'GAMEOVER') {
    // Draw grid as static backdrop
    const bg = ctx.createRadialGradient(W / 2, H / 2, 40, W / 2, H / 2, Math.max(W, H) / 1.1);
    bg.addColorStop(0, '#3d2a18'); bg.addColorStop(1, '#1c130a');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    drawGrid();
    drawGameover();
  }

  requestAnimationFrame(loop);
}

// ===== BOOT =====
resize();
window.addEventListener('resize', resize);
initMenu();
requestAnimationFrame(loop);
</script>
